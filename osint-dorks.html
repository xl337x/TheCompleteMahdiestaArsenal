
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#020408">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-void: #050508; --bg-primary: #0a0a0f; --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25; --accent-primary: #ff2d55; --accent-secondary: #ff6b8a;
            --accent-glow: rgba(255, 45, 85, 0.4); --cyber-green: #00ff9d;
            --cyber-green-dim: #00cc7d; --cyber-green-glow: rgba(0, 255, 157, 0.3);
            --cyber-blue: #00d4ff; --cyber-orange: #ff9500; --cyber-purple: #bf5af2;
            --text-primary: #f0f0f5; --text-secondary: #8888a0; --text-muted: #55556a;
            --border-color: #2a2a3a;
        }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-void); color: var(--text-primary); font-family: 'JetBrains Mono', monospace; min-height: 100vh; line-height: 1.6; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(255,45,85,0.02) 1px, transparent 1px), linear-gradient(rgba(255,45,85,0.02) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        
        .header { background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-void) 100%); border-bottom: 1px solid var(--accent-primary); padding: 15px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 30px var(--accent-glow); }
        .header-content { max-width: 1900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent-primary), var(--cyber-purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px var(--accent-glow); }
        .logo-text h1 { font-family: 'Orbitron', sans-serif; font-size: 1.3em; font-weight: 800; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .logo-text .subtitle { font-size: 0.65em; color: var(--text-secondary); letter-spacing: 1px; }
        .header-stats { display: flex; gap: 15px; }
        .stat-pill { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 20px; padding: 6px 14px; display: flex; align-items: center; gap: 6px; font-size: 0.8em; }
        .stat-pill .num { color: var(--cyber-green); font-weight: 700; }
        .stat-pill .label { color: var(--text-secondary); }
        
        .main-container { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 75px); position: relative; z-index: 1; }
        .sidebar { background: var(--bg-primary); border-right: 1px solid var(--border-color); padding: 20px; overflow-y: auto; max-height: calc(100vh - 75px); position: sticky; top: 75px; }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg-void); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 3px; }
        
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        .section-header .icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent-primary), transparent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .section-header h2 { font-family: 'Orbitron', sans-serif; font-size: 0.8em; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        
        .config-section { margin-bottom: 20px; }
        .form-grid { display: grid; gap: 10px; }
        .form-group label { display: block; font-size: 0.7em; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 10px 12px; background: var(--bg-void); border: 1px solid var(--border-color); border-radius: 6px; color: var(--cyber-green); font-family: 'JetBrains Mono', monospace; font-size: 0.85em; transition: all 0.3s ease; }
        .form-group input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 2px var(--accent-glow); }
        .form-group input::placeholder { color: var(--text-muted); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { padding: 10px 14px; border: none; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--cyber-purple)); color: white; grid-column: span 2; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--accent-glow); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { border-color: var(--accent-primary); }
        
        .target-display { background: var(--bg-void); border: 1px solid var(--cyber-green-dim); border-radius: 8px; padding: 12px; margin-top: 15px; display: none; }
        .target-display.active { display: block; }
        .target-display h3 { color: var(--cyber-green); font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .target-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.75em; border-bottom: 1px solid var(--border-color); }
        .target-item:last-child { border-bottom: none; }
        .target-item .key { color: var(--text-secondary); }
        .target-item .value { color: var(--cyber-green); word-break: break-all; max-width: 60%; text-align: right; }
        
        .quick-actions { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .quick-actions h3 { font-size: 0.75em; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; }
        .quick-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .quick-btn { padding: 8px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 5px; color: var(--text-primary); font-size: 0.7em; cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; }
        .quick-btn:hover { border-color: var(--cyber-blue); color: var(--cyber-blue); }
        
        .main-content { padding: 20px; overflow-y: auto; }
        .filter-bar { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px 15px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 100; }
        .search-box { flex: 1; min-width: 200px; position: relative; }
        .search-box input { width: 100%; padding: 8px 12px 8px 35px; background: var(--bg-void); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 0.85em; }
        .search-box input:focus { outline: none; border-color: var(--accent-primary); }
        .search-box::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; opacity: 0.5; }
        .filter-select { padding: 8px 12px; background: var(--bg-void); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 0.8em; min-width: 140px; }
        .filter-select:focus { outline: none; border-color: var(--accent-primary); }
        .filter-btn { padding: 8px 15px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 0.8em; cursor: pointer; }
        .filter-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
        
        .category-group { margin-bottom: 25px; }
        .category-header { background: linear-gradient(90deg, var(--accent-primary), transparent); padding: 12px 20px; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .category-header h3 { font-family: 'Orbitron', sans-serif; font-size: 0.9em; font-weight: 700; color: white; letter-spacing: 1px; text-transform: uppercase; }
        .category-header .count { background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 15px; font-size: 0.75em; }
        
        .dork-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 12px; padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 8px 8px; }
        .dork-grid.collapsed { display: none; }
        
        .dork-card { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; transition: all 0.3s ease; position: relative; }
        .dork-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent-primary); opacity: 0; transition: opacity 0.3s; border-radius: 8px 0 0 8px; }
        .dork-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .dork-card:hover::before { opacity: 1; }
        .dork-card.marked { border-color: var(--cyber-green); box-shadow: 0 0 20px var(--cyber-green-glow); }
        .dork-card.marked::before { opacity: 1; background: var(--cyber-green); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
        .card-title { font-size: 0.9em; font-weight: 600; color: var(--accent-secondary); flex: 1; }
        .card-badges { display: flex; gap: 4px; flex-wrap: wrap; }
        
        .badge { font-size: 0.6em; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
        .badge-google { background: rgba(0,212,255,0.15); color: var(--cyber-blue); border: 1px solid var(--cyber-blue); }
        .badge-github { background: rgba(191,90,242,0.15); color: var(--cyber-purple); border: 1px solid var(--cyber-purple); }
        .badge-shodan { background: rgba(255,149,0,0.15); color: var(--cyber-orange); border: 1px solid var(--cyber-orange); }
        .badge-censys { background: rgba(0,255,157,0.15); color: var(--cyber-green); border: 1px solid var(--cyber-green-dim); }
        .badge-other { background: rgba(255,45,85,0.15); color: var(--accent-secondary); border: 1px solid var(--accent-primary); }
        
        .card-description { font-size: 0.75em; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.4; }
        .card-meta { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .meta-tag { font-size: 0.65em; padding: 3px 8px; background: var(--bg-tertiary); border-radius: 3px; color: var(--text-secondary); }
        
        .dork-box { background: var(--bg-void); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; }
        .dork-text { color: var(--cyber-green); font-size: 0.75em; line-height: 1.7; word-break: break-word; white-space: pre-wrap; max-height: 100px; overflow-y: auto; }
        .dork-text::-webkit-scrollbar { width: 4px; }
        .dork-text::-webkit-scrollbar-thumb { background: var(--cyber-green-dim); border-radius: 2px; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 5px; font-family: 'JetBrains Mono', monospace; font-size: 0.7em; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .launch-btn { background: linear-gradient(135deg, var(--accent-primary), var(--cyber-purple)); color: white; grid-column: span 2; }
        .launch-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 4px 12px var(--accent-glow); }
        .launch-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .mark-btn { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .mark-btn:hover { border-color: var(--cyber-green); color: var(--cyber-green); }
        .dork-card.marked .mark-btn { background: var(--cyber-green); color: var(--bg-void); border-color: var(--cyber-green); }
        .copy-btn { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .copy-btn:hover { border-color: var(--cyber-blue); color: var(--cyber-blue); }
        
        .copy-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: var(--cyber-green); color: var(--bg-void); padding: 15px 30px; border-radius: 8px; font-weight: 700; font-size: 1em; opacity: 0; pointer-events: none; z-index: 10000; transition: all 0.3s ease; box-shadow: 0 0 40px var(--cyber-green-glow); text-transform: uppercase; letter-spacing: 1px; }
        .copy-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .no-results { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .no-results .icon { font-size: 3em; margin-bottom: 15px; opacity: 0.3; }
        .no-results h3 { font-size: 1.1em; color: var(--text-primary); }
        
        @media (max-width: 1200px) { .main-container { grid-template-columns: 1fr; } .sidebar { max-height: none; position: relative; top: 0; } .dork-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .header-content { flex-direction: column; text-align: center; } .filter-bar { flex-direction: column; } .search-box { width: 100%; } .filter-select { width: 100%; } .action-buttons { grid-template-columns: 1fr; } .launch-btn { grid-column: span 1; } }
    </style>

<style id="mahdiesta-theme-style">

<header class="header">
    <div class="header-content">
        <div class="logo-section">
            <div class="logo-icon">🔍</div>

<div class="main-container">

                    <input type="text" id="domain" placeholder="example.com, github.com">

                    <input type="text" id="person" placeholder="John Doe">
                </div>
            </div>
        </div>
        
        <div class="btn-grid">
            <button class="btn btn-primary" onclick="applyTarget()">⚡ Load Target</button>
            <button class="btn btn-secondary" onclick="clearTarget()">🔄 Clear</button>

<script>
const dorkLibrary = [
    // GOOGLE SEARCH OPERATORS
    { title: "Site Search", engine: "Google", cat: "Basic", desc: "Restrict results to specific domain", template: "site:{domain}" },
    { title: "URL Pattern Search", engine: "Google", cat: "Basic", desc: "Find URLs containing keyword", template: "site:{domain} inurl:admin" },
    { title: "Title Search", engine: "Google", cat: "Basic", desc: "Find pages with keyword in title", template: "site:{domain} intitle:index" },

    { title: "All in URL", engine: "Google", cat: "Basic", desc: "All words must be in URL", template: "site:{domain} allinurl:admin backup" },

    { title: "Link Search", engine: "Google", cat: "Recon", desc: "Find pages linking to target", template: "link:{domain}" },
    
    // ADMIN PANELS & LOGIN PAGES
    { title: "Admin Login Pages", engine: "Google", cat: "Admin", desc: "Find admin login interfaces", template: "site:{domain} inurl:admin intitle:login" },
    { title: "Admin Panels", engine: "Google", cat: "Admin", desc: "Discover admin panels", template: "site:{domain} inurl:administrator" },
    { title: "CPanel Login", engine: "Google", cat: "Admin", desc: "Find cPanel login pages", template: "site:{domain} intitle:cpanel" },
    { title: "PHPMyAdmin", engine: "Google", cat: "Admin", desc: "Find phpMyAdmin instances", template: "site:{domain} intitle:phpmyadmin" },
    { title: "WordPress Login", engine: "Google", cat: "Admin", desc: "Find WordPress admin pages", template: "site:{domain} inurl:wp-admin" },
    { title: "Joomla Admin", engine: "Google", cat: "Admin", desc: "Find Joomla admin panels", template: "site:{domain} inurl:administrator" },
    { title: "Drupal Admin", engine: "Google", cat: "Admin", desc: "Find Drupal admin pages", template: "site:{domain} inurl:user/login" },
    { title: "Dashboard Pages", engine: "Google", cat: "Admin", desc: "Find dashboard interfaces", template: "site:{domain} intitle:dashboard" },
    { title: "Control Panels", engine: "Google", cat: "Admin", desc: "Find control panels", template: "site:{domain} inurl:controlpanel" },
    { title: "Web Shells", engine: "Google", cat: "Security", desc: "Find potential web shells", template: "site:{domain} inurl:shell.php" },
    
    // DATABASE & SQL
    { title: "SQL Errors", engine: "Google", cat: "SQLi", desc: "Find SQL error messages", template: "site:{domain} intext:'sql error'" },
    { title: "MySQL Errors", engine: "Google", cat: "SQLi", desc: "Find MySQL error disclosure", template: "site:{domain} intext:'mysql_fetch'" },
    { title: "Database Dumps", engine: "Google", cat: "Database", desc: "Find exposed database dumps", template: "site:{domain} filetype:sql" },

let currentTarget = {};
let markedDorks = new Set();
let filteredDorks = [...dorkLibrary];

function applyTarget() {
    currentTarget = {
        domain: document.getElementById('domain').value.trim() || '{domain}',
        ip: document.getElementById('targetIP').value.trim() || '{ip}',
        company: document.getElementById('company').value.trim() || '{company}',
        person: document.getElementById('person').value.trim() || '{person}'
    };
    
    displayTargetInfo();
    populateFilters();
    renderDorks();
}

function clearTarget() {
    ['domain', 'targetIP', 'company', 'person'].forEach(id => document.getElementById(id).value = '');
    currentTarget = {};
    document.getElementById('targetDisplay').classList.remove('active');
    filteredDorks = [...dorkLibrary];
    renderDorks();
}

function displayTargetInfo() {
    const items = document.getElementById('targetItems');
    items.innerHTML = '';
    
    [
        ['Domain', currentTarget.domain],
        ['IP', currentTarget.ip],
        ['Company', currentTarget.company],
        ['Person', currentTarget.person]
    ].forEach(([k, v]) => {
        if (v && v !== `{${k.toLowerCase()}}`) {
            items.innerHTML += `<div class="target-item"><span class="key">${k}</span><span class="value">${v}</span></div>`;
        }
    });
    
    document.getElementById('targetDisplay').classList.add('active');
}

function populateFilters() {
    const catSel = document.getElementById('categoryFilter');
    const engSel = document.getElementById('engineFilter');
    
    catSel.innerHTML = '<option value="">All Categories</option>';
    engSel.innerHTML = '<option value="">All Engines</option>';
    
    const cats = [...new Set(dorkLibrary.map(d => d.cat))].sort();
    const engs = [...new Set(dorkLibrary.map(d => d.engine))].sort();
    
    cats.forEach(c => catSel.innerHTML += `<option value="${c}">${c}</option>`);
    engs.forEach(e => engSel.innerHTML += `<option value="${e}">${e}</option>`);
}

function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;
    const eng = document.getElementById('engineFilter').value;
    
    filteredDorks = dorkLibrary.filter(d =>
        (!search || d.title.toLowerCase().includes(search) || d.desc.toLowerCase().includes(search) || d.cat.toLowerCase().includes(search)) &&
        (!cat || d.cat === cat) &&
        (!eng || d.engine === eng)
    );
    
    renderDorks();
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('categoryFilter').value = '';
    document.getElementById('engineFilter').value = '';
    filteredDorks = [...dorkLibrary];
    renderDorks();
}

function quickFilter(term) {
    if (['Google', 'GitHub', 'Shodan', 'Censys'].includes(term)) {
        document.getElementById('engineFilter').value = term;
        document.getElementById('searchInput').value = '';
    } else {
        document.getElementById('categoryFilter').value = '';
        document.getElementById('engineFilter').value = '';
        document.getElementById('searchInput').value = term;
    }
    applyFilters();
}

function showMarkedOnly() {
    if (markedDorks.size === 0) {
        alert('No dorks marked yet!');
        return;
    }
    filteredDorks = dorkLibrary.filter((d, i) => markedDorks.has(i));
    renderDorks();
}

function renderDorks() {
    const container = document.getElementById('dorkContainer');
    
    if (!filteredDorks.length) {
        container.innerHTML = '<div class="no-results"><div class="icon">🔍</div><h3>No dorks found matching your filters</h3></div>';
        updateStats();
        return;
    }
    
    const groups = {};
    filteredDorks.forEach(d => {
        if (!groups[d.cat]) groups[d.cat] = [];
        groups[d.cat].push(d);
    });
    
    container.innerHTML = '';
    Object.keys(groups).sort().forEach(cat => {
        container.innerHTML += `
            <div class="category-group">
                <div class="category-header" onclick="toggleCategory(this)">
                    <h3>${cat}</h3>
                    <span class="count">${groups[cat].length}</span>
                </div>
                <div class="dork-grid">
                    ${groups[cat].map(d => createCard(d)).join('')}
                </div>
            </div>
        `;
    });
    
    updateStats();
}

function createCard(dork) {
    const idx = dorkLibrary.indexOf(dork);
    let processed = dork.template;
    
    if (Object.keys(currentTarget).length) {
        Object.keys(currentTarget).forEach(k => {
            processed = processed.replace(new RegExp(`\\{${k}\\}`, 'g'), currentTarget[k]);
        });
    }
    
    const engineBadge = dork.engine === 'Google' ? 'badge-google' : 
                       dork.engine === 'GitHub' ? 'badge-github' :
                       dork.engine === 'Shodan' ? 'badge-shodan' :
                       dork.engine === 'Censys' ? 'badge-censys' : 'badge-other';
    
    const hasTarget = currentTarget.domain && currentTarget.domain !== '{domain}';
    const isMarked = markedDorks.has(idx);
    
    return `
        <div class="dork-card ${isMarked ? 'marked' : ''}" data-idx="${idx}">
            <div class="card-header">
                <div class="card-title">${dork.title}</div>
                <div class="card-badges">
                    <span class="badge ${engineBadge}">${dork.engine}</span>
                </div>
            </div>
            <div class="card-description">${dork.desc}</div>
            <div class="card-meta">
                <span class="meta-tag">${dork.cat}</span>
            </div>
            <div class="dork-box">
                <div class="dork-text">${escapeHtml(processed)}</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn launch-btn" onclick="launchDork(${idx})" ${!hasTarget ? 'disabled' : ''}>
                    🚀 Launch
                </button>
                <button class="action-btn mark-btn" onclick="toggleMark(${idx})">
                    ${isMarked ? '✓' : '⭐'} Mark
                </button>
                <button class="action-btn copy-btn" onclick="copyDork(${idx})">
                    📋 Copy
                </button>
            </div>
        </div>
    `;
}

function launchDork(idx) {
    if (!currentTarget.domain || currentTarget.domain === '{domain}') {
        alert('Please set a target domain first!');
        return;
    }
    
    const dork = dorkLibrary[idx];
    let query = dork.template;
    
    Object.keys(currentTarget).forEach(k => {
        query = query.replace(new RegExp(`\\{${k}\\}`, 'g'), currentTarget[k]);
    });
    
    const encoded = encodeURIComponent(query);
    const engines = {
        'Google': `https://www.google.com/search?q=${encoded}`,
        'GitHub': `https://github.com/search?q=${encoded}`,
        'Shodan': `https://www.shodan.io/search?query=${encoded}`,
        'Censys': `https://search.censys.io/search?q=${encoded}`,
        'LinkedIn': `https://www.linkedin.com/search/results/?keywords=${encoded}`,
        'Twitter': `https://twitter.com/search?q=${encoded}`,
        'Facebook': `https://www.facebook.com/search/top?q=${encoded}`,
        'Archive': `https://web.archive.org/web/*/${currentTarget.domain}`
    };
    
    const url = engines[dork.engine] || engines['Google'];
    window.open(url, '_blank');
}

function toggleMark(idx) {
    if (markedDorks.has(idx)) {
        markedDorks.delete(idx);
    } else {
        markedDorks.add(idx);
    }
    renderDorks();
}

function copyDork(idx) {
    const dork = dorkLibrary[idx];
    let text = dork.template;
    
    if (Object.keys(currentTarget).length) {
        Object.keys(currentTarget).forEach(k => {
            text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), currentTarget[k]);
        });
    }
    
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showCopyToast());
    } else {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopyToast();
    }
}

function showCopyToast() {
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

function toggleCategory(header) {
    header.nextElementSibling.classList.toggle('collapsed');
}

function exportMarked() {
    if (markedDorks.size === 0) {
        alert('No dorks marked to export!');
        return;
    }
    
    let text = '# OSINT Dorks Arsenal - Marked Dorks\n';
    text += `# Exported: ${new Date().toISOString()}\n`;
    text += `# Target: ${currentTarget.domain || 'Not Set'}\n\n`;
    
    markedDorks.forEach(idx => {
        const dork = dorkLibrary[idx];
        let query = dork.template;
        
        if (Object.keys(currentTarget).length) {
            Object.keys(currentTarget).forEach(k => {
                query = query.replace(new RegExp(`\\{${k}\\}`, 'g'), currentTarget[k]);
            });
        }
        
        text += `## ${dork.title}\n`;
        text += `Engine: ${dork.engine}\n`;
        text += `Category: ${dork.cat}\n`;
        text += `Description: ${dork.desc}\n`;
        text += `Query: ${query}\n\n`;
    });
    
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `osint_dorks_marked_${currentTarget.domain || 'export'}.txt`;
    a.click();
}

function escapeHtml(text) {
    return text.replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    })[m]);
}

function updateStats() {
    document.getElementById('totalDorks').textContent = dorkLibrary.length;
    document.getElementById('visibleDorks').textContent = filteredDorks.length;
    document.getElementById('markedDorks').textContent = markedDorks.size;
    document.getElementById('engineCount').textContent = new Set(dorkLibrary.map(d => d.engine)).size;
}

window.onload = () => {
    populateFilters();
    applyTarget();
};
</script>
<button id="theme-toggle-btn" title="Toggle theme (t)">☀</button>

<script>
(function(){
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
    try { localStorage.setItem('mahdiesta-theme', theme); } catch(e) {}
  }
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 't' || e.key === 'T') toggleTheme();
  });
  var btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.addEventListener('click', toggleTheme);
  var saved = 'dark';
  try { saved = localStorage.getItem('mahdiesta-theme') || 'dark'; } catch(e) {}
  setTheme(saved);
})();
</script>
